  <style>
    :root{
      --navy:#17384C;
      --navy-deep:#0f2a3a;
      --gold:#C9A766;
      --gold-soft:#d9bd87;
      --cream:#f5ecd9;
      --cream-soft:#faf4e6;
      --text:#17384C;
      --text-muted:#5a6f7e;
      --bg:#fbf6ea;
      --shadow:0 18px 46px rgba(23,56,76,.18);
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{
      font-family:'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background:var(--bg);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }
    body{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      padding:32px 16px 64px;
    }

    /* Header */
    .lp-header{
      max-width:920px;
      width:100%;
      margin:0 auto 24px;
      text-align:center;
    }
    .lp-emblem{
      display:inline-flex;
      align-items:center;
      gap:10px;
      text-decoration:none;
      color:var(--navy);
    }
    .lp-emblem-mark{
      width:36px;height:36px;
      border:1.5px solid var(--gold);
      border-radius:9px;
      display:inline-flex;
      align-items:center;justify-content:center;
      font-family:'Georgia', serif;
      font-weight:700;
      color:var(--gold);
      font-size:20px;
      background:#fff;
    }
    .lp-emblem-text{font-weight:700;font-size:15px;letter-spacing:-0.01em;}
    .lp-title{
      margin-top:14px;
      font-size:clamp(20px, 4vw, 26px);
      font-weight:700;
      color:var(--navy);
      letter-spacing:-0.02em;
    }
    .lp-sub{
      margin-top:6px;
      font-size:14px;
      color:var(--text-muted);
      letter-spacing:-0.01em;
    }

    /* Carousel */
    .carousel{
      max-width:560px;
      width:100%;
      margin:0 auto;
      position:relative;
    }
    .stage{
      position:relative;
      border-radius:18px;
      overflow:hidden;
      box-shadow:var(--shadow);
      background:#fff;
      aspect-ratio: 3 / 4;
    }
    .track{
      display:flex;
      width:100%;
      height:100%;
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
      will-change: transform;
    }
    .slide{
      flex:0 0 100%;
      width:100%;
      height:100%;
      position:relative;
      background:var(--cream);
    }
    .slide img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      user-select:none;
      -webkit-user-drag:none;
    }

    /* Nav arrows */
    .nav-btn{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:44px;height:44px;
      border-radius:50%;
      background:rgba(255,255,255,0.92);
      border:1px solid rgba(23,56,76,0.12);
      box-shadow:0 4px 12px rgba(23,56,76,0.15);
      cursor:pointer;
      display:flex;
      align-items:center;justify-content:center;
      font-size:18px;
      color:var(--navy);
      font-weight:600;
      transition: all 0.2s;
      z-index:10;
      user-select:none;
    }
    .nav-btn:hover{
      background:#fff;
      transform:translateY(-50%) scale(1.05);
    }
    .nav-btn:disabled{
      opacity:0.35;
      cursor:not-allowed;
    }
    .nav-prev{left:12px;}
    .nav-next{right:12px;}

    /* Indicators */
    .indicators{
      display:flex;
      justify-content:center;
      gap:8px;
      margin-top:18px;
      flex-wrap:wrap;
    }
    .ind{
      width:8px;height:8px;
      border-radius:50%;
      background:rgba(23,56,76,0.18);
      cursor:pointer;
      border:none;
      padding:0;
      transition:all 0.2s;
    }
    .ind.active{
      background:var(--gold);
      width:22px;
      border-radius:6px;
    }

    /* Counter */
    .counter{
      text-align:center;
      margin-top:12px;
      font-size:13px;
      color:var(--text-muted);
      font-feature-settings:'tnum';
    }
    .counter strong{color:var(--navy);font-weight:600;}

    /* Footer actions */
    .lp-footer{
      max-width:560px;
      width:100%;
      margin:28px auto 0;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .btn-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }
    .btn{
      display:inline-flex;
      align-items:center;justify-content:center;
      padding:12px 20px;
      border-radius:10px;
      font-size:14px;
      font-weight:600;
      text-decoration:none;
      letter-spacing:-0.01em;
      transition:all 0.2s;
      cursor:pointer;
      border:none;
      font-family:inherit;
    }
    .btn-primary{
      background:var(--navy);
      color:var(--cream);
    }
    .btn-primary:hover{
      background:var(--navy-deep);
      transform:translateY(-1px);
    }
    .btn-ghost{
      background:transparent;
      color:var(--navy);
      border:1px solid rgba(23,56,76,0.18);
    }
    .btn-ghost:hover{
      background:rgba(23,56,76,0.06);
    }

    .lp-meta{
      text-align:center;
      margin-top:18px;
      font-size:12px;
      color:var(--text-muted);
      letter-spacing:-0.01em;
    }
    .lp-meta a{color:var(--text-muted);text-decoration:underline;}

    /* Keyboard hint */
    .kbd-hint{
      text-align:center;
      margin-top:8px;
      font-size:11px;
      color:var(--text-muted);
      opacity:0.7;
    }
    .kbd-hint kbd{
      display:inline-block;
      padding:1px 6px;
      background:rgba(23,56,76,0.08);
      border-radius:4px;
      font-family:monospace;
      font-size:10.5px;
      margin:0 2px;
    }

    @media (max-width:480px){
      body{padding:20px 12px 48px;}
      .nav-btn{width:38px;height:38px;font-size:16px;}
      .nav-prev{left:8px;}
      .nav-next{right:8px;}
      .kbd-hint{display:none;}
    }

    @media (prefers-reduced-motion: reduce){
      .track{transition:none;}
    }

  <script>
    (function(){
      'use strict';
      const TOTAL = 8;
      let idx = 0;
      let touchStartX = 0;
      let touchStartY = 0;
      let touchEndX = 0;
      let touching = false;

      const track = document.getElementById('track');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');
      const curIdxEl = document.getElementById('curIdx');
      const indicators = Array.from(document.querySelectorAll('.ind'));

      function go(n){
        idx = Math.max(0, Math.min(TOTAL - 1, n));
        track.style.transform = `translateX(-${idx * 100}%)`;
        curIdxEl.textContent = idx + 1;
        indicators.forEach((el, i) => el.classList.toggle('active', i === idx));
        prevBtn.disabled = idx === 0;
        nextBtn.disabled = idx === TOTAL - 1;
        // URL hash
        try { history.replaceState(null, '', '#' + (idx + 1)); } catch(_) {}
      }

      // Init from hash
      try {
        const hashN = parseInt(location.hash.slice(1), 10);
        if (!isNaN(hashN) && hashN >= 1 && hashN <= TOTAL) idx = hashN - 1;
      } catch(_) {}
      go(idx);

      prevBtn.addEventListener('click', () => go(idx - 1));
      nextBtn.addEventListener('click', () => go(idx + 1));
      indicators.forEach((el, i) => el.addEventListener('click', () => go(i)));

      // Keyboard nav
      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') { e.preventDefault(); go(idx - 1); }
        else if (e.key === 'ArrowRight') { e.preventDefault(); go(idx + 1); }
        else if (e.key === 'Home') { e.preventDefault(); go(0); }
        else if (e.key === 'End') { e.preventDefault(); go(TOTAL - 1); }
      });

      // Touch swipe
      const stage = document.querySelector('.stage');
      stage.addEventListener('touchstart', (e) => {
        if (e.touches.length !== 1) return;
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        touching = true;
      }, { passive: true });

      stage.addEventListener('touchmove', (e) => {
        if (!touching) return;
        touchEndX = e.touches[0].clientX;
      }, { passive: true });

      stage.addEventListener('touchend', () => {
        if (!touching) return;
        touching = false;
        const dx = touchEndX - touchStartX;
        if (Math.abs(dx) > 50) {
          if (dx < 0) go(idx + 1); // swipe left → next
          else go(idx - 1);         // swipe right → prev
        }
        touchEndX = 0;
      });

      // Preload neighbors
      function preloadNeighbors() {
        const imgs = document.querySelectorAll('.slide img');
        [idx - 1, idx + 1].forEach(n => {
          if (n >= 0 && n < TOTAL) {
            const img = imgs[n];
            if (img && img.loading === 'lazy') img.loading = 'eager';
          }
        });
      }
      preloadNeighbors();
      track.addEventListener('transitionend', preloadNeighbors);
    })();
  </script>
