<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!--
  인생포트폴리오 다이어리 v1.4 — L 모노그램 SVG (옵션)

  ⚠️ 주의: v1.3에서 표지 단순화 결정에 따라 L 모노그램은 표지에서 제거되었습니다.
  본 파일은 (1) 제조사 협의로 책등에만 작게 형압을 가하거나, (2) 향후 부속 굿즈
  (인증서, 책갈피 등)에 사용할 수 있도록 백업 자산으로 제공합니다.

  사양:
  - 정사각형 60x60mm 베이스 (도련 외)
  - 색상: GOLD (#C9A04F) — 박표지/금박 인쇄용
  - Path 기반 (스케일 가능)
  - 필요시 색상 변경하여 사용
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     width="60mm" height="60mm">
  <title>LIFE PORTFOLIO L Monogram</title>
  <desc>인생포트폴리오 L 모노그램 (옵션, 표지에서 제거됨 — v1.4)</desc>

  <!-- 외곽 박스 -->
  <rect x="10" y="10" width="80" height="80"
        fill="none" stroke="#C9A04F" stroke-width="1.2" />

  <!-- 내곽 박스 -->
  <rect x="16" y="16" width="68" height="68"
        fill="none" stroke="#C9A04F" stroke-width="0.4" />

  <!-- 대문자 L 글자 (Noto Serif 스타일 패스) -->
  <path d="M 35,28 L 35,72 L 70,72 L 70,66 L 42,66 L 42,28 Z"
        fill="#C9A04F" />

  <!-- 작은 세리프 라인 -->
  <line x1="33" y1="28" x2="44" y2="28" stroke="#C9A04F" stroke-width="1.5" />
  <line x1="35" y1="72" x2="35" y2="72" stroke="#C9A04F" stroke-width="0" />

  <!-- 하단 미세 라인 (브랜드 마크 강조) -->
  <line x1="50" y1="82" x2="60" y2="82" stroke="#C9A04F" stroke-width="0.5" />
</svg>
