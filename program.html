  <style>
    :root{
      --bg:#f7f2ea; --surface:#ffffff; --text:#17212b; --muted:#5c6773;
      --line:rgba(23,33,43,0.10); --brand:#17384c; --brand2:#255874; --accent:#c78d5c; --accent-soft:#f3e3d3;
      --success:#166534; --error:#b91c1c; --shadow:0 18px 46px rgba(23,56,76,.10);
      --max:920px;
      --heading-size:13pt; --quote-size:11pt; --body-size:10pt;
    }
    *{box-sizing:border-box} html{scroll-behavior:smooth}
    body{
      margin:0; min-height:100vh; color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(199,141,92,0.10), transparent 24%),
        radial-gradient(circle at top right, rgba(37,88,116,0.10), transparent 20%),
        linear-gradient(180deg, #fbf7f1 0%, #f7f2ea 45%, #f9f5ef 100%);
      font-family:"Noto Sans KR", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      line-height:1.7; word-break:keep-all; padding:22px;
      padding-left:max(22px, env(safe-area-inset-left));
      padding-right:max(22px, env(safe-area-inset-right));
      padding-bottom:max(22px, env(safe-area-inset-bottom));
      -webkit-font-smoothing:antialiased;
      -webkit-text-size-adjust:100%;
    }
    a{color:inherit;text-decoration:none}

    .container{ max-width:var(--max); margin:0 auto; }

    .topbar{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      margin-bottom:18px; flex-wrap:wrap;
    }
    .logo{ font-size:22px; font-weight:900; color:var(--brand); letter-spacing:-0.03em; }
    .top-actions{ display:flex; gap:8px; flex-wrap:wrap; }

    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:6px;
      min-height:44px; padding:0 14px; border-radius:12px; border:none; cursor:pointer;
      font-size:13px; font-weight:900; font-family:inherit; transition:.2s ease; text-decoration:none;
      touch-action:manipulation;
    }
    .btn:hover{ transform:translateY(-1px); }
    .btn:disabled{ opacity:0.55; cursor:not-allowed; transform:none; }
    .btn-secondary{ background:#fff; color:var(--text); border:1px solid var(--line); box-shadow:0 6px 16px rgba(23,56,76,.05); }
    .btn-secondary:hover{ background:#faf8f3; border-color:rgba(23,56,76,0.14); color:var(--brand); }
    .btn-primary{ background:linear-gradient(135deg, var(--brand), var(--brand2)); color:#fff; box-shadow:0 14px 28px rgba(23,56,76,0.18); }
    .btn-accent{ background:linear-gradient(135deg, var(--accent), #b07045); color:#fff; box-shadow:0 14px 28px rgba(199,141,92,0.28); }

    /* ── 프로그램 카드 (PDF 캡처 대상: id=programRoot) ── */
    .report{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:24px;
      padding:32px 32px 28px;
      box-shadow:var(--shadow);
      font-size:var(--body-size);
    }
    @media (max-width:640px){ .report{ padding:22px 18px; } }

    .rep-header{
      border-bottom:2px solid var(--brand);
      padding-bottom:14px; margin-bottom:18px;
    }
    .rep-header h1{
      margin:0 0 6px; font-size:clamp(22px, 3.4vw, 28px);
      color:var(--brand); font-weight:900; letter-spacing:-0.04em;
    }
    .rep-header .sub{
      margin:2px 0 8px; font-size:13.5px; color:var(--brand2); font-weight:800;
    }
    .rep-header .submitted{
      display:inline-block; font-size:12px; color:var(--muted); font-weight:800;
      background:#f4ede2; padding:4px 10px; border-radius:999px; margin-right:6px;
    }
    .rep-header .type-line{
      margin:10px 0 4px; font-size:14.5px; font-weight:800; color:var(--brand2);
      letter-spacing:-0.01em;
    }

    .sec{ margin-top:22px; padding-top:8px; }
    .sec-title{
      display:flex; align-items:center; gap:10px;
      font-size:var(--heading-size); font-weight:900; color:var(--brand);
      letter-spacing:-0.02em; margin:0 0 10px;
    }
    .sec-title .ico{ font-size:18px; line-height:1; }

    .sec-body{ font-size:var(--body-size); color:#1f2937; }
    .sec-body p{ margin:0 0 8px; }

    /* 인용 / 분기 테마 박스 */
    .quote{
      font-size:var(--quote-size);
      background:#fff7ed; border-left:4px solid var(--accent);
      padding:12px 16px; border-radius:10px;
      color:#7c2d12; font-weight:800; margin:6px 0 8px;
    }
    .quarter-box{
      background:#eff6ff; border:1px solid #bfdbfe; border-radius:14px;
      padding:14px 18px;
    }
    .quarter-box h3{ margin:0 0 8px; font-size:15px; color:#1e3a8a; font-weight:900; }
    .quarter-box p{ margin:0 0 6px; font-size:13.5px; color:#0f172a; line-height:1.7; font-weight:700; }
    .quarter-box p:last-child{ margin-bottom:0; }

    /* 표지 요약 박스 */
    .cover-summary{
      display:grid; gap:8px; margin-top:10px;
    }
    .cover-summary .row{
      background:#fff; border:1px solid var(--line); border-radius:10px;
      padding:8px 12px; font-size:13px; line-height:1.6;
    }
    .cover-summary .row strong{ color:var(--brand); font-weight:900; margin-right:4px; }

    /* PR#71-C — Google L3 카드 디자인 (헤드라인 + 한 호흡 본문, 라벨 pill 폐기)
       라벨 pill은 시각적 노이즈이며 html2canvas 호환성 결함 원인이었으므로 제거.
       좌측 컬러 바(::before)가 카테고리 구분 역할을 자연스럽게 수행함. */
    .cover-summary.l3{ display:grid; gap:12px; margin-top:14px; }
    .cover-summary.l3 .l3-card{
      background:#ffffff;
      border:1px solid var(--line); border-radius:14px;
      padding:16px 18px 16px 22px;
      box-shadow:0 1px 2px rgba(15,23,42,.04);
      position:relative; overflow:hidden;
      page-break-inside:avoid; break-inside:avoid;
    }
    .cover-summary.l3 .l3-card::before{
      content:""; position:absolute; left:0; top:0; bottom:0; width:4px;
      background:linear-gradient(180deg,#1e40af 0%,#3b82f6 100%);
      border-radius:14px 0 0 14px;
    }
    .cover-summary.l3 .l3-head{
      font-size:15.5px; font-weight:900; color:#0f172a;
      line-height:1.45; margin:0 0 6px;
      letter-spacing:-.01em;
    }
    .cover-summary.l3 .l3-body{
      font-size:13.5px; font-weight:600; color:#334155;
      line-height:1.65; margin:0;
    }
    @media (min-width: 720px){
      .cover-summary.l3{ grid-template-columns:1fr 1fr; }
      .cover-summary.l3 .l3-card:nth-child(5){ grid-column:1 / -1; }
    }
    .arrow-line{
      margin-top:10px; padding:10px 14px; border-radius:10px;
      background:#f0fdf4; border:1px solid rgba(22,101,52,0.20);
      color:#14532d; font-weight:900; font-size:13.5px;
    }

    /* 3주 루틴 */
    .week-card{
      background:#fff; border:1px solid var(--line); border-radius:14px;
      padding:14px 16px; margin-top:10px;
    }
    .week-card .top{
      display:flex; align-items:center; gap:10px; margin-bottom:8px;
      border-bottom:1px solid var(--line); padding-bottom:6px;
    }
    .week-card .top .num{
      background:var(--brand); color:#fff; font-weight:900;
      padding:4px 10px; border-radius:999px; font-size:12px;
    }
    .week-card .top .ttl{ font-size:14.5px; font-weight:900; color:var(--brand); }
    .week-card .top .pct{ margin-left:auto; font-size:12px; color:var(--muted); font-weight:800; }
    .week-card .row{ display:flex; align-items:flex-start; gap:10px; margin:6px 0; font-size:13px; line-height:1.6; }
    .week-card .row .lbl{
      flex-shrink:0; font-size:11px; font-weight:900; color:#fff;
      padding:3px 10px; border-radius:999px; min-width:70px; text-align:center;
      background:var(--brand2);
    }
    .week-card .row.guide .lbl{ background:#0f766e; }
    .week-card .row.actions .lbl{ background:var(--brand2); }
    .week-card .row.effects .lbl{ background:#c2410c; }
    .week-card .row .val{ flex:1; min-width:0; color:#0f172a; font-weight:700; }
    .week-card .row.actions ul{ margin:0; padding-left:18px; }
    .week-card .row.actions li{ margin-bottom:4px; font-weight:700; color:#1f2937; }
    .week-card .row.effects .val{
      color:#7c2d12; background:#fff7ed; border-left:3px solid var(--accent);
      padding:8px 12px; border-radius:8px; font-weight:900;
    }

    /* 3개월 / 1년 박스 */
    .goal-list{ list-style:none; padding:0; margin:6px 0 0; display:grid; gap:8px; }
    .goal-list li{
      background:#fff; border:1px solid var(--line); border-radius:12px;
      padding:10px 14px; font-size:13px;
    }
    .goal-list li strong{ display:block; color:var(--brand); font-weight:900; margin-bottom:2px; }
    .goal-list li small{ color:var(--muted); font-weight:800; }

    .vision-box{
      background:#fef3c7; border:1px solid #fcd34d; border-radius:14px;
      padding:12px 16px; margin-top:6px;
    }
    .vision-box .v-label{ font-size:12px; font-weight:900; color:#92400e; margin-bottom:4px; }
    .vision-box p{ margin:0 0 4px; font-weight:800; color:#0f172a; }
    .vision-box ul{ margin:6px 0 0; padding-left:18px; }
    .vision-box li{ margin-bottom:3px; font-weight:800; color:#1f2937; }

    /* 모듈 카드 */
    .module-grid{ display:grid; gap:10px; margin-top:6px; }
    .module-card{
      background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px 16px;
    }
    .module-card .head{
      display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap;
    }
    .module-card .badge{
      background:var(--accent); color:#fff; font-weight:900; font-size:11.5px;
      padding:3px 10px; border-radius:999px;
    }
    .module-card .badge.b-2{ background:var(--success); }
    .module-card .badge.b-3{ background:var(--brand); }
    .module-card .ttl{ font-size:14.5px; font-weight:900; color:var(--brand); }
    .module-card .summary{ font-size:13px; color:#334155; font-weight:700; margin-bottom:6px; }
    .module-card ul{ margin:4px 0 0; padding-left:18px; }
    .module-card li{ font-size:12.5px; font-weight:700; color:#1f2937; margin-bottom:3px; }
    .module-card .tools{
      margin-top:8px; padding:8px 10px; border-radius:8px;
      background:#f4ede2; color:#7c2d12; font-size:12px; font-weight:800;
    }
    .module-card .booster{
      margin-top:8px; padding:8px 12px; border-radius:8px;
      background:#fef2f2; border:1px solid #fecaca; color:#7c2d12; font-size:12.5px; font-weight:800;
    }

    /* 추적 보드 표 */
    .ep-table{
      width:100%; border-collapse:separate; border-spacing:0;
      border:1px solid var(--line); border-radius:12px; overflow:hidden;
      font-size:var(--body-size); margin-top:6px;
    }
    .ep-table th, .ep-table td{
      padding:10px 12px; text-align:left; vertical-align:top;
      border-bottom:1px solid var(--line);
    }
    .ep-table tr:last-child th, .ep-table tr:last-child td{ border-bottom:none; }
    .ep-table th{ background:#f4ede2; color:var(--brand); font-weight:900; }
    .ep-table td{ background:#fff; color:#1f2937; font-weight:700; }
    .ep-table td.cell-y{ width:88px; text-align:center; color:var(--muted); }
    .board-hint{
      margin-top:8px; font-size:12px; font-weight:800; color:var(--muted);
    }
    .monthly-list{ margin-top:10px; padding:10px 14px; border-radius:10px; background:#eff6ff; border:1px solid #bfdbfe; }
    .monthly-list strong{ display:block; color:#1e3a8a; font-weight:900; margin-bottom:4px; font-size:12.5px; }
    .monthly-list ul{ margin:0; padding-left:18px; }
    .monthly-list li{ font-size:12.5px; font-weight:700; color:#0f172a; margin-bottom:2px; }

    /* 기대 효과 */
    .effects-list{ list-style:none; padding:0; margin:0; display:grid; gap:8px; }
    .effects-list li{
      background:#fff; border:1px solid var(--line); border-radius:10px;
      padding:8px 12px; font-size:13px; font-weight:800; color:#1f2937;
    }
    .effects-list li strong{ color:var(--brand); }
    .new-paths{
      margin-top:10px; padding:10px 14px; border-radius:10px;
      background:#f0fdf4; border:1px solid rgba(22,101,52,0.20); color:#14532d;
      font-size:12.5px; font-weight:900;
    }
    .new-paths .lbl{ color:var(--success); margin-right:6px; }

    /* 다음 단계 */
    .next-list{ list-style:none; padding:0; margin:0; display:grid; gap:8px; }
    .next-list li{
      background:#fff; border:1px solid var(--line); border-radius:10px;

    // 한국어 prefix를 가진 string에서 prefix를 i18n으로 교체
    // 예: "성향: 원칙 중심의 분석적 설계자 — ..." → "Personality: Principled Analytical Designer — ..."
    function _xlatePrefixed(s, koPrefix, i18nKey, prefixFallback){
      if (typeof s !== "string" || _lang() === "ko") return s;
      if (s.indexOf(koPrefix) !== 0) return s;

      return enPrefix + s.slice(koPrefix.length);

    // 매핑 테이블 기반 단일 토큰 변환 (전체 문자열이 매핑에 있을 때만)
    function _xlateToken(s, table){
      if (typeof s !== "string" || _lang() === "ko") return s;
      // 정확 매치
      if (table[s]) return table[s];
      // 부분 치환 (모든 키를 순회하며 contains 시 치환)
      let out = s;
      Object.keys(table).forEach(function(k){
        if (out.indexOf(k) >= 0) out = out.split(k).join(table[k]);
      });
      return out;
    }

      out = _xlateToken(out, PROGRAM_I18N_MAP.toneTagline);
      // 적합환경/화살표/분기테마
      out = _xlateToken(out, PROGRAM_I18N_MAP.envByTone);
      out = _xlateToken(out, PROGRAM_I18N_MAP.arrowByTone);
      out = _xlateToken(out, PROGRAM_I18N_MAP.quarterTheme);

    /* engine output 객체에 i18n 변환 적용 (deep clone 후 변환된 사본 반환) */
    /* rules.json의 _en 필드를 기반으로 KO→EN 매핑 테이블 동적 생성 */
    function buildRulesKo2En(rules){
      const map = {};
      if (!rules) return map;
      // format / spec
      if (rules.format && rules.format.title && rules.format.title_en) map[rules.format.title] = rules.format.title_en;
      if (rules.format && rules.format.subtitleTemplate && rules.format.subtitleTemplate_en) {
        // {name} 자리표시자가 들어 있으므로 등록만, 실제 치환은 별도 (subtitle은 engine이 자체 생성)
        map["__subtitle_template__"] = { ko: rules.format.subtitleTemplate, en: rules.format.subtitleTemplate_en };
      }
      if (rules.format && rules.format.service && rules.format.service_en) map[rules.format.service] = rules.format.service_en;
      if (rules.spec && rules.spec_en) map[rules.spec] = rules.spec_en;

      // tones
      const tones = rules.tones || {};
      Object.keys(tones).forEach(function(tk){
        const t = tones[tk] || {};
        function reg(ko, en){ if (typeof ko === "string" && typeof en === "string") map[ko] = en; }
        function regArr(koArr, enArr){
          if (!Array.isArray(koArr) || !Array.isArray(enArr)) return;
          koArr.forEach(function(k, i){ if (typeof k === "string" && typeof enArr[i] === "string") map[k] = enArr[i]; });
        }
        reg(t.label, t.label_en);
        reg(t.tagline, t.tagline_en);
        reg(t.quarterTheme, t.quarterTheme_en);
        regArr(t.quarterLeadParas, t.quarterLeadParas_en);
        // weeks
        (t.weeks || []).forEach(function(w){
          reg(w.title, w.title_en);
          regArr(w.actions, w.actions_en);
        });
        // month3Goals
        (t.month3Goals || []).forEach(function(g){
          reg(g.title, g.title_en);
          reg(g.criterion, g.criterion_en);
        });
        // year1
        if (t.year1){
          regArr(t.year1.vision, t.year1.vision_en);
          regArr(t.year1.milestones, t.year1.milestones_en);
        }
        // modules
        (t.modules || []).forEach(function(m){
          reg(m.title, m.title_en);
          reg(m.summary, m.summary_en);
          regArr(m.actions, m.actions_en);
        });
        // trackBoard
        regArr(t.trackBoardWeekly, t.trackBoardWeekly_en);
        regArr(t.trackBoardMonthly, t.trackBoardMonthly_en);
        // risks
        (t.risks || []).forEach(function(r){
          reg(r.risk, r.risk_en);
          reg(r.mitigation, r.mitigation_en);
        });
        // effects (fitJob/expansion/career/vision: body without prefix)
        if (t.effects){
          reg(t.effects.fitJob, t.effects.fitJob_en);
          reg(t.effects.expansion, t.effects.expansion_en);
          reg(t.effects.career, t.effects.career_en);
          reg(t.effects.vision, t.effects.vision_en);
        }
        // newPaths
        regArr(t.newPaths, t.newPaths_en);
        // nextSteps (m1/m3/y1)
        if (t.nextSteps){
          reg(t.nextSteps.m1, t.nextSteps.m1_en);
          reg(t.nextSteps.m3, t.nextSteps.m3_en);
          reg(t.nextSteps.y1, t.nextSteps.y1_en);
        }
        // closing
        regArr(t.closing, t.closing_en);
      });

      // axisHints (4개)
      if (rules.axisHints){
        ["self_understanding","self_expression","self_design","self_execution"].forEach(function(k){
          if (rules.axisHints[k] && rules.axisHints[k+"_en"]) map[rules.axisHints[k]] = rules.axisHints[k+"_en"];
        });
      }
      // weakAxisBoosters
      if (rules.weakAxisBoosters){
        ["self_understanding","self_expression","self_design","self_execution"].forEach(function(k){
          const ko = rules.weakAxisBoosters[k], en = rules.weakAxisBoosters[k+"_en"];
          if (Array.isArray(ko) && Array.isArray(en)){
            ko.forEach(function(s, i){ if (typeof s === "string" && typeof en[i] === "string") map[s] = en[i]; });
          }
        });
      }
      // footerNotice
      if (rules.footerNotice){
        if (Array.isArray(rules.footerNotice.lines) && Array.isArray(rules.footerNotice.lines_en)){
          rules.footerNotice.lines.forEach(function(s,i){
            if (typeof s === "string" && typeof rules.footerNotice.lines_en[i] === "string") map[s] = rules.footerNotice.lines_en[i];
          });
        }
        if (Array.isArray(rules.footerNotice.qualityChecklist) && Array.isArray(rules.footerNotice.qualityChecklist_en)){
          rules.footerNotice.qualityChecklist.forEach(function(s,i){
            if (typeof s === "string" && typeof rules.footerNotice.qualityChecklist_en[i] === "string") map[s] = rules.footerNotice.qualityChecklist_en[i];
          });
        }
      }
      return map;
    }

    /* 깊은 객체에 대해 RULES_KO2EN 매핑을 적용 — 문자열 정확 일치 시 치환 */
    function _applyRulesMapDeep(obj, ko2en, skipPaths){
      if (!ko2en) return;
      const skip = skipPaths || {};
      function walk(v, parent, key, path){
        if (typeof v === "string"){
          if (skip[path]) return;
          if (Object.prototype.hasOwnProperty.call(ko2en, v)){
            parent[key] = ko2en[v];
          }
        } else if (Array.isArray(v)){
          v.forEach(function(x, i){ walk(x, v, i, path+"["+i+"]"); });
        } else if (v && typeof v === "object"){
          for (const k in v){ walk(v[k], v, k, path+"."+k); }
        }
      }
      if (Array.isArray(obj)){
        obj.forEach(function(x, i){ walk(x, obj, i, "["+i+"]"); });
      } else if (obj && typeof obj === "object"){
        for (const k in obj){ walk(obj[k], obj, k, k); }
      }
    }

    async function loadAndRender(user, sid){
      // PR#41: 모바일 RTDB 안정화 — _safeGet (REST/SDK 다층 폴백)으로 timeout 우회
      const snap = await _safeGet(`programs/${user.uid}/${sid}`, "program-load");
      if (!snap.exists() || !snap.val() || !snap.val().program){
        // 프로그램이 없으면 자동 생성 페이지로 보냄
        setStatus("info", _t('program.info_redirect_create', "이 sid로 생성된 실행 프로그램이 없습니다. 자동 생성 페이지로 이동합니다..."));
        setTimeout(() => location.replace("program-loading.html?sid=" + encodeURIComponent(sid)), 700);
        return;
      }
      const stored = snap.val();
      currentProgram = stored.program;
      const name = (currentProgram.meta && currentProgram.meta.name) || _t('program.default_name', "고객");
      currentPdfFilename = _t('program.pdf_filename_template', "{name}님_맞춤_실행_프로그램.pdf").replace('{name}', name);

      // PR#34: 실행 프로그램은 짝이 되는 리포트의 생성 시점 언어로 잠근다
      //  - reports/{uid}/{sid}.lang 또는 program 자체의 meta.lang을 신뢰원으로 사용
      try {
        let _lockLang = (stored.lang || (currentProgram && currentProgram.meta && currentProgram.meta.lang));
        if (!_lockLang) {
          try {
            // PR#41: REST 폴백 적용
            const repSnap = await _safeGet(`reports/${user.uid}/${sid}`, "program-lang-xref");
            if (repSnap.exists()) {
              const rv = repSnap.val() || {};
              _lockLang = rv.lang || (rv.report && rv.report.lang) || 'ko';
            }
          } catch(_) {}
        }
        _lockLang = (_lockLang === 'en') ? 'en' : 'ko';
        document.documentElement.setAttribute('lang', _lockLang);
        // PR#35: setLang(lc, {persist:false, silent:true}) — localStorage.lp_lang 오염 방지 + 부팅 alert 차단
        if (window.LP_I18N && typeof window.LP_I18N.setLang === "function" && window.LP_I18N.lang !== _lockLang) {
          window.LP_I18N.setLang(_lockLang, { persist: false, silent: true });
        }
        window._lpProgramLang = _lockLang;
        // PR#40: 상단 '마이페이지' / '원본 리포트' 링크에 프로그램 언어를 부착 → 영문 프로그램에서 누르면 영문 페이지로 이동
        try {
          var _myLink = document.getElementById('topMypageLink');
          if (_myLink) {
            _myLink.setAttribute('href', _lockLang === 'en' ? 'mypage.html?lang=en' : 'mypage.html');
          }
          var _rpLink = document.getElementById('reportLink');
          if (_rpLink) {
            var _base = 'report.html?sid=' + encodeURIComponent(sid);
            _rpLink.setAttribute('href', _lockLang === 'en' ? (_base + '&lang=en') : _base);
          }
        } catch(_){}
      } catch(_) {}

      // EN 모드일 경우 rules.json을 미리 로드해 KO→EN 매핑 빌드 (KO 모드는 스킵)
      if (_lang() !== "ko" && !RULES_KO2EN){
        try {
          if (!cachedRules){
            const v = Date.now();
            cachedRules = await fetch("data/program-rules.json?v=" + v, { cache: "no-store" }).then(r => r.json());
          }
          RULES_KO2EN = buildRulesKo2En(cachedRules);
        } catch(e){
          console.warn("[program i18n] rules.json load failed; falling back to static maps:", e);
          RULES_KO2EN = {};
        }
      }

      renderProgram(currentProgram);
      setStatus("success", _t('program.status_loaded_ok', "✅ 맞춤 실행 프로그램이 준비되었습니다."));
      setTimeout(() => { statusBox.style.opacity = "0.0"; statusBox.style.transition = "opacity .6s"; }, 4500);
    }

      // PR#71: 모바일/PC 동일 결과 보장 — 캡처 폭 PC 고정(860px)
      const PDF_CAPTURE_WIDTH = 860;
      void programRoot.offsetWidth; // 강제 reflow
      try { if (document.fonts && document.fonts.ready) await document.fonts.ready; } catch(_){}
      await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

      try {
        const jsPDF = window.jspdf.jsPDF;
        const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
        const pageW = pdf.internal.pageSize.getWidth();
        const pageH = pdf.internal.pageSize.getHeight();
        const marginX = 8, marginTopFirst = 8, marginTop = 10, marginBottom = 10;
        const contentW = pageW - marginX * 2;
        const maxContentH = pageH - marginTop - marginBottom;
        const maxFirstH = pageH - marginTopFirst - marginBottom;

        // PR#71-C: 섹션 단위 캡처로 복귀 (PR#71-B 카드 청크 분할 폐기 — 중복 출력 결함 차단)
        // PR#71-D: 픽셀 분할 시 자식 안전 경계(safeCuts) 좌표 사전 계산 — 카드/항목 중간 절단 차단
        let blocks = [];
        const headerEl = programRoot.querySelector(".rep-header");
        if (headerEl) blocks.push(headerEl);
        programRoot.querySelectorAll(".sec").forEach(el => blocks.push(el));
        const footerEl = programRoot.querySelector(".rep-footer");
        if (footerEl && blocks.indexOf(footerEl) < 0) blocks.push(footerEl);
        if (blocks.length === 0) blocks = [programRoot];

        // PR#71-D: 자식 안전 경계 셀렉터 — 이 요소들의 시작 y좌표(블록 내부 기준)를 안전 절단선으로 활용
        //   - 페이지 한 장에 들어가지 않는 큰 섹션을 픽셀 분할할 때, 카드/항목 경계를 찾아 자연스럽게 절단
        const SAFE_CUT_SELECTORS = [
          ".week-card", ".module-card", ".l3-card",
          ".goal-list > li", ".vision-box",
          ".quote", ".arrow-line", ".quarter-box",
          "h2.sec-title", "h3"
        ].join(",");

        const rendered = [];
        for (const bEl of blocks){
          const canvas = await window.html2canvas(bEl, {
            scale: 2, backgroundColor: "#ffffff", useCORS: true, allowTaint: true,
            logging: false,
            windowWidth: PDF_CAPTURE_WIDTH,
            width: bEl.offsetWidth || PDF_CAPTURE_WIDTH
          });
          const hMm = canvas.height * contentW / canvas.width;

          // PR#71-D: 안전 경계 좌표 수집 (캔버스 픽셀 기준)
          //   - bEl 의 getBoundingClientRect().top 를 0 으로 잡고, 자식 요소들의 top - parentTop 을 픽셀로 환산
          //   - html2canvas scale=2 이므로 css px → canvas px 변환에 scaleFactor 적용
          const safeCutsPx = [];
          try {
            const parentRect = bEl.getBoundingClientRect();
            const scaleFactor = canvas.height / Math.max(1, bEl.offsetHeight); // 일반적으로 ≒ 2
            bEl.querySelectorAll(SAFE_CUT_SELECTORS).forEach(function(child){
              const r = child.getBoundingClientRect();
              const offsetCssPx = r.top - parentRect.top;
              if (offsetCssPx > 0 && offsetCssPx < bEl.offsetHeight) {
                safeCutsPx.push(Math.round(offsetCssPx * scaleFactor));
              }
            });
            // 정렬 + 중복 제거
            safeCutsPx.sort(function(a,b){ return a-b; });
            for (let i = safeCutsPx.length - 1; i > 0; i--) {
              if (safeCutsPx[i] - safeCutsPx[i-1] < 4) safeCutsPx.splice(i, 1);
            }
          } catch(_safeErr) { /* 안전 경계 계산 실패 시 기존 단순 분할로 폴백 */ }

          rendered.push({ data: canvas.toDataURL("image/jpeg", 0.92), wPx: canvas.width, hPx: canvas.height, hMm: hMm, safeCutsPx: safeCutsPx });
        }

        let curY = marginTopFirst, curMaxH = maxFirstH, pageIndex = 0;
        function newPage(){ pdf.addPage(); pageIndex++; curY = marginTop; curMaxH = maxContentH; }

        // PR#71-D: 안전 경계 기반 절단선 선택 — offsetPx 부터 maxHpx 안에서 마지막 안전선 사용
        //   - 안전선이 없거나 너무 가까우면(전체의 50% 미만) 단순 maxHpx 사용 (무한 루프 방지)
        function pickSafeCutPx(safeCuts, offsetPx, maxHpx, totalHpx){
          if (!safeCuts || safeCuts.length === 0) return Math.min(maxHpx, totalHpx - offsetPx);
          const limit = offsetPx + maxHpx;
          let best = -1;
          for (let i = 0; i < safeCuts.length; i++) {
            if (safeCuts[i] > offsetPx && safeCuts[i] <= limit) best = safeCuts[i];
            else if (safeCuts[i] > limit) break;
          }
          if (best < 0) return Math.min(maxHpx, totalHpx - offsetPx);
          const sliceHpx = best - offsetPx;
          // 슬라이스가 너무 작으면(페이지 50% 미만) 안전 경계 무시 — 페이지 낭비 방지
          if (sliceHpx < maxHpx * 0.5) return Math.min(maxHpx, totalHpx - offsetPx);
          return sliceHpx;
        }

        for (const blk of rendered){
          if (blk.hMm <= curMaxH - (curY - (pageIndex === 0 ? marginTopFirst : marginTop))){
            pdf.addImage(blk.data, "JPEG", marginX, curY, contentW, blk.hMm, undefined, "FAST");
            curY += blk.hMm + 4;
            const remaining = (pageIndex === 0 ? marginTopFirst + maxFirstH : marginTop + maxContentH) - curY;
            if (remaining < 30) newPage();
            continue;
          }
          if (curY > (pageIndex === 0 ? marginTopFirst : marginTop) + 5) newPage();

          if (blk.hMm > maxContentH){
            const pxPerMm = blk.hPx / blk.hMm;
            const pageHpx = Math.floor(maxContentH * pxPerMm);
            const srcCanvas = document.createElement("canvas");
            const img = new Image();
            await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = blk.data; });
            let offsetPx = 0;
            while (offsetPx < blk.hPx){
              // PR#71-D: 안전 경계 우선 절단 (마지막 슬라이스는 잔량 사용)
              let sliceHpx;
              if (blk.hPx - offsetPx <= pageHpx) {
                sliceHpx = blk.hPx - offsetPx; // 잔량
              } else {
                sliceHpx = pickSafeCutPx(blk.safeCutsPx, offsetPx, pageHpx, blk.hPx);
              }
              srcCanvas.width = blk.wPx; srcCanvas.height = sliceHpx;
              const ctx = srcCanvas.getContext("2d");
              ctx.fillStyle = "#ffffff"; ctx.fillRect(0, 0, srcCanvas.width, srcCanvas.height);
              ctx.drawImage(img, 0, -offsetPx);
              const sliceData = srcCanvas.toDataURL("image/jpeg", 0.92);
              const sliceHmm = sliceHpx / pxPerMm;
              pdf.addImage(sliceData, "JPEG", marginX, curY, contentW, sliceHmm, undefined, "FAST");
              offsetPx += sliceHpx;
              if (offsetPx < blk.hPx) newPage();
              else curY += sliceHmm + 4;
            }
          } else {
            pdf.addImage(blk.data, "JPEG", marginX, curY, contentW, blk.hMm, undefined, "FAST");
            curY += blk.hMm + 4;
          }
        }

        // PR#74: PDF 우하단 워터마크 — 이메일 마스킹 + 생성일시 (영문/숫자만, jsPDF 기본 폰트 안전)
        //   목적: 유출 시 추적 가능. 사생활 보호를 위해 이메일은 마스킹(abc***@gmail.com)
        //   안전: 한글 미포함 → jsPDF Helvetica 인코딩 결함 회피
        try {
          var __wmEmail = "";
          try { __wmEmail = (auth.currentUser && auth.currentUser.email) || currentEmailTo || ""; } catch(_){}
          var __wmMasked = "";
          if (__wmEmail && __wmEmail.indexOf("@") > 0) {
            var __parts = __wmEmail.split("@");
            var __loc = __parts[0] || "";
            __wmMasked = (__loc.length <= 3 ? __loc : __loc.slice(0, 3)) + "***@" + (__parts[1] || "");
          }
          var __wmDate = "";
          try {
            var __d = new Date();
            __wmDate = __d.getUTCFullYear() + "-" +
                       String(__d.getUTCMonth()+1).padStart(2,"0") + "-" +
                       String(__d.getUTCDate()).padStart(2,"0") + " " +
                       String(__d.getUTCHours()).padStart(2,"0") + ":" +
                       String(__d.getUTCMinutes()).padStart(2,"0") + " UTC";
          } catch(_){}
          var __wmText = (__wmMasked ? __wmMasked + " | " : "") + __wmDate;
          if (__wmText) {
            var __pageCount = pdf.internal.getNumberOfPages();
            for (var __pi = 1; __pi <= __pageCount; __pi++) {
              pdf.setPage(__pi);
              pdf.setFontSize(7);
              pdf.setTextColor(160, 160, 160);
              pdf.text(__wmText, pageW - marginX, pageH - 3, { align: "right" });

        } catch(__wmErr) { console.warn("[PDF] watermark skipped:", __wmErr && __wmErr.message); }

        pdf.save(currentPdfFilename);
      } catch(e){
        console.error("[Program] PDF error:", e);
        alert(_t('program.alert_pdf_error', "PDF 생성 중 오류가 발생했습니다: ") + (e && e.message || ""));
      } finally {
        document.body.classList.remove("pdf-capture");
        pdfBtn.disabled = false;
        pdfBtn.textContent = orig;
      }

    function loadScriptOnce(src, checkFn, timeoutMs){
      return new Promise((resolve, reject) => {
        if (checkFn && checkFn()) return resolve();
        const s = document.createElement("script");
        s.src = src; s.crossOrigin = "anonymous";
        let done = false;
        const timer = setTimeout(() => { if (done) return; done = true; reject(new Error("script load timeout: " + src)); }, timeoutMs || 8000);
        s.onload = () => {
          if (done) return;
          const t0 = Date.now();
          const iv = setInterval(() => {
            if (checkFn && checkFn()){ clearInterval(iv); clearTimeout(timer); done = true; resolve(); }
            else if (Date.now() - t0 > 1000){ clearInterval(iv); clearTimeout(timer); done = true; resolve(); }
          }, 50);
        };
        s.onerror = () => { if (done) return; done = true; clearTimeout(timer); reject(new Error("script load failed: " + src)); };
        document.head.appendChild(s);
      });
    }
    async function loadFromAnySource(sources, checkFn){
      let lastErr = null;
      for (const src of sources){
        if (checkFn && checkFn()) return;
        try { await loadScriptOnce(src, checkFn, 8000); if (checkFn && checkFn()) return; }
        catch(e){ lastErr = e; }
      }
      throw lastErr || new Error("all CDN sources failed");
    }

            throw new Error(_t('program.regen_limit_reached', "재생성 횟수가 한도에 도달했습니다. 더 이상 재생성할 수 없습니다."));
          }
          // PR#61: 보안 규칙(<=999) 안전 범위 내에서 단조증가 유지하되, 표시상 무제한처럼 동작
          const __nextEditCount = Math.min(prevEditCount + 1, 999);
          // 가변 필드만 update — sid/sourceSid/generatedAt/engineVersion/rulesVersion 은 불변이므로 보내지 않음
          // PR#34: lang은 기존 값 유지 (재생성이라도 생성 시점 언어로 잠금)
          // PR#71-D: _safeWrite 적용 — 모바일 set/update 무한 대기 결함 처치
          await _safeWrite("update", `programs/${user.uid}/${currentSid}`, {
            toneKey: program.meta.toneKey,
            name: program.meta.name,
            lang: _lockedLang,
            program: program,
            manualOverrideHtml: null,
            manualProgramStatus: "auto",
            editCount: __nextEditCount,
            lastEditedAt: { ".sv": "timestamp" }
          }, "regen-update-prog");
        } else {
          // 신규 생성 — 모든 필드 set
          // PR#71-D: _safeWrite 적용
          await _safeWrite("set", `programs/${user.uid}/${currentSid}`, {
            sid: currentSid,
            sourceSid: currentSid,
            generatedAt: { ".sv": "timestamp" },
            engineVersion: window.ProgramEngine.version || "v1.0",
            rulesVersion: rules.version || "v1.0",
            toneKey: program.meta.toneKey,
            name: program.meta.name,
            lang: _lockedLang,
            program: program,
            manualOverrideHtml: null,
            manualProgramStatus: "auto",
            editCount: 0,
            lastEditedAt: { ".sv": "timestamp" }
          }, "regen-set-prog");
        }
        // users/{uid}/programs/{sid} 인덱스 — sid/sourceSid/generatedAt 도 불변이므로 신규일 때만 set
        // PR#34: 인덱스에도 lang 보존
        // PR#41: REST 폴백 적용 / PR#71-D: write 폴백 추가
        const idxProgSnap = await _safeGet(`users/${user.uid}/programs/${currentSid}`, "regen-idx-prog");
        if (idxProgSnap.exists()) {
          await _safeWrite("update", `users/${user.uid}/programs/${currentSid}`, {
            toneKey: program.meta.toneKey,
            name: program.meta.name,
            lang: _lockedLang
          }, "regen-update-idx");
        } else {
          await _safeWrite("set", `users/${user.uid}/programs/${currentSid}`, {
            sid: currentSid,
            sourceSid: currentSid,
            generatedAt: { ".sv": "timestamp" },
            toneKey: program.meta.toneKey,
            name: program.meta.name,
            lang: _lockedLang
          }, "regen-set-idx");
        }

        currentProgram = program;
        currentPdfFilename = _t('program.pdf_filename_template', "{name}님_맞춤_실행_프로그램.pdf").replace('{name}', name);
        renderProgram(program);
        setStatus("success", _t('program.ok_regen', "✅ 최신 엔진으로 실행 프로그램이 재생성되었습니다."));
        setTimeout(() => { statusBox.style.opacity = "0.0"; statusBox.style.transition = "opacity .6s"; }, 6000);
      } catch(e){
        console.error("[Program] 재생성 실패:", e);
        var __failPrefix = _t('program.regen_failed_prefix', "재생성 실패:");
        setStatus("error", __failPrefix + " " + (e && e.message || ""));
        alert(__failPrefix + " " + (e && e.message || ""));
      } finally {
        regenBtn.disabled = false;
        regenBtn.textContent = orig;
      }
    });

    /* ─────────────────────────── 이메일 (클립보드 + Gmail/Outlook 모달) ─────────────────────────── */
    emailBtn.addEventListener("click", () => {
      const name = (currentProgram && currentProgram.meta && currentProgram.meta.name) || "";
      const publishedAt = (currentProgram && currentProgram.meta && currentProgram.meta.publishedAt) || "";
      const ownerSuffix = _t('program.email_subject_suffix_owner', "님의 ");
      const programLabel = _t('program.email_subject_program', "맞춤 실행 프로그램");
      const subj = (name ? name + ownerSuffix : "") + programLabel + (publishedAt ? " (" + publishedAt + ")" : "");
      const body =
        _t('program.email_body', "안녕하세요. 인생포트폴리오 맞춤 실행 프로그램을 공유드립니다.\n\n▶ 본 메시지에 PDF 파일을 첨부해 보내주세요.\n  (먼저 [PDF 다운로드] 버튼으로 PDF를 받은 뒤, 메일에 첨부)\n\n▶ 프로그램 페이지: ") +
        location.href +
        _t('program.email_body_outro', "\n\n감사합니다.");

      const prev = document.getElementById("emailDialog");
      if (prev) prev.remove();

      const overlay = document.createElement("div");
      overlay.id = "emailDialog";
      overlay.style.cssText = "position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:18px;";

      const card = document.createElement("div");
      card.style.cssText = "background:#fff;border-radius:18px;padding:22px 22px 18px;max-width:480px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.25);font-family:inherit;";
      card.innerHTML =
        '<h2 style="margin:0 0 8px;font-size:18px;color:#17384c;font-weight:900;">' + escapeHtml(_t('program.email_dialog_title', "📧 이메일로 보내기")) + '</h2>' +
        '<p style="margin:0 0 12px;font-size:13px;color:#475569;font-weight:700;line-height:1.6;">' +
        _t('program.email_dialog_intro_html', '제목 / 본문을 <strong>클립보드에 복사</strong>한 뒤, 원하는 메일 서비스로 이동해 붙여넣기만 하면 됩니다.<br><small style="color:#7c2d12;">PDF는 [PDF 다운로드] 버튼으로 먼저 받아 첨부해 주세요.</small>') +
        '</p>' +
        '<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:12.5px;color:#0f172a;font-weight:700;line-height:1.6;margin-bottom:10px;">' +
        '  <div><strong>' + escapeHtml(_t('program.email_label_subject', "제목:")) + '</strong> <span id="emSubj"></span></div>' +
        '  <div style="margin-top:6px;"><strong>' + escapeHtml(_t('program.email_label_to', "받는사람:")) + '</strong> <span id="emTo"></span></div>' +
        '</div>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
        '  <button id="emCopy"    type="button" style="flex:1;min-width:130px;padding:10px;border:none;border-radius:10px;background:#17384c;color:#fff;font-weight:900;cursor:pointer;">' + escapeHtml(_t('program.email_copy_btn', "📋 제목+본문 복사")) + '</button>' +
        '  <a id="emGmail"   target="_blank" rel="noopener" style="flex:1;min-width:130px;padding:10px;border-radius:10px;background:#dc2626;color:#fff;font-weight:900;text-align:center;text-decoration:none;">' + escapeHtml(_t('program.email_btn_gmail', "Gmail 열기")) + '</a>' +
        '  <a id="emOutlook" target="_blank" rel="noopener" style="flex:1;min-width:130px;padding:10px;border-radius:10px;background:#0078d4;color:#fff;font-weight:900;text-align:center;text-decoration:none;">' + escapeHtml(_t('program.email_btn_outlook', "Outlook 열기")) + '</a>' +
        '</div>' +
        '<div style="margin-top:10px;text-align:right;">' +
        '  <button id="emClose" type="button" style="padding:8px 14px;border:1px solid #cbd5e1;background:#fff;border-radius:10px;font-weight:800;cursor:pointer;">' + escapeHtml(_t('program.email_close', "닫기")) + '</button>' +
        '</div>';

      overlay.appendChild(card);
      document.body.appendChild(overlay);

      const to = currentEmailTo || "";
      card.querySelector("#emSubj").textContent = subj;
      card.querySelector("#emTo").textContent   = to || _t('program.email_to_default', "(직접 입력)");
      card.querySelector("#emGmail").href   = "https://mail.google.com/mail/?view=cm&fs=1&to=" + encodeURIComponent(to) + "&su=" + encodeURIComponent(subj) + "&body=" + encodeURIComponent(body);
      card.querySelector("#emOutlook").href = "https://outlook.live.com/mail/0/deeplink/compose?to=" + encodeURIComponent(to) + "&subject=" + encodeURIComponent(subj) + "&body=" + encodeURIComponent(body);

      card.querySelector("#emCopy").addEventListener("click", async () => {
        const text = _t('program.email_copy_text_prefix', "제목:") + " " + subj + "\n\n" + body;
        try {
          await navigator.clipboard.writeText(text);
          card.querySelector("#emCopy").textContent = _t('program.email_copy_done', "✅ 복사 완료!");
        } catch(e){
          alert(_t('program.email_copy_fail_alert', "자동 복사에 실패했습니다. 직접 선택해 복사해 주세요.\n\n") + text);
        }
      });
      card.querySelector("#emClose").addEventListener("click", () => overlay.remove());
      overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });
    });

    // i18n runtime + 언어 변경 시 동적 콘텐츠 재렌더링
    (function(){
      var s = document.createElement('script');
      s.src = 'assets/i18n/i18n.js';
      s.onload = function(){
        if (window.LP_I18N && typeof window.LP_I18N.onReady === "function"){
          window.LP_I18N.onReady(function(){
            if (currentProgram) {
              try {
                renderProgram(currentProgram);
                const name = (currentProgram.meta && currentProgram.meta.name) || _t('program.default_name', "고객");
                currentPdfFilename = _t('program.pdf_filename_template', "{name}님_맞춤_실행_프로그램.pdf").replace('{name}', name);
              } catch(e){ console.warn('[program] re-render after i18n ready failed:', e); }
            }
          });
        }
        // PR#37: KO/EN 토글이 제거되었으므로 토글 클릭 핸들러도 함께 제거.
        //         프로그램은 짝 리포트의 언어로 영구 잠김.
      };
      document.head.appendChild(s);
    })();
  </script>
</body>
</html>
