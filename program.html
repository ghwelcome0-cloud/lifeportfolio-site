  <script>
    (function(){
      try {
        if (window.top !== window.self) {
          // 1차 방어: 본 페이지의 모든 콘텐츠를 즉시 숨김
          if (document.documentElement) document.documentElement.style.display = "none";
          // 2차 방어: 최상위로 강제 이동 (same-origin인 경우 성공, cross-origin이면 SecurityError 발생)
          try { window.top.location = window.self.location.href; }
          catch (e) {
            // cross-origin embed는 top.location 변경 불가 → 빈 페이지 유지하여 클릭재킹 차단
            try {

            } catch (e2) {}
          }
        }
      } catch (e) { /* no-op */ }
    })();
  </script>

  <style>
    :root{
      /* [P26·플랜A·전면형 이식] 색감·농도 통일 — report.html 와 동일한 --lpx-* 오프화이트+청록 체계로 정렬.
         · 기존 program 고유 gold(#C49E45)는 --lpx-gold-heritage 로 보존(무손상), 강조색은 teal 로 통일.
         · --brand(blue)는 그대로 유지, --accent 만 gold→teal 로 정렬해 리포트와 색감 일치. */
      --lpx-bg:#FAFAF7; --lpx-bg-warm:#F4F2EF; --lpx-surface:#FFFFFF;
      --lpx-accent:#468D84; --lpx-accent-2:#3A7A72; --lpx-accent-soft:#6FA9A1;
      --lpx-accent-bg:#E8F0EE; --lpx-accent-bg-2:#DCE9E6;
      --lpx-gold-heritage:#E0A458;
      --bg:var(--lpx-bg); --surface:#ffffff; --text:#17212b; --muted:#5c6773;
      --line:rgba(23,33,43,0.10); --brand:#4A6984; --brand2:#3A5269; --accent:var(--lpx-accent); --accent-soft:var(--lpx-accent-bg);
      --success:#166534; --error:#b91c1c; --shadow:0 18px 46px rgba(23,56,76,.10);
      --max:920px;
      --heading-size:13pt; --quote-size:11pt; --body-size:10pt;
      /* ── [P26·플랜A] 좌측 다크 사이드바 셸 토큰 (report.html 와 1:1 동일) ── */
      --sb-bg:#0E2A2E; --sb-bg-2:#0A2023; --sb-ink:#EAF6F2; --sb-ink-dim:#A9C7C1;
      --sb-active-bg:rgba(70,141,132,.30); --sb-active-ink:#FFFFFF;
      --sb-w:248px; --sb-top:22px;
      --tier-seed:#94a3b8; --tier-emerging:#6366f1; --tier-active:#f59e0b; --tier-deep:#0d9488;
    }
    *{box-sizing:border-box} html{scroll-behavior:smooth}
    body{
      margin:0; min-height:100vh; color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(199,141,92,0.10), transparent 24%),
        radial-gradient(circle at top right, rgba(37,88,116,0.10), transparent 20%),
        linear-gradient(180deg, #FCFCFA 0%, var(--lpx-bg) 45%, #F7F7F3 100%);
      font-family:"Noto Sans KR", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      line-height:1.7; word-break:keep-all; padding:22px;
      padding-left:max(22px, env(safe-area-inset-left));
      padding-right:max(22px, env(safe-area-inset-right));
      padding-bottom:max(22px, env(safe-area-inset-bottom));
      -webkit-font-smoothing:antialiased;
      -webkit-text-size-adjust:100%;
    }
    a{color:inherit;text-decoration:none}

    .container{ max-width:var(--max); margin:0 auto; }

    /* ══════════════════════════════════════════════════════════════
       [P26 · 플랜 A · 전면형 이식] 청사진 V2 2단 셸 + 좌측 다크 스크롤스파이 사이드바
       (report.html 와 1:1 동일 구조 — 색감·농도·동행 네비 완전 통일)
       ── 안전 설계(3대 안전축 준수):
          · 기능 안전: #programRoot(=PDF 캡처 대상)는 content 컬럼에 그대로 —
            .pdf-capture 로직·html2canvas 타깃 무손상.
          · 여정 안전: topbar/버튼/배너 모두 content 컬럼에 유지(연결 무단절).
          · 보안 안전: 사이드바는 순수 정적 DOM(.nopdf), CSP/XFO 무영향.
          · PDF 캡처 시 .pdf-capture body가 셸을 1단으로 무력화 → 캡처 결과 기존과 100% 동일.
       ══════════════════════════════════════════════════════════════ */
    .lp-shell{
      display:grid; grid-template-columns:var(--sb-w) minmax(0,1fr); gap:0;
      align-items:start; max-width:1180px; margin:0 auto;
    }
    /* 좌측 sticky 다크 사이드바 (scroll-spy 동행 네비) */
    .lp-sidebar{
      position:sticky; top:var(--sb-top);
      /* 사이드바를 워터마크(z-index:9998) 위로 올려 네비게이션 가독성 확보(흐림 해소).
         사이드바는 순수 UI(.nopdf)라 유출-추적 워터마크 대상이 아님. */
      z-index:9998;
      max-height:calc(100vh - var(--sb-top) - 12px); overflow:auto;
      /* [P26·견고성] 폴백 단색(다크틸) 먼저 → gradient. 변수 미해석/캐시 상황에도 항상 다크 배경 보장. */
      background:#0E2A2E;
      background:linear-gradient(180deg,var(--sb-bg,#0E2A2E),var(--sb-bg-2,#0A2023));
      color:var(--sb-ink,#EAF6F2); padding:24px 15px 26px; border-radius:22px;
      box-shadow:0 18px 46px rgba(14,42,46,.14);
    }
    .lp-sb-mini{ padding:0 8px 16px; border-bottom:1px solid rgba(255,255,255,.08); margin-bottom:13px; }
    .lp-sb-mini .who{ font-size:11.5px; color:var(--sb-ink-dim); font-weight:700; letter-spacing:.01em; }
    .lp-sb-mini .nm{ font-size:18px; font-weight:900; color:#fff; letter-spacing:-.02em; margin-top:3px; }
    .lp-sb-nav{ display:flex; flex-direction:column; gap:2px; }
    .lp-sb-nav a{
      display:flex; align-items:center; gap:9px; padding:9px 11px; border-radius:10px;
      font-size:13px; font-weight:700; color:var(--sb-ink,#EAF6F2); transition:.15s ease; cursor:pointer;
    }
    .lp-sb-nav a .no{ font-size:10.5px; font-weight:900; color:var(--sb-ink-dim,#A9C7C1); min-width:18px; }
    .lp-sb-nav a .ico{ font-size:14px; line-height:1; flex:none; }
    /* [P26·견고성] 제목 텍스트에 명시적 밝은색 강제 — 어떤 상속/캐시 상황에도 다크 배경 위 가독 보장 */
    .lp-sb-nav a .tx{ min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--sb-ink,#EAF6F2); }
    .lp-sb-nav a:hover{ background:rgba(255,255,255,.06); color:#fff; }
    .lp-sb-nav a.is-current{ background:var(--sb-active-bg); color:var(--sb-active-ink); font-weight:900; }
    .lp-sb-nav a.is-current .no{ color:var(--lpx-gold-heritage); }
    .lp-sb-foot{ margin-top:16px; padding:0 6px; display:flex; flex-direction:column; gap:7px; }
    .lp-sb-foot .dl{
      display:block; text-align:center; padding:10px; border-radius:11px; border:none;
      width:100%; font-family:inherit; cursor:pointer;
      background:rgba(255,255,255,.08); color:#fff; font-weight:800; font-size:12.5px; transition:.15s;
    }
    .lp-sb-foot .dl:hover{ background:rgba(255,255,255,.15); transform:translateY(-1px); }
    .lp-sb-foot .dl.gold{ background:linear-gradient(135deg,var(--lpx-gold-heritage),#C9903F); }
    .lp-content{ padding:0 4px 40px 30px; min-width:0; }

    /* ══════════════════════════════════════════════════════════════
       [P27 · Living Book] 실행 프로그램 웹 화면 = 한 권(the Book).
       report.html 과 1:1 동일한 페이지뷰어 모델 (엔진 무손상 · iframe srcdoc).
       ══════════════════════════════════════════════════════════════ */
    body.living-book-on #programRoot{ display:none !important; }
    body.living-book-on .lp-shell #lpSbNav{ display:none !important; }
    /* Living Book 활성 시: 좌측 스크롤스파이 사이드바는 책 목차(lb-toc)로 대체 */
    body.living-book-on #lpSidebar{ display:none !important; }
    /* [청사진 꽉채움] 셸 폭 제한 해제 → 화면 가로폭을 거의 전부 사용(좌우 낭비 여백 제거).
       ⚠️ 핵심: .container(max-width:var(--max)=920px)가 진짜 병목이므로 부모부터 폭을 풀어야 stage가 넓어진다. */
    body.living-book-on .container{ max-width:none !important; padding-left:14px; padding-right:14px; }
    body.living-book-on .lp-shell{ grid-template-columns:1fr; max-width:none; }
    body.living-book-on .status-box{ display:none !important; }

    /* [청사진 꽉채움] 사이드바(고정폭) + 지면(stage)이 화면 전체 가로폭을 채움. */
    .lb-wrap{ display:flex; justify-content:stretch; align-items:stretch; gap:0; }
    /* 좌측 목차 사이드바 (이 책의 장) */
    .lb-toc{
      flex:0 0 230px; width:230px;    /* flex 레이아웃에서 사이드바 폭 고정 */
      position:sticky; top:var(--sb-top); z-index:20;
      max-height:calc(100vh - var(--sb-top) - 12px); overflow:auto;
      background:#0E2A2E; background:linear-gradient(180deg,#0E2A2E,#0A2023);
      color:#EAF6F2; padding:22px 14px 26px; border-radius:22px 0 0 22px;
      box-shadow:0 18px 46px rgba(14,42,46,.14);
    }
    .lb-toc__brand{ padding:0 8px 14px; border-bottom:1px solid rgba(255,255,255,.09); margin-bottom:14px; }
    .lb-toc__kind{ font-size:11px; color:#A9C7C1; font-weight:800; letter-spacing:.04em; }
    .lb-toc__name{ font-size:19px; font-weight:900; color:#fff; letter-spacing:-.02em; margin-top:4px; }
    .lb-toc__name small{ display:block; font-size:10.5px; font-weight:600; color:#8FB3AD; letter-spacing:.14em; margin-top:2px; }
    .lb-toc__sec{ font-size:10.5px; font-weight:900; color:#7FA69F; letter-spacing:.08em; text-transform:uppercase; padding:12px 10px 6px; }
    .lb-toc__list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:1px; }
    .lb-toc__item{
      display:flex; align-items:center; gap:9px; padding:9px 11px; border-radius:10px;
      font-size:12.5px; font-weight:700; color:#EAF6F2; cursor:pointer; transition:.14s ease;
      border:none; background:none; width:100%; text-align:left; font-family:inherit;
    }
    .lb-toc__item .no{ font-size:10px; font-weight:900; color:#A9C7C1; min-width:20px; }
    .lb-toc__item .ico{ font-size:14px; line-height:1; flex:none; }
    .lb-toc__item .tx{ min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:#EAF6F2; }
    .lb-toc__item:hover{ background:rgba(255,255,255,.07); color:#fff; }
    .lb-toc__item.is-current{ background:var(--lpx-gold-heritage,#C9903F); color:#1a1205; font-weight:900; }
    .lb-toc__item.is-current .no{ color:#5a3d08; }
    .lb-toc__foot{ margin-top:16px; padding:0 6px; display:flex; flex-direction:column; gap:7px; }
    .lb-toc__foot .dl{
      display:block; text-align:center; padding:10px; border-radius:11px; border:none; width:100%;
      font-family:inherit; cursor:pointer; background:rgba(255,255,255,.09); color:#fff; font-weight:800;
      font-size:12px; transition:.15s;
    }
    .lb-toc__foot .dl:hover{ background:rgba(255,255,255,.16); transform:translateY(-1px); }
    .lb-toc__foot .dl.gold{ background:linear-gradient(135deg,var(--lpx-gold-heritage,#E0A458),#C9903F); }

    /* 우측 A4 지면 뷰포트 — 진짜 책처럼(한 지면씩, 뷰포트에 크게) */
    .lb-stage{
      position:relative; background:#e9e5db;
      background:linear-gradient(180deg,#eceae2,#e4e0d5);
      border-radius:0 22px 22px 0; padding:0;
      height:calc(100vh - var(--sb-top) - 12px);
      box-shadow:inset 0 0 40px rgba(0,0,0,.06);
      display:flex; flex-direction:column; overflow:hidden;
      /* [청사진 꽉채움] stage가 사이드바를 제외한 나머지 가로폭을 모두 차지 → 화면을 꽉 채움. */
      flex:1 1 auto; min-width:0; width:auto;
    }
    /* 전체화면(프레젠테이션) 모드 — PPT처럼 한 지면을 화면 가득. */
    .lb-stage:fullscreen{ height:100vh; width:100vw; border-radius:0; background:#0d1a18; }
    .lb-stage:fullscreen .lb-stage__bar{ border-radius:0; }
    .lb-stage:-webkit-full-screen{ height:100vh; width:100vw; border-radius:0; background:#0d1a18; }
    /* 전체화면에서 툴바는 지면을 가리지 않도록 상단에 오버레이(반투명) → 지면이 세로 전체를 쓴다. */
    .lb-stage:fullscreen .lb-stage__bar,
    .lb-stage:-webkit-full-screen .lb-stage__bar{
      position:absolute; top:0; left:0; right:0; z-index:6;
      background:rgba(13,26,24,.55); backdrop-filter:blur(6px);
      border-bottom:none; opacity:0; transition:opacity .2s ease; pointer-events:none;
    }
    .lb-stage:fullscreen:hover .lb-stage__bar,
    .lb-stage:-webkit-full-screen:hover .lb-stage__bar{ opacity:1; pointer-events:auto; }
    .lb-stage:fullscreen .lb-stage__pos,
    .lb-stage:-webkit-full-screen .lb-stage__pos{ color:#EAF6F2; }
    .lb-stage:fullscreen .lb-frame,
    .lb-stage:-webkit-full-screen .lb-frame{ height:100vh; }
    .lb-stage__bar{
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:12px 20px; border-bottom:1px solid rgba(0,0,0,.07);
      background:rgba(255,255,255,.55); backdrop-filter:blur(4px);
      border-radius:0 22px 0 0; position:sticky; top:0; z-index:5;
    }
    .lb-stage__pos{ font-size:12.5px; font-weight:800; color:#3a4a47; letter-spacing:.01em; }
    .lb-stage__nav{ display:flex; gap:8px; }
    .lb-pgbtn{
      border:1px solid rgba(0,0,0,.12); background:#fff; color:#25403c; cursor:pointer;
      border-radius:9px; padding:7px 14px; font-size:12.5px; font-weight:800; font-family:inherit;
      transition:.14s; display:inline-flex; align-items:center; gap:5px;
    }
    .lb-pgbtn:hover{ background:#25403c; color:#fff; border-color:#25403c; }
    .lb-pgbtn:disabled{ opacity:.4; cursor:default; }
    .lb-pgbtn:disabled:hover{ background:#fff; color:#25403c; border-color:rgba(0,0,0,.12); }
    .lb-pgbtn--fs{ background:#25403c; color:#fff; border-color:#25403c; margin-left:4px; }
    .lb-pgbtn--fs:hover{ background:var(--lpx-gold-heritage,#C9903F); color:#1a1205; border-color:var(--lpx-gold-heritage,#C9903F); }
    /* [청사진 꽉채움] iframe(지면)이 stage 의 넓어진 가로폭 전체를 차지.
       내부 fit()이 지면(.page)을 가운데 배치하고 화면 높이에 맞춰 크게 확대. */
    .lb-frame{
      flex:1 1 auto; min-height:0; border:0; display:block; background:transparent;
      width:100%; height:100%;
    }
    .lb-loading{
      flex:1 1 auto; display:flex; align-items:center; justify-content:center;
      color:#6b7a76; font-weight:700; font-size:14px; padding:80px 0;
    }
    /* 목차 접기/펼치기 토글 — 데스크톱 숨김, 모바일에서만 노출 */
    .lb-toc__toggle{ display:none; }
    @media (max-width:960px){
      /* ── 모바일 최적화: 지면(A4)이 화면 가로폭을 꽉 채우고, 목차는 접이식 상단 바 ── */
      .lb-wrap{ flex-direction:column; align-items:stretch; gap:0; }
      .lb-toc{
        position:static; width:auto; flex:0 0 auto; max-height:none;
        border-radius:16px 16px 0 0; padding:0;
      }
      .lb-toc__toggle{
        display:flex; align-items:center; justify-content:space-between; gap:10px; width:100%;
        padding:14px 18px; border:none; background:none; color:#EAF6F2;
        font-family:inherit; font-size:14px; font-weight:800; cursor:pointer; text-align:left;
      }
      .lb-toc__toggle .lb-toc__toggle-label{ display:flex; align-items:center; gap:9px; min-width:0; }
      .lb-toc__toggle .caret{ transition:transform .22s ease; font-size:12px; opacity:.8; flex:none; }
      .lb-toc__brand, .lb-toc__sec, .lb-toc__list, .lb-toc__foot{
        max-height:0; overflow:hidden; opacity:0; padding-top:0; padding-bottom:0;
        margin:0; transition:max-height .28s ease, opacity .2s ease;
      }
      .lb-toc.is-open{ padding:0 12px 14px; }
      .lb-toc.is-open .lb-toc__toggle .caret{ transform:rotate(180deg); }
      .lb-toc.is-open .lb-toc__brand{ max-height:120px; opacity:1; padding:0 8px 12px; margin-bottom:10px; }
      .lb-toc.is-open .lb-toc__sec{ max-height:40px; opacity:1; padding:8px 10px 4px; }
      .lb-toc.is-open .lb-toc__list{ max-height:640px; opacity:1; }
      .lb-toc.is-open .lb-toc__foot{ max-height:160px; opacity:1; margin-top:12px; }
      .lb-toc__item{ padding:12px 12px; font-size:13.5px; }
      .lb-toc__item .ico{ font-size:16px; }
      .lb-stage{ border-radius:0 0 16px 16px; height:auto; min-height:auto; width:auto; flex:1 1 auto; }
      .lb-stage__bar{ border-radius:0; padding:10px 14px; flex-wrap:wrap; }
      .lb-stage__pos{ font-size:12px; }
      .lb-pgbtn{ padding:8px 12px; font-size:12px; }
      .lb-frame{ width:100%; height:auto; aspect-ratio:794 / 1123; }
    }
    @media (max-width:420px){
      .lb-stage__nav{ gap:6px; }
      .lb-pgbtn{ padding:7px 10px; font-size:11.5px; }
      .lb-pgbtn--fs{ margin-left:0; }
    }

    /* 모바일: 2단 해제 → 사이드바 상단 가로 배치(기존 모바일 UX 계승) */
    @media (max-width:860px){
      .lp-shell{ grid-template-columns:1fr; }
      .lp-sidebar{ position:static; max-height:none; border-radius:16px; margin-bottom:14px; padding:16px 14px; }
      .lp-sb-nav{ flex-direction:row; flex-wrap:wrap; gap:5px; }
      .lp-sb-nav a{ font-size:12px; padding:6px 9px; }
      .lp-sb-nav a .tx{ max-width:120px; }
      .lp-content{ padding:0; }
      .lp-sb-foot{ flex-direction:row; }
    }
    /* PDF 캡처 모드: 셸을 1단으로 무력화하고 사이드바 은닉 → 캡처 결과 기존과 동일 */
    .pdf-capture .lp-shell{ display:block !important; max-width:none !important; }
    .pdf-capture .lp-sidebar{ display:none !important; }
    .pdf-capture .lp-content{ padding:0 !important; }

    .topbar{
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      margin-bottom:18px; flex-wrap:wrap;
    }
    .logo{ display:inline-flex; align-items:center; gap:8px; font-size:22px; font-weight:900; color:var(--brand); letter-spacing:-0.03em; }
    .logo-mark{width:24px;height:24px;border-radius:6px;flex-shrink:0;display:block;vertical-align:middle}

    .top-actions{ display:flex; gap:8px; flex-wrap:wrap; }

    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:6px;
      min-height:44px; padding:0 14px; border-radius:12px; border:none; cursor:pointer;
      font-size:13px; font-weight:900; font-family:inherit; transition:.2s ease; text-decoration:none;
      touch-action:manipulation;
    }
    .btn:hover{ transform:translateY(-1px); }
    .btn:disabled{ opacity:0.55; cursor:not-allowed; transform:none; }
    .btn-secondary{ background:#fff; color:var(--text); border:1px solid var(--line); box-shadow:0 6px 16px rgba(23,56,76,.05); }
    .btn-secondary:hover{ background:#faf8f3; border-color:rgba(23,56,76,0.14); color:var(--brand); }
    .btn-primary{ background:linear-gradient(135deg, var(--brand), var(--brand2)); color:#fff; box-shadow:0 14px 28px rgba(23,56,76,0.18); }
    .btn-accent{ background:linear-gradient(135deg, var(--accent), var(--lpx-accent-2)); color:#fff; box-shadow:0 14px 28px rgba(70,141,132,0.28); }

    /* ── 프로그램 카드 (PDF 캡처 대상: id=programRoot) ── */
    .report{
      background:var(--surface);
      border:1px solid var(--line);
      border-radius:24px;
      padding:32px 32px 28px;
      box-shadow:var(--shadow);
      font-size:var(--body-size);
    }
    @media (max-width:640px){ .report{ padding:22px 18px; } }

    .rep-header{
      border-bottom:2px solid var(--brand);
      padding-bottom:14px; margin-bottom:18px;
    }
    .rep-header h1{
      margin:0 0 6px; font-size:clamp(22px, 3.4vw, 28px);
      color:var(--brand); font-weight:900; letter-spacing:-0.04em;
    }
    .rep-header .sub{
      margin:2px 0 8px; font-size:13.5px; color:var(--brand2); font-weight:800;
    }
    .rep-header .submitted{
      display:inline-block; font-size:12px; color:var(--muted); font-weight:800;
      background:#f4ede2; padding:4px 10px; border-radius:999px; margin-right:6px;
    }
    .rep-header .type-line{
      margin:10px 0 4px; font-size:14.5px; font-weight:800; color:var(--brand2);
      letter-spacing:-0.01em;
    }

    .sec{ margin-top:22px; padding-top:8px; }
    .sec-title{
      display:flex; align-items:center; gap:10px;
      font-size:var(--heading-size); font-weight:900; color:var(--brand);
      letter-spacing:-0.02em; margin:0 0 10px;
    }
    .sec-title .ico{ font-size:18px; line-height:1; }

    /* 섹션별 해설서 링크 아이콘 (PDF/인쇄에는 미노출) */
    .sec-guide-ico{
      display:inline-flex; align-items:center; justify-content:center;
      width:20px; height:20px; border-radius:50%; flex:0 0 auto;
      font-size:12px; font-weight:900; text-decoration:none;
      color:var(--brand2); background:var(--accent-soft); border:1px solid transparent;
      transition:all .15s ease;
    }
    .sec-guide-ico:hover{ background:var(--brand2); color:#fff; }
    .pdf-capture .sec-guide-ico{ display:none !important; }

    .sec-body{ font-size:var(--body-size); color:#1f2937; }
    .sec-body p{ margin:0 0 8px; }

    /* 인용 / 분기 테마 박스 */
    .quote{
      font-size:var(--quote-size);
      background:#fff7ed; border-left:4px solid var(--accent);
      padding:12px 16px; border-radius:10px;
      color:#7c2d12; font-weight:800; margin:6px 0 8px;
    }
    .quarter-box{
      background:#eff6ff; border:1px solid #bfdbfe; border-radius:14px;
      padding:14px 18px;
    }
    .quarter-box h3{ margin:0 0 4px; font-size:15px; color:#1e3a8a; font-weight:900; }
    /* [v1.4 대원칙-A] 분기 subline: 헤드 아래 응답 종합 '직관 한 줄' (강조색·중간 크기) */
    .quarter-box .q-subline{ margin:0 0 10px; font-size:14px; color:#0d9488; font-weight:800; line-height:1.55; letter-spacing:-.01em; }
    .quarter-box p{ margin:0 0 6px; font-size:13.5px; color:#0f172a; line-height:1.7; font-weight:700; }
    .quarter-box p:last-child{ margin-bottom:0; }

    /* 표지 요약 박스 */
    .cover-summary{
      display:grid; gap:8px; margin-top:10px;
    }
    .cover-summary .row{
      background:#fff; border:1px solid var(--line); border-radius:10px;
      padding:8px 12px; font-size:13px; line-height:1.6;
    }
    .cover-summary .row strong{ color:var(--brand); font-weight:900; margin-right:4px; }

    /* PR#71-C — Google L3 카드 디자인 (헤드라인 + 한 호흡 본문, 라벨 pill 폐기)
       라벨 pill은 시각적 노이즈이며 html2canvas 호환성 결함 원인이었으므로 제거.
       좌측 컬러 바(::before)가 카테고리 구분 역할을 자연스럽게 수행함. */
    .cover-summary.l3{ display:grid; gap:12px; margin-top:14px; }
    .cover-summary.l3 .l3-card{
      background:#ffffff;
      border:1px solid var(--line); border-radius:14px;
      padding:16px 18px 16px 22px;
      box-shadow:0 1px 2px rgba(15,23,42,.04);
      position:relative; overflow:hidden;
      page-break-inside:avoid; break-inside:avoid;
    }
    .cover-summary.l3 .l3-card::before{
      content:""; position:absolute; left:0; top:0; bottom:0; width:4px;
      background:linear-gradient(180deg,#1e40af 0%,#3b82f6 100%);
      border-radius:14px 0 0 14px;
    }
    .cover-summary.l3 .l3-head{
      font-size:15.5px; font-weight:900; color:#0f172a;
      line-height:1.45; margin:0 0 6px;
      letter-spacing:-.01em;
    }
    .cover-summary.l3 .l3-body{
      font-size:13.5px; font-weight:600; color:#334155;
      line-height:1.65; margin:0;
    }
    @media (min-width: 720px){
      .cover-summary.l3{ grid-template-columns:1fr 1fr; }
      .cover-summary.l3 .l3-card:nth-child(5){ grid-column:1 / -1; }
    }
    .arrow-line{
      margin-top:10px; padding:10px 14px; border-radius:10px;
      background:#f0fdf4; border:1px solid rgba(22,101,52,0.20);
      color:#14532d; font-weight:900; font-size:13.5px;
    }

    /* [P26] 한눈에 보는 나 — 정체성 앵커 (인생포트폴리오 V2와 동일 방향) */
    .dash-anchor-pg{
      margin-top:14px; padding:16px 18px; border-radius:14px;
      background:linear-gradient(180deg,#f0f7f5 0%,#e8f0ee 100%);
      border:1px solid rgba(70,141,132,0.22); border-left:5px solid var(--brand);
    }
    .mv-row-pg{ display:flex; gap:10px; align-items:flex-start; margin-bottom:8px; }
    .mv-k-pg{
      flex:0 0 auto; font-size:12px; font-weight:900; color:#fff;
      background:var(--brand); border-radius:6px; padding:3px 10px; letter-spacing:.04em;
    }
    .mv-line-pg{ margin:0; font-size:15px; font-weight:800; color:#0f172a; line-height:1.6; }
    .compass-pg{
      display:flex; align-items:center; flex-wrap:wrap; gap:8px;
      margin-top:8px; padding-top:10px; border-top:1px dashed rgba(70,141,132,0.35);
    }
    .c-ico-pg{ font-size:15px; }
    .c-k-pg{ font-size:12px; font-weight:900; color:var(--brand2); letter-spacing:.03em; }
    .c-word-pg{ font-size:14px; font-weight:800; color:#0f172a; }
    /* [P26] 5카드 카테고리 라벨 (흐름 안내 — 유형화 아님) */
    .cover-summary.l3 .l3-lbl{
      display:inline-flex; align-items:center; gap:5px;
      font-size:11px; font-weight:900; color:var(--brand2);
      letter-spacing:.02em; margin-bottom:7px;
    }
    .cover-summary.l3 .l3-ico{ font-size:13px; }

    /* ═══ [P26 시안 D] 한눈에 보는 나 — 3층 위계 + 플랫폼 패널 ═══ */
    /* 패널: report.html 웹 대시보드와 동일 규칙(흰 둥근 카드 + 그림자) */
    .gx-panel{
      background:#fff; border:1px solid var(--line);
      border-radius:20px; padding:24px 24px 26px;
      box-shadow:0 14px 40px rgba(23,56,76,.09);
    }
    .gx-head{ display:flex; align-items:baseline; gap:10px; margin-bottom:16px; }
    .gx-head .gx-h2{ margin:0; }
    .gx-head .gx-pill{
      font-size:11px; font-weight:800; color:var(--brand2);
      background:var(--accent-soft); padding:3px 10px; border-radius:999px; flex:0 0 auto;
    }
    /* ① 정체성 앵커(3초) */
    .gx-anchor{
      border:1px solid rgba(74,105,132,.22); border-left:5px solid var(--brand);
      border-radius:16px; background:linear-gradient(180deg,#f7f9fb,#fff);
      padding:16px 20px; margin-bottom:22px;
    }
    .gx-mv{ display:flex; align-items:flex-start; gap:12px; }
    .gx-mv .gx-k{
      flex:0 0 auto; font-size:11px; font-weight:900; color:#fff;
      background:var(--brand); border-radius:6px; padding:3px 10px; letter-spacing:.04em; margin-top:2px;
    }
    .gx-mv .gx-line{ margin:0; font-size:15.5px; font-weight:800; color:#1f2d3a; line-height:1.5; letter-spacing:-.01em; }
    .gx-compass{
      display:flex; align-items:center; flex-wrap:wrap; gap:8px;
      margin-top:13px; padding-top:12px; border-top:1px dashed rgba(74,105,132,.25);
    }
    .gx-compass .gx-ico{ font-size:15px; }
    .gx-compass .gx-ck{ font-size:12px; font-weight:900; color:var(--brand2); }
    .gx-compass .gx-cw{ font-size:14px; font-weight:900; color:var(--accent); letter-spacing:-.01em; }
    /* 층 구분 라벨 */
    .gx-layer-lbl{
      display:flex; align-items:center; gap:8px;
      font-size:12px; font-weight:900; color:#8697a8; letter-spacing:.02em; margin:0 0 11px;
    }
    .gx-layer-lbl::after{ content:""; flex:1; height:1px; background:var(--line); }
    /* ② 정체성 근거 카드(30초) — 차분 */
    .gx-id-grid{ display:grid; gap:12px; margin-bottom:24px; }
    @media(min-width:640px){ .gx-id-grid{ grid-template-columns:1fr 1fr; } }
    .gx-idc{ background:#f8fafc; border:1px solid #eef2f7; border-radius:14px; padding:15px 17px; page-break-inside:avoid; break-inside:avoid; }
    .gx-idc .t{ display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:900; color:var(--brand2); margin-bottom:6px; }
    .gx-idc .b{ font-size:13.5px; font-weight:600; color:#334155; line-height:1.6; }
    /* ③ 행동 카드(3분) — CTA 격상 */
    .gx-act-grid{ display:grid; gap:12px; }
    @media(min-width:720px){ .gx-act-grid{ grid-template-columns:1.2fr 1fr 1fr; } }
    .gx-actc{ border-radius:14px; padding:15px 17px; page-break-inside:avoid; break-inside:avoid; }
    .gx-actc.cta{ background:linear-gradient(180deg,#fef8ec,#fff); border:1.5px solid var(--accent); box-shadow:0 4px 14px rgba(196,158,69,.14); }
    .gx-actc.cta .t{ color:#9a7420; }
    .gx-actc .gx-step{
      display:inline-block; font-size:10px; font-weight:900; color:#fff;
      background:var(--accent); border-radius:999px; padding:2px 9px; margin-bottom:8px; letter-spacing:.03em;
    }
    .gx-actc.plain{ background:#fff; border:1px solid var(--line); }
    .gx-actc.plain .t{ color:var(--brand2); }
    .gx-actc .t{ display:flex; align-items:center; gap:7px; font-size:12.5px; font-weight:900; margin-bottom:6px; }
    .gx-actc .b{ font-size:13px; font-weight:600; color:#334155; line-height:1.6; }

    /* 3주 루틴 */
    .week-card{
      background:#fff; border:1px solid var(--line); border-radius:14px;
      padding:14px 16px; margin-top:10px;
    }
    .week-card .top{
      display:flex; align-items:center; gap:10px; margin-bottom:8px;
      border-bottom:1px solid var(--line); padding-bottom:6px;
    }
    .week-card .top .num{
      background:var(--brand); color:#fff; font-weight:900;
      padding:4px 10px; border-radius:999px; font-size:12px;
    }
    .week-card .top .ttl{ font-size:14.5px; font-weight:900; color:var(--brand); }
    .week-card .top .pct{ margin-left:auto; font-size:12px; color:var(--muted); font-weight:800; }
    /* [v1.4 대원칙-A] 주차 subline: 제목 아래 응답 종합 '직관 한 줄' */
    .week-card .week-subline{ margin:2px 0 8px; font-size:12.5px; color:#0d9488; font-weight:800; line-height:1.5; letter-spacing:-.01em; }
    .week-card .row{ display:flex; align-items:flex-start; gap:10px; margin:6px 0; font-size:13px; line-height:1.6; }
    .week-card .row .lbl{
      flex-shrink:0; font-size:11px; font-weight:900; color:#fff;
      padding:3px 10px; border-radius:999px; min-width:70px; text-align:center;
      background:var(--brand2);
    }
    .week-card .row.guide .lbl{ background:#0f766e; }
    .week-card .row.actions .lbl{ background:var(--brand2); }
    .week-card .row.effects .lbl{ background:#c2410c; }
    .week-card .row .val{ flex:1; min-width:0; color:#0f172a; font-weight:700; }
    .week-card .row.actions ul{ margin:0; padding-left:18px; }
    .week-card .row.actions li{ margin-bottom:4px; font-weight:700; color:#1f2937; }
    .week-card .row.effects .val{
      color:#7c2d12; background:#fff7ed; border-left:3px solid var(--accent);
      padding:8px 12px; border-radius:8px; font-weight:900;
    }

    /* ═══════════════════════════════════════════════════════════════
       [P1.5-7단계] 주차별 4구분 + if-then 실행 의도 (표시 레이어, 엔진/RTDB 무손상)
       ① 이번 주 초점 ② 이렇게 해봐요(if-then) ③ 실행 방법 ④ 이런 변화
       · 기존 .week-card .row 를 4구분 스텝으로 시각 정돈 (데이터 없으면 해당 구분 미표시) */
    :root{
      --lp-step-num:#3A5269;
      --lp-step-ifthen:#0f766e;
    }
    .week-card .wc-step{ display:flex; gap:10px; margin:8px 0; align-items:flex-start; }
    .week-card .wc-step .wc-num{
      flex-shrink:0; width:22px; height:22px; border-radius:999px;
      background:var(--lp-step-num); color:#fff; font-weight:900; font-size:11px;
      display:inline-flex; align-items:center; justify-content:center; margin-top:1px;
    }
    .week-card .wc-step .wc-body{ flex:1; min-width:0; }
    .week-card .wc-step .wc-steplbl{
      font-size:11px; font-weight:900; color:var(--muted); letter-spacing:.02em;
      text-transform:none; margin-bottom:2px; display:block;
    }
    .week-card .wc-step .wc-text{ font-size:13px; line-height:1.65; color:#0f172a; font-weight:700; }
    .week-card .wc-step ul{ margin:2px 0 0; padding-left:0; list-style:none; }
    .week-card .wc-step li{ margin-bottom:6px; font-weight:700; color:#1f2937; line-height:1.6; }
    /* if-then 프레이밍: '언제' 조건부를 조용한 청록 라벨로 (색 과시 아닌 의미 구분) */
    .week-card .wc-step li .wc-when{
      display:inline; font-weight:900; color:var(--lp-step-ifthen);
    }
    .week-card .wc-step li .wc-then{ display:inline; }
    .week-card .wc-step.wc-effects .wc-text{
      color:#7c2d12; background:#fff7ed; border-left:3px solid var(--accent);
      padding:8px 12px; border-radius:8px; font-weight:900;
    }
    @media (max-width:640px){
      .week-card .wc-step .wc-num{ width:20px; height:20px; font-size:10px; }
      .week-card .wc-step .wc-text{ font-size:12.5px; }
    }

    /* ═══════════════════════════════════════════════════════════════
       [P1.5-5단계] 주간 회고 UI — '살아냄' 한 주 돌아보기
       · 기존 .week-card 확장 (새 컴포넌트 없음)
       · 클라이언트 상태(localStorage)만 — 백엔드 스키마 무손상
       · 조용한 신호: 골드 좌측 보더 두께 미세 변화만 (색/배지 과시 없음)
       · 강요·자동 프롬프트 없음, 페이지 이동 없음
       · 향후 6·7·자산화 확장 진입점 → data-retro-* 훅포인트 예약 */
    :root{
      --lp-retro-border-w:0px;                    /* 기본: 회고 보더 없음 */
      --lp-retro-border-w-done:4px;               /* 해봤어요 — 골드 보더 살짝 */
      --lp-retro-action:#8A6A2E;
      --lp-retro-action-bg:rgba(196,158,69,0.10);
      --lp-retro-motion:140ms;
    }
    .week-retro{
      margin-top:10px; padding-top:10px;
      border-top:1px dashed var(--line);
      border-left-style:solid;
      border-left-color:var(--accent);
      border-left-width:var(--lp-retro-border-w);
      padding-left:0;
      transition:border-left-width var(--lp-retro-motion) ease, padding-left var(--lp-retro-motion) ease;
    }
    .week-retro[data-retro-state="done"]{
      border-left-width:var(--lp-retro-border-w-done);
      padding-left:12px;
    }
    .week-retro .wr-toggle{
      display:inline-flex; align-items:center; gap:6px;
      background:transparent; border:none; cursor:pointer;
      color:var(--brand2); font-weight:800; font-size:12.5px;
      padding:2px 0; letter-spacing:-.01em;
    }
    .week-retro .wr-toggle:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:4px; }
    .week-retro .wr-toggle .wr-caret{ font-size:10px; transition:transform var(--lp-retro-motion) ease; }
    .week-retro[data-retro-open="1"] .wr-toggle .wr-caret{ transform:rotate(90deg); }
    .week-retro .wr-panel{ display:none; margin-top:8px; }
    .week-retro[data-retro-open="1"] .wr-panel{ display:block; }
    .week-retro .wr-actions{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:8px; }
    .week-retro .wr-act{
      display:inline-flex; align-items:center; gap:6px;
      background:transparent; border:1px solid var(--line); border-radius:999px;
      cursor:pointer; color:var(--lp-retro-action); font-weight:800; font-size:12px;
      padding:5px 12px; transition:background var(--lp-retro-motion) ease;
    }
    .week-retro .wr-act:hover{ background:var(--lp-retro-action-bg); }
    .week-retro .wr-act:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
    .week-retro[data-retro-state="done"] .wr-act[data-retro-act="done"]{
      background:var(--lp-retro-action-bg); border-color:var(--accent);
    }
    .week-retro .wr-note{
      width:100%; box-sizing:border-box; resize:vertical; min-height:52px;
      border:1px solid var(--line); border-radius:10px; padding:8px 10px;
      font-size:13px; line-height:1.6; color:#0f172a; font-family:inherit;
      background:#fff;
    }
    .week-retro .wr-note:focus-visible{ outline:2px solid var(--accent); outline-offset:1px; }
    .week-retro .wr-statusline{
      margin-top:6px; font-size:11.5px; color:var(--muted); font-weight:700; min-height:14px;
    }
    @media (prefers-reduced-motion: reduce){
      .week-retro, .week-retro .wr-caret, .week-retro .wr-act{ transition:none !important; }
    }
    /* PDF: 회고 입력 컨트롤 숨김, 남긴 한 줄은 유지 */
    .pdf-capture .week-retro .wr-toggle,
    .pdf-capture .week-retro .wr-actions{ display:none !important; }
    .pdf-capture .week-retro .wr-panel{ display:block !important; }
    .pdf-capture .week-retro .wr-note{ border:none; padding:0; background:transparent; }

    /* 3개월 / 1년 박스 */
    .goal-list{ list-style:none; padding:0; margin:6px 0 0; display:grid; gap:8px; }
    .goal-list li{
      background:#fff; border:1px solid var(--line); border-radius:12px;
      padding:10px 14px; font-size:13px;
    }
    .goal-list li strong{ display:block; color:var(--brand); font-weight:900; margin-bottom:2px; }
    .goal-list li small{ color:var(--muted); font-weight:800; }

    .vision-box{
      background:#fef3c7; border:1px solid #fcd34d; border-radius:14px;
      padding:12px 16px; margin-top:6px;
    }
    .vision-box .v-label{ font-size:12px; font-weight:900; color:#92400e; margin-bottom:4px; }
    .vision-box p{ margin:0 0 4px; font-weight:800; color:#0f172a; }
    .vision-box ul{ margin:6px 0 0; padding-left:18px; }
    .vision-box li{ margin-bottom:3px; font-weight:800; color:#1f2937; }

    /* 모듈 카드 */
    .module-grid{ display:grid; gap:10px; margin-top:6px; }
    .module-card{
      background:#fff; border:1px solid var(--line); border-radius:14px; padding:14px 16px;
    }
    .module-card .head{
      display:flex; align-items:center; gap:8px; margin-bottom:8px; flex-wrap:wrap;
    }
    .module-card .badge{
      background:var(--accent); color:#fff; font-weight:900; font-size:11.5px;
      padding:3px 10px; border-radius:999px;
    }
    .module-card .badge.b-2{ background:var(--success); }
    .module-card .badge.b-3{ background:var(--brand); }
    .module-card .ttl{ font-size:14.5px; font-weight:900; color:var(--brand); }
    .module-card .summary{ font-size:13px; color:#334155; font-weight:700; margin-bottom:6px; }
    .module-card ul{ margin:4px 0 0; padding-left:18px; }
    .module-card li{ font-size:12.5px; font-weight:700; color:#1f2937; margin-bottom:3px; }
    .module-card .tools{
      margin-top:8px; padding:8px 10px; border-radius:8px;
      background:#f4ede2; color:#7c2d12; font-size:12px; font-weight:800;
    }
    .module-card .booster{
      margin-top:8px; padding:8px 12px; border-radius:8px;
      background:#fef2f2; border:1px solid #fecaca; color:#7c2d12; font-size:12.5px; font-weight:800;
    }

    /* 추적 보드 표 */
    .ep-table{
      width:100%; border-collapse:separate; border-spacing:0;
      border:1px solid var(--line); border-radius:12px; overflow:hidden;
      font-size:var(--body-size); margin-top:6px;
    }
    .ep-table th, .ep-table td{
      padding:10px 12px; text-align:left; vertical-align:top;
      border-bottom:1px solid var(--line);
    }
    .ep-table tr:last-child th, .ep-table tr:last-child td{ border-bottom:none; }
    .ep-table th{ background:#f4ede2; color:var(--brand); font-weight:900; }
    .ep-table td{ background:#fff; color:#1f2937; font-weight:700; }
    .ep-table td.cell-y{ width:88px; text-align:center; color:var(--muted); }
    .board-hint{
      margin-top:8px; font-size:12px; font-weight:800; color:var(--muted);
    }
    .monthly-list{ margin-top:10px; padding:10px 14px; border-radius:10px; background:#eff6ff; border:1px solid #bfdbfe; }
    .monthly-list strong{ display:block; color:#1e3a8a; font-weight:900; margin-bottom:4px; font-size:12.5px; }
    .monthly-list ul{ margin:0; padding-left:18px; }
    .monthly-list li{ font-size:12.5px; font-weight:700; color:#0f172a; margin-bottom:2px; }

    /* 기대 효과 */
    .effects-list{ list-style:none; padding:0; margin:0; display:grid; gap:8px; }
    .effects-list li{
      background:#fff; border:1px solid var(--line); border-radius:10px;
      padding:8px 12px; font-size:13px; font-weight:800; color:#1f2937;
    }
    .effects-list li strong{ color:var(--brand); }
    /* ── [UI/UX v1.1] V4-a 3주 타임라인 ── */
    .week-timeline-card{
      background:linear-gradient(180deg,#f0fdfa 0%,#ffffff 70%);
      border:1px solid #99f6e4; border-radius:16px; padding:10px 8px 6px;
      margin:6px 0 14px; box-shadow:0 1px 6px rgba(13,148,136,0.06);
    }
    .week-timeline-card .wt-eyebrow{
      text-align:center; font-size:12px; font-weight:800; color:#0f766e; margin-bottom:2px;
    }
    /* ── [UI/UX v1.1] V4-b 기대효과 성장 방향 게이지 ── */
    .effect-gauge-card{
      background:#fff; border:1px solid var(--line); border-radius:14px;
      padding:14px 16px 10px; margin:0 0 14px; box-shadow:0 1px 6px rgba(15,23,42,0.04);
    }
    .effect-gauge-card .eg-eyebrow{
      font-size:13px; font-weight:900; color:#0f766e; margin-bottom:12px;
    }
    .effect-gauge-card .eg-row{ margin-bottom:13px; }
    .effect-gauge-card .eg-head{ display:flex; align-items:center; margin-bottom:5px; }
    .effect-gauge-card .eg-label{ font-size:13px; font-weight:900; }
    .effect-gauge-card .eg-track{
      height:9px; background:#f1f5f9; border-radius:999px; overflow:hidden;
    }
    .effect-gauge-card .eg-fill{ height:100%; border-radius:999px; min-width:8px; transition:width .6s ease; }
    .effect-gauge-card .eg-desc{ margin-top:6px; font-size:12.5px; font-weight:700; color:#334155; line-height:1.55; }
    .effect-gauge-card .eg-caption{
      margin-top:4px; font-size:11.5px; color:#94a3b8; text-align:center;
      border-top:1px dashed #e2e8f0; padding-top:9px;
    }
    .new-paths{
      margin-top:10px; padding:10px 14px; border-radius:10px;
      background:#f0fdf4; border:1px solid rgba(22,101,52,0.20); color:#14532d;
      font-size:12.5px; font-weight:900;
    }
    .new-paths .lbl{ color:var(--success); margin-right:6px; }

    /* [UI/UX v1.3 FB2] 실행 모듈 흐름 브릿지 — 계획→도구 연결 직관화 */
    .module-bridge{
      background:linear-gradient(180deg,#f5f3ff 0%,#ffffff 90%);
      border:1px solid #ddd6fe; border-radius:14px; padding:13px 16px; margin:2px 0 14px;
    }
    .module-bridge .mb-flow{
      display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:7px;
    }
    .module-bridge .mb-from,.module-bridge .mb-to{
      font-size:12.5px; font-weight:900; padding:4px 11px; border-radius:999px;
    }
    .module-bridge .mb-from{ background:#fff; border:1.5px solid #99f6e4; color:#0f766e; }
    .module-bridge .mb-to{ background:#fff; border:1.5px solid #c4b5fd; color:#6d28d9; }
    .module-bridge .mb-arrow{ font-size:15px; font-weight:900; color:#a78bfa; }
    .module-bridge .mb-desc{
      margin:0; font-size:12.5px; font-weight:700; color:#475569; line-height:1.6;
    }

    /* 다음 단계 (하위호환 폴백용) */
    .next-list{ list-style:none; padding:0; margin:0; display:grid; gap:8px; }
    .next-list li{
      background:#fff; border:1px solid var(--line); border-radius:10px;
      padding:8px 12px; font-size:13px; display:flex; gap:10px; align-items:flex-start;
    }
    .next-list li strong{ color:var(--accent); min-width:78px; font-weight:900; }
    /* [UI/UX v1.3 FB5] 축적 사이클 — 1년 완결 → 새 검사로 다시 축적(나선형) */
    .cycle-loop{ display:flex; flex-direction:column; gap:0; }
    .cycle-step{
      background:#fff; border:1px solid var(--line); border-left:4px solid var(--brand);
      border-radius:12px; padding:12px 15px;
    }
    .cycle-step .cs-top{ display:flex; align-items:center; flex-wrap:wrap; gap:8px; margin-bottom:6px; }
    .cycle-step .cs-ico{ font-size:16px; line-height:1; }
    .cycle-step .cs-when{ font-size:13px; font-weight:900; }
    .cycle-step .cs-tag{
      font-size:10.5px; font-weight:900; letter-spacing:0.02em;
      padding:2px 9px; border-radius:999px; background:#fff; border:1.5px solid var(--brand);
    }
    .cycle-step .cs-task{ font-size:13px; font-weight:700; color:#334155; line-height:1.65; }
    .cycle-connector{
      display:flex; align-items:center; justify-content:center; position:relative;
      padding:6px 0; margin:2px 0;
    }
    .cycle-connector::before{
      content:""; position:absolute; left:50%; top:0; bottom:0; width:2px;
      background:repeating-linear-gradient(180deg,#c4b5fd 0 5px,transparent 5px 10px);
    }
    .cycle-connector span{
      position:relative; z-index:1; background:#f5f3ff; border:1px solid #ddd6fe;
      color:#6d28d9; font-size:11px; font-weight:900; padding:4px 12px; border-radius:999px;
    }

    /* 리스크 (하위호환 폴백용) */
    .risks-list{ list-style:none; padding:0; margin:0; display:grid; gap:8px; }
    .risks-list li{
      background:#fef2f2; border:1px solid #fecaca; border-radius:10px;
      padding:10px 12px; font-size:13px;
    }
    .risks-list li .r{ font-weight:900; color:var(--error); margin-bottom:4px; }
    .risks-list li .m{ font-weight:800; color:#7c2d12; }
    .risks-list li .m::before{ content:"→ "; }
    /* [UI/UX v1.3 FB4] 리스크 — 위험/대응 2단 카드 */
    .risk-cards{ display:grid; gap:9px; }
    .risk-card{
      background:#fff; border:1px solid var(--line); border-radius:12px;
      padding:11px 13px; display:grid; gap:7px;
    }
    .risk-card .rc-risk,.risk-card .rc-mit{ display:flex; align-items:flex-start; gap:9px; }
    .risk-card .rc-tag{
      flex-shrink:0; font-size:10.5px; font-weight:900; letter-spacing:0.02em;
      padding:3px 9px; border-radius:999px; white-space:nowrap; margin-top:1px;
    }
    .risk-card .rc-tag-r{ background:#fef2f2; color:#dc2626; border:1px solid #fecaca; }
    .risk-card .rc-tag-m{ background:#f0fdfa; color:#0d9488; border:1px solid #99f6e4; }
    .risk-card .rc-risk .rc-text{ font-size:13px; font-weight:800; color:#1f2937; line-height:1.55; }
    .risk-card .rc-mit{ border-top:1px dashed #e2e8f0; padding-top:8px; }
    .risk-card .rc-mit .rc-text{ font-size:13px; font-weight:700; color:#334155; line-height:1.55; }

    /* [UI/UX v1.3 FB4] 근거 한 줄 배지 (안내문구 축약형) */
    .prog-basis{
      display:flex; align-items:flex-start; gap:10px; margin-top:8px;
      background:#f4ede2; border:1px solid #e5d6c0; border-radius:12px;
      padding:11px 14px;
    }
    .prog-basis .pb-badge{
      flex-shrink:0; background:var(--brand); color:#fff; font-size:10.5px; font-weight:900;
      letter-spacing:0.03em; padding:3px 9px; border-radius:999px; margin-top:1px; white-space:nowrap;
    }
    .prog-basis .pb-text{ flex:1; font-size:12px; font-weight:700; color:#7c2d12; line-height:1.6; }

    /* 상태/에러 */
    .status-box{
      margin-bottom:14px; border-radius:14px; padding:12px 14px; font-size:13px; font-weight:800; line-height:1.7;
    }
    .status-box.info{ color:#1e40af; background:#eff6ff; border:1px solid #bfdbfe; }
    .status-box.error{ color:var(--error); background:#fef2f2; border:1px solid #fecaca; }
    .status-box.success{ color:var(--success); background:rgba(22,101,52,0.06); border:1px solid rgba(22,101,52,0.20); }

    /* 인쇄 / PDF */
    /* [P26·페이지 여백 통제] 사용자 여백 '넓게' 설정 시 usable 높이가 줄어
       카드가 페이지보다 커지면 break-inside:avoid 가 무시돼 카드가 반토막 난다.
       @page 로 여백 12mm 고정 → usable≈1046px 확보, 주요 카드가 항상 한 페이지에. */
    @page{ size:A4; margin:12mm; }
    @media print{
      /* [P26·색감 무손상] 브라우저 인쇄 기본값은 배경색·그라디언트를 제거해
         웹 화면과 색감이 달라진다(카드·브랜드색이 흰색으로 빠짐).
         print-color-adjust:exact 로 화면에 보이는 색을 인쇄에 그대로 유지. */
      *{ -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }
      html, body{ background:#fff !important; }
      body{ padding:0; }
      .topbar, .nopdf, .status-box{ display:none !important; }
      /* 여백은 @page(12mm)가 담당 → .report 내부 padding 은 좌우 최소만(상하 0). */
      .report{ box-shadow:none; border:none; border-radius:0; padding:0 2mm; }
      /* [P26·화면판 인쇄 정상화] 전면형 2단 셸이 인쇄에 그대로 반영되면
         사이드바 폭(--sb-w)만큼 본문이 좁아지고 grid가 깨진다.
         .pdf-capture 와 동일하게 셸을 1단으로 무력화 + 사이드바 숨김 →
         화면판 인쇄가 폭 전체를 정상 사용. (기존 규칙 무손상, 추가만) */
      .lp-shell{ display:block !important; max-width:none !important; }
      .lp-sidebar{ display:none !important; }
      .lp-content{ padding:0 !important; }
      /* [P26·페이지 넘김 정상화 — 실측 웹 클래스 기반]
         핵심 원리: 브라우저는 "1페이지보다 큰 요소"의 break-inside:avoid 를 무시한다.
         실측상 .sec.gx-panel(최대 2155px) 등 컨테이너는 페이지보다 훨씬 커서

    // PR#76: lang-aware navigation 헬퍼 (login.html 과 동일 패턴, SSOT = URL ?lang)
    function _withLang(path) {
      try {
        var lang = "";
        try {
          lang = (new URL(window.location.href).searchParams.get("lang") || "").toLowerCase();
        } catch (_) {}
        if (lang !== "en") return path;
        if (!path) return path;
        if (/^(mailto:|tel:|javascript:|data:|#)/i.test(path)) return path;
        if (/^https?:\/\//i.test(path)) {
          try {
            var ext = new URL(path);
            if (ext.origin !== window.location.origin) return path;
          } catch (_) { return path; }
        }
        var u = new URL(path, window.location.origin);
        u.searchParams.set("lang", "en");
        if (/^https?:\/\//i.test(path)) return u.href;
        // 루트("/") 또는 빈 path 는 절대경로로 반환해 cleanUrl 무한 리다이렉트 방지
        var lastSeg = u.pathname.split("/").pop();
        if (!lastSeg || path === "/" || path.charAt(0) === "/") {
          return u.pathname + (u.search || "") + (u.hash || "");
        }
        return lastSeg + (u.search || "") + (u.hash || "");
      } catch (_) { return path; }
    }

    // PR#41: 모바일 RTDB 안정화 모듈 — mypage.html / report.html 와 동일한 REST 폴백 패턴.
    //  - asia-southeast1 리전 Android Chrome WebSocket 핸드셰이크 실패 시
    //    SDK get() 이 timeout 안에 못 끝나는 환경 대응.
    var _IS_MOBILE_PRG = (function(){
      try { return /Mobi|Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || ""); }
      catch(_) { return false; }
    })();
    var _T_PRG = {
      get:    _IS_MOBILE_PRG ? 40000 : 20000,
      idtoken: 8000,
      restMs: _IS_MOBILE_PRG ? 15000 : 12000
    };
    var _RTDB_BASE_PRG = firebaseConfig.databaseURL.replace(/\/+$/, "");
    function _withTimeoutPrg(promise, ms, label){
      return new Promise(function(resolve, reject){
        var t = setTimeout(function(){ reject(new Error((label||"op") + ":timeout")); }, ms);
        Promise.resolve(promise).then(
          function(v){ clearTimeout(t); resolve(v); },
          function(e){ clearTimeout(t); reject(e); }
        );
      });
    }
    async function _restFetchPrg(path, ms, label){
      var u = auth.currentUser;
      if (!u) throw new Error("rest:no-auth");
      var idToken;
      try { idToken = await _withTimeoutPrg(u.getIdToken(false), _T_PRG.idtoken, label + ":idtoken"); }
      catch(eTok) { throw new Error("rest:idtoken-failed:" + (eTok && eTok.message)); }
      var url = _RTDB_BASE_PRG + "/" + path.replace(/^\/+/, "") + ".json?auth=" + encodeURIComponent(idToken);
      var ctrl = (typeof AbortController !== "undefined") ? new AbortController() : null;
      var to = setTimeout(function(){ if (ctrl) try { ctrl.abort(); } catch(_){} }, ms);
      try {
        var res = await fetch(url, { method: "GET", mode: "cors", cache: "no-store", signal: ctrl ? ctrl.signal : undefined, credentials: "omit" });
        clearTimeout(to);
        if (!res.ok) {
          var bodyText = ""; try { bodyText = (await res.text()).slice(0, 120); } catch(_){}
          throw new Error("rest:http-" + res.status + ":" + bodyText);
        }
        var data = await res.json();
        return { exists: function(){ return data !== null && data !== undefined; }, val: function(){ return data; } };
      } catch(eFetch) {
        clearTimeout(to);
        if (eFetch && eFetch.name === "AbortError") throw new Error("rest:timeout");
        throw eFetch;
      }
    }
    // 안정화 get: [Day6] 모바일·PC 모두 REST 1차 → SDK 2차 로 통일.
    //   기존 PC 분기는 SDK get() 1차라, asia-southeast1 RTDB WebSocket 핸드셰이크 지연 시
    //   _T_PRG.get(PC 20s)까지 대기한 뒤에야 REST 폴백 → "실행 프로그램을 불러오고 있습니다..."
    //   장시간 멈춤의 원인. report-loading(PR#199)이 REST 우선으로 빠른 것과 동일 철학 적용.
    //   REST 는 단순 HTTPS GET 이라 WebSocket 지연 영향 없음. 실패 시 SDK 로 폴백(비파괴).
    //   롤백: 아래를 이전 (모바일 REST우선 / PC SDK우선) 분기로 원복.
    async function _safeGet(path, label){
      label = label || path;
      try {
        var s1 = await _restFetchPrg(path, _T_PRG.restMs, label + ":rest");
        console.log("[" + label + "] REST 성공");
        return s1;
      } catch(eR) {
        console.warn("[" + label + "] REST 1차 실패 → SDK 폴백:", eR && eR.message);
      }
      try {
        var s2 = await _withTimeoutPrg(get(ref(db, path)), _T_PRG.get, label + ":sdk");
        console.log("[" + label + "] SDK 성공");

      } catch(eS) {
        console.warn("[" + label + "] SDK 2차 실패:", eS && eS.message);

    }

    // PR#71-D: 모바일 재생성 무한 대기 결함 처치 — write(set/update) REST 폴백 추가
    //   - 기존: _safeGet 만 read 폴백 적용. set()/update() 는 SDK 직접 호출이라

    //   - 처치: _safeWrite (timeout + REST PUT/PATCH 폴백) 도입.
    //          모바일은 REST 1차 → SDK 2차, PC는 SDK 1차 → REST 2차 (read와 동일 패턴)
    //   - serverTimestamp 객체는 REST 호출 시 ISO 문자열로 직렬화 보존
    function _serializeForRest(obj){
      // serverTimestamp() 결과({.sv:"timestamp"})는 REST에서 그대로 처리되므로 보존
      // null/undefined 보존, 그 외는 그대로 통과
      return obj;
    }
    async function _restWritePrg(method, path, body, ms, label){
      var u = auth.currentUser;
      if (!u) throw new Error("rest:no-auth");
      var idToken;
      try { idToken = await _withTimeoutPrg(u.getIdToken(false), _T_PRG.idtoken, label + ":idtoken"); }
      catch(eTok) { throw new Error("rest:idtoken-failed:" + (eTok && eTok.message)); }
      var url = _RTDB_BASE_PRG + "/" + path.replace(/^\/+/, "") + ".json?auth=" + encodeURIComponent(idToken);
      var ctrl = (typeof AbortController !== "undefined") ? new AbortController() : null;
      var to = setTimeout(function(){ if (ctrl) try { ctrl.abort(); } catch(_){} }, ms);
      try {
        var res = await fetch(url, {
          method: method, // "PUT" (set) | "PATCH" (update)
          mode: "cors", cache: "no-store",
          signal: ctrl ? ctrl.signal : undefined,
          credentials: "omit",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(_serializeForRest(body))
        });
        clearTimeout(to);
        if (!res.ok) {
          var bodyText = ""; try { bodyText = (await res.text()).slice(0, 160); } catch(_){}
          throw new Error("rest:http-" + res.status + ":" + bodyText);
        }
        return await res.json().catch(function(){ return null; });
      } catch(eFetch) {
        clearTimeout(to);
        if (eFetch && eFetch.name === "AbortError") throw new Error("rest:timeout");
        throw eFetch;
      }
    }
    // 안정화 write: [Day6] 모바일·PC 모두 REST 1차 → SDK 2차 로 통일.
    //   _safeGet 과 동일 이유 — PC SDK 1차는 WebSocket 지연 시 _T_PRG.get(20s) 대기 후에야
    //   폴백해 재생성 저장이 오래 걸림. REST 우선으로 통일해 속도/일관성 확보(비파괴).
    //   mode: "set" → PUT, "update" → PATCH
    //   serverTimestamp() 표식은 SDK/REST 모두 {.sv:"timestamp"} 토큰으로 동일 처리됨.
    //   롤백: 이전 (모바일 REST우선 / PC SDK우선) 분기로 원복.
    async function _safeWrite(mode, path, payload, label){
      label = label || (mode + ":" + path);
      var method = (mode === "update") ? "PATCH" : "PUT";
      try {
        await _restWritePrg(method, path, payload, _T_PRG.restMs, label + ":rest");
        console.log("[" + label + "] write REST 성공");
        return;
      } catch(eR) {
        console.warn("[" + label + "] write REST 1차 실패 → SDK 폴백:", eR && eR.message);
      }
      try {
        var sdkOp = (mode === "update")
          ? update(ref(db, path), payload)
          : set(ref(db, path), payload);
        await _withTimeoutPrg(sdkOp, _T_PRG.get, label + ":sdk");
        console.log("[" + label + "] write SDK 성공");
        return;
      } catch(eS) {
        console.warn("[" + label + "] write SDK 2차 실패:", eS && eS.message);
        throw eS;

    //   - 동일 페이지에서 중복 호출되어도 안전 (기존 노드 제거 후 재주입)
    //   - .pdf-capture 클래스 시 CSS 로 자동 숨김 → PDF 무영향
    function __injectScreenWatermark(emailRaw){
      try {
        var prev = document.getElementById("__lpWatermark");
        if (prev && prev.parentNode) prev.parentNode.removeChild(prev);
        var email = String(emailRaw || "").trim();
        var masked = "";
        if (email && email.indexOf("@") > 0) {
          var parts = email.split("@");
          var loc = parts[0] || "";
          masked = (loc.length <= 3 ? loc : loc.slice(0, 3)) + "***@" + (parts[1] || "");
        }
        var now = new Date();
        var ts = now.getUTCFullYear() + "-" +
                 String(now.getUTCMonth()+1).padStart(2,"0") + "-" +
                 String(now.getUTCDate()).padStart(2,"0") + " " +
                 String(now.getUTCHours()).padStart(2,"0") + ":" +
                 String(now.getUTCMinutes()).padStart(2,"0") + " UTC";
        var label = (masked ? masked + "  ·  " : "") + ts;
        if (!label) return;
        var wrap = document.createElement("div");
        wrap.id = "__lpWatermark";
        wrap.setAttribute("aria-hidden", "true");
        var html = "";
        for (var i = 0; i < 40; i++) { html += "<span>" + label + "</span>"; }
        wrap.innerHTML = html;
        document.body.appendChild(wrap);
      } catch(_){}
    }
    function escapeHtml(s){
      return String(s == null ? "" : s)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")

    var PROG_DOMAIN_WORDS = ["종교","교육","경영","콘텐츠","선교","목회","신학","교회"];
    function progScrub(t){

    }

        if (!t) return false;

      if (m) return m[1].trim();

    //    키: lp_wretro_<uid>_<sid> → { "1": { state, note, ts }, ... }

    function _retroStoreKey(){

    //  [UI/UX v1.1] V4 프로그램 시각화 — 맞춤 실행프로그램 목적 최적화
    //   · V4-a 3주 루틴 타임라인(1→2→3주 진행 노드)
    //   · V4-b 기대효과 '성장 방향' 게이지(측정 수치가 아니라 방향성 — 과장 수치 금지)
    //   · 순수 SVG/HTML, html2canvas/PDF 호환, 비파괴(재료 없으면 "" 반환 → 기존 텍스트만)
    // ══════════════════════════════════════════════════════════════════
    // V4-a: 3주 타임라인 (weeks[].week, weeks[].title)
    function buildWeekTimeline(weeks){
      var ws = (weeks || []).filter(function(w){ return w && (w.week || w.title); });
      if (ws.length < 2) return ""; // 1개뿐이면 타임라인 의미 약함 → skip
      var WEEK_LBL = _t('program.week_label', "주차");
      var n = ws.length;
      // [요청2] 하단 제목을 자르지 않고 완전체로 보이도록 최대 2줄 자동 줄바꿈.
      //   노드 간 폭(gap)에 맞춰 한 줄 최대 글자 수를 산출 → 단어 경계로 wrap.
      //   3줄 이상이 될 만큼 아주 길 때만 마지막 줄을 말줄임(겹침 방지).
      var W = 520, padX = 56, y = 46;
      var gap = (W - padX*2) / (n - 1);
      // 라벨 폭(≈ 인접 노드 간격의 92%) 안에 들어갈 대략적 글자 수(폰트 11.5px 기준, 한글 폭 ≈ 6.6px)
      var _charPx = 6.6;
      var _maxLineChars = Math.max(6, Math.floor((gap * 0.92) / _charPx));
      // 제목을 최대 2줄로 감싸는 헬퍼(단어 경계 우선, 없으면 글자 단위)
      function _wrapTitle(s){
        s = String(s || "").trim();
        if (!s) return [];
        if (s.length <= _maxLineChars) return [s];
        var words = s.split(/\s+/);
        var lines = [], cur = "";
        for (var wi = 0; wi < words.length; wi++){
          var cand = cur ? (cur + " " + words[wi]) : words[wi];
          if (cand.length <= _maxLineChars){ cur = cand; }
          else {
            if (cur) lines.push(cur);
            cur = words[wi];
            // 단어 자체가 한 줄보다 길면 강제로 쪼갬
            while (cur.length > _maxLineChars){
              lines.push(cur.slice(0, _maxLineChars));
              cur = cur.slice(_maxLineChars);
            }
          }
          if (lines.length >= 2) break; // 2줄까지만 채우고 나머지는 아래에서 병합
        }
        if (cur && lines.length < 2) lines.push(cur);
        // 아직 남은 단어가 있으면(=2줄 초과) 2번째 줄에 이어붙이고 말줄임
        if (lines.length === 2){
          var usedLen = (lines[0] + " " + lines[1]).replace(/\s+/g," ").trim().length;
          if (s.replace(/\s+/g," ").trim().length > usedLen){
            var l2 = lines[1];
            if (l2.length > _maxLineChars - 1) l2 = l2.slice(0, Math.max(1,_maxLineChars-1));
            lines[1] = l2 + "…";
          }
        }
        return lines.slice(0, 2);
      }
      // 전체 노드 중 제목 최대 줄 수 → viewBox 높이 동적 결정
      var _maxLines = 1;
      ws.forEach(function(w){ var ln = _wrapTitle(w.title).length || 1; if (ln > _maxLines) _maxLines = ln; });
      var _lineH = 14;                       // 제목 줄 간격(px)
      var H = 78 + _maxLines * _lineH + 6;    // 노드/상단라벨 여백 + 제목 줄 높이
      var line = '<line x1="'+padX+'" y1="'+y+'" x2="'+(W-padX)+'" y2="'+y+'" stroke="#99f6e4" stroke-width="4" stroke-linecap="round"/>';
      var nodes = "";
      ws.forEach(function(w, i){
        var cx = padX + gap*i;
        // 진행 노드(채워진 원 + 주차 번호) — 마지막 노드는 강조
        var isLast = (i === n-1);
        var r = isLast ? 17 : 14;
        var fill = isLast ? "#0d9488" : "#14b8a6";
        nodes += '<circle cx="'+cx+'" cy="'+y+'" r="'+r+'" fill="'+fill+'" stroke="#fff" stroke-width="3"/>';
        nodes += '<text x="'+cx+'" y="'+(y+5)+'" text-anchor="middle" font-size="14" font-weight="900" fill="#fff">'+escapeHtml(String(w.week||(i+1)))+'</text>';
        // 상단 라벨(N주차)
        nodes += '<text x="'+cx+'" y="'+(y-26)+'" text-anchor="middle" font-size="11" font-weight="800" fill="#0f766e">'+escapeHtml(String(w.week||(i+1))+WEEK_LBL)+'</text>';
        // 하단 제목(완전체 · 최대 2줄) — 여러 <tspan> 으로 줄바꿈
        // [요청1] 양 끝 노드는 middle 정렬 시 제목이 viewBox(0~W) 밖으로 나가 첫 글자('아' 등)가
        //   잘리는 문제 → 첫 노드는 start, 마지막 노드는 end, 가운데만 middle 로 앵커/기준 x 조정.
        var tlines = _wrapTitle(w.title);

          var tsY0 = y + 34;
          var isFirst = (i === 0);
          var _anchor = isFirst ? "start" : (isLast ? "end" : "middle");
          // 앵커 기준 x: start → 좌측 안전 여백(4px), end → 우측 안전 여백(W-4), middle → 노드 중심

          var tspans = tlines.map(function(tl, li){
            return '<tspan x="'+_tx+'" y="'+(tsY0 + li*_lineH)+'">'+escapeHtml(tl)+'</tspan>';
          }).join("");

        '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="max-width:520px;display:block;margin:0 auto" role="img" aria-label="3주 실행 루틴 타임라인">'
        + '<title>3주 실행 루틴 진행 타임라인</title>'
        + line + nodes
        + '</svg>';
      return '<div class="week-timeline-card">'
        + '<div class="wt-eyebrow">📅 ' + escapeHtml(_t('program.timeline_eyebrow', "한 주씩 쌓아가는 실행 루틴")) + '</div>'
        + svg + '</div>';
    }

    /* engine output 객체에 i18n 변환 적용 (deep clone 후 변환된 사본 반환) */
    /* rules.json의 _en 필드를 기반으로 KO→EN 매핑 테이블 동적 생성 */
    function buildRulesKo2En(rules){
      const map = {};
      if (!rules) return map;
      // format / spec
      if (rules.format && rules.format.title && rules.format.title_en) map[rules.format.title] = rules.format.title_en;
      if (rules.format && rules.format.subtitleTemplate && rules.format.subtitleTemplate_en) {
        // {name} 자리표시자가 들어 있으므로 등록만, 실제 치환은 별도 (subtitle은 engine이 자체 생성)
        map["__subtitle_template__"] = { ko: rules.format.subtitleTemplate, en: rules.format.subtitleTemplate_en };
      }
      if (rules.format && rules.format.service && rules.format.service_en) map[rules.format.service] = rules.format.service_en;
      if (rules.spec && rules.spec_en) map[rules.spec] = rules.spec_en;

      // tones
      const tones = rules.tones || {};
      Object.keys(tones).forEach(function(tk){
        const t = tones[tk] || {};
        function reg(ko, en){ if (typeof ko === "string" && typeof en === "string") map[ko] = en; }
        function regArr(koArr, enArr){
          if (!Array.isArray(koArr) || !Array.isArray(enArr)) return;
          koArr.forEach(function(k, i){ if (typeof k === "string" && typeof enArr[i] === "string") map[k] = enArr[i]; });
        }
        reg(t.label, t.label_en);
        reg(t.tagline, t.tagline_en);
        reg(t.quarterTheme, t.quarterTheme_en);
        regArr(t.quarterLeadParas, t.quarterLeadParas_en);
        // weeks
        (t.weeks || []).forEach(function(w){
          reg(w.title, w.title_en);
          regArr(w.actions, w.actions_en);
        });
        // month3Goals
        (t.month3Goals || []).forEach(function(g){
          reg(g.title, g.title_en);
          reg(g.criterion, g.criterion_en);
        });
        // year1
        if (t.year1){
          regArr(t.year1.vision, t.year1.vision_en);
          regArr(t.year1.milestones, t.year1.milestones_en);
        }
        // modules
        (t.modules || []).forEach(function(m){
          reg(m.title, m.title_en);
          reg(m.summary, m.summary_en);
          regArr(m.actions, m.actions_en);
        });
        // trackBoard
        regArr(t.trackBoardWeekly, t.trackBoardWeekly_en);
        regArr(t.trackBoardMonthly, t.trackBoardMonthly_en);
        // risks
        (t.risks || []).forEach(function(r){
          reg(r.risk, r.risk_en);
          reg(r.mitigation, r.mitigation_en);
        });
        // effects (fitJob/expansion/career/vision: body without prefix)
        if (t.effects){
          reg(t.effects.fitJob, t.effects.fitJob_en);
          reg(t.effects.expansion, t.effects.expansion_en);
          reg(t.effects.career, t.effects.career_en);
          reg(t.effects.vision, t.effects.vision_en);
        }
        // newPaths
        regArr(t.newPaths, t.newPaths_en);
        // nextSteps (m1/m3/y1)
        if (t.nextSteps){
          reg(t.nextSteps.m1, t.nextSteps.m1_en);
          reg(t.nextSteps.m3, t.nextSteps.m3_en);
          reg(t.nextSteps.y1, t.nextSteps.y1_en);
        }
        // closing
        regArr(t.closing, t.closing_en);
      });

      // axisHints (4개)
      if (rules.axisHints){
        ["self_understanding","self_expression","self_design","self_execution"].forEach(function(k){
          if (rules.axisHints[k] && rules.axisHints[k+"_en"]) map[rules.axisHints[k]] = rules.axisHints[k+"_en"];
        });
      }
      // weakAxisBoosters
      if (rules.weakAxisBoosters){
        ["self_understanding","self_expression","self_design","self_execution"].forEach(function(k){
          const ko = rules.weakAxisBoosters[k], en = rules.weakAxisBoosters[k+"_en"];
          if (Array.isArray(ko) && Array.isArray(en)){
            ko.forEach(function(s, i){ if (typeof s === "string" && typeof en[i] === "string") map[s] = en[i]; });
          }
        });
      }
      // footerNotice
      if (rules.footerNotice){
        if (Array.isArray(rules.footerNotice.lines) && Array.isArray(rules.footerNotice.lines_en)){
          rules.footerNotice.lines.forEach(function(s,i){
            if (typeof s === "string" && typeof rules.footerNotice.lines_en[i] === "string") map[s] = rules.footerNotice.lines_en[i];
          });
        }
        if (Array.isArray(rules.footerNotice.qualityChecklist) && Array.isArray(rules.footerNotice.qualityChecklist_en)){
          rules.footerNotice.qualityChecklist.forEach(function(s,i){
            if (typeof s === "string" && typeof rules.footerNotice.qualityChecklist_en[i] === "string") map[s] = rules.footerNotice.qualityChecklist_en[i];
          });
        }
      }
      return map;
    }

    /* 깊은 객체에 대해 RULES_KO2EN 매핑을 적용 — 문자열 정확 일치 시 치환 */
    function _applyRulesMapDeep(obj, ko2en, skipPaths){
      if (!ko2en) return;
      const skip = skipPaths || {};
      function walk(v, parent, key, path){
        if (typeof v === "string"){
          if (skip[path]) return;
          if (Object.prototype.hasOwnProperty.call(ko2en, v)){
            parent[key] = ko2en[v];
          }
        } else if (Array.isArray(v)){
          v.forEach(function(x, i){ walk(x, v, i, path+"["+i+"]"); });
        } else if (v && typeof v === "object"){
          for (const k in v){ walk(v[k], v, k, path+"."+k); }
        }
      }
      if (Array.isArray(obj)){
        obj.forEach(function(x, i){ walk(x, obj, i, "["+i+"]"); });
      } else if (obj && typeof obj === "object"){
        for (const k in obj){ walk(obj[k], obj, k, k); }
      }
    }

      //  - reports/{uid}/{sid}.lang 또는 program 자체의 meta.lang을 신뢰원으로 사용
      try {
        let _lockLang = (stored.lang || (currentProgram && currentProgram.meta && currentProgram.meta.lang));
        if (!_lockLang) {
          try {
            // PR#41: REST 폴백 적용

    /* ─────────────────────────── 렌더링 ─────────────────────────── */
    function renderProgram(pIn){
      // 화면 표시용 i18n 변환 사본 (저장본 currentProgram은 한국어 정규형 유지)

      const closing = p.closing || [];
      const footer = p.footer || {};

      let html = "";

      // ── 헤더 (표지)

      html += '<header class="rep-header">';

      if (cover.service)     html += '  <span class="submitted">' + escapeHtml(cover.service) + '</span>';
      // [P26 Step2] 옵션 A: 헤더 슬림화 — type-line(정체성)·quote(사명)는 §1 '한눈에 보는 나' 앵커로 완전 융합.
      //   중복 노출을 제거해 헤더는 '발행 정보'만, 정체성·사명은 요약이 단일 포괄(AX 이해 레이어 단일화).
      //   데이터·엔진 무손상: cover.typeLine / cover.quote 필드는 그대로 두고 표시 레이어에서만 비노출.
      // html += '  <div class="type-line">' + escapeHtml(cover.typeLine || "") + '</div>';

      html += '</header>';

      // ── §0 분기 테마 (통합 대시보드 — [P26] Step2: 결정 프레임)

      //    표시 레이어 프레이밍만 — quarter.* 데이터/엔진 무손상. §7 스크럽 전면 적용.

      html += '<section class="sec gx-panel">';

      html += '  <div class="q2-frame">';

      // ── §1 한눈에 보는 나 (통합 대시보드 — [P26] 시안 D: 3층 위계 + 플랫폼 패널)
      //    3초 이해(정체성 앵커) → 30초 납득(정체성 근거 2카드) → 3분 행동(행동 3카드 + CTA)

      var _actGaps  = sm.gaps ? progScrub(sm.gaps) : "";

      if (_actGaps || _actEnv || _actPaths){
        html += '  <div class="gx-layer-lbl">' + escapeHtml(_t('program.layer_action', "그래서 이렇게 나아갑니다")) + '</div>';
        html += '  <div class="gx-act-grid">';
        if (_actGaps){
          html += '<div class="gx-actc cta"><span class="gx-step">' + escapeHtml(_t('program.act_firststep', "지금 시작 · 첫걸음")) + '</span>'
            + '<div class="t">🌱 ' + escapeHtml(_t('program.summary_lbl_gaps', "더할 연습")) + '</div>'
            + '<div class="b">' + escapeHtml(_actGaps) + '</div></div>';

        if (_actEnv){
          html += '<div class="gx-actc plain"><div class="t">🏡 ' + escapeHtml(_t('program.summary_lbl_env', "잘 맞는 자리")) + '</div>'
            + '<div class="b">' + escapeHtml(_actEnv) + '</div></div>';

        if (_actPaths){
          html += '<div class="gx-actc plain paths"><div class="t">🚪 ' + escapeHtml(_t('program.summary_lbl_newpaths', "이 사명이 여는 길")) + '</div>'

        html += '  </div>';

      html += '</section>';

      // ── §2 맞춤 실행 프로그램 (3주 / 3개월 / 1년) — [P26] Step2: 시간축 위계 + 패널 통일
      //    시안 D 언어 계승(.gx-panel). 전체 축을 tl-rail로 먼저 보여 주고, 구간별 소제목(.stage-lbl)으로 위계화.
      //    표시 레이어 프레이밍만 — program.* 데이터/엔진 무손상. §7 스크럽 전면 적용.
      html += '<section class="sec gx-panel">';
      html += '  <div class="gx-head"><h2 class="sec-title gx-h2"><span class="ico">🔁</span>'
        + escapeHtml(_t('program.sec_program_short', "맞춤 실행 프로그램")) + guideIco('p-plan') + '</h2>'
        + '<span class="gx-pill">' + escapeHtml(_t('program.plan_pill', "실행")) + '</span></div>';

      // 시간축 레일 (지금·3주 → 3개월 → 1년)

      html += '    <div class="tl-node now"><div class="tl-when">' + escapeHtml(_t('program.tl_now', "지금 · 3주")) + '</div><div class="tl-what">' + escapeHtml(_t('program.tl_now_what', "매일의 루틴")) + '</div></div>';
      html += '    <div class="tl-arrow">→</div>';
      html += '    <div class="tl-node"><div class="tl-when b">' + escapeHtml(_t('program.tl_m3', "3개월")) + '</div><div class="tl-what">' + escapeHtml(_t('program.tl_m3_what', "손에 남길 결과")) + '</div></div>';
      html += '    <div class="tl-arrow">→</div>';
      html += '    <div class="tl-node"><div class="tl-when b">' + escapeHtml(_t('program.tl_y1', "1년")) + '</div><div class="tl-what">' + escapeHtml(_t('program.tl_y1_what', "닿을 나의 모습")) + '</div></div>';
      html += '  </div>';

      // [P1.5-7단계] 4구분 라벨 (표시 레이어)
      const WEEK_LBL = _t('program.week_label', "주차");

      const STEP_IFTHEN = _t('program.step_ifthen', "이렇게 해봐요");
      const STEP_HOW    = _t('program.step_how',    "실행 방법");
      const STEP_CHANGE = _t('program.step_change', "이런 변화");
      // action 텍스트에 조건절(…할 때/…면/…거든/…경우)이 있으면 if-then 실행 의도로 조용히 프레이밍.
      // 데이터에 if-then 필드가 없으므로 표시 힌트로만 — 없는 내용은 지어내지 않음(정직).
      function _ifThenParts(a){
        var s = String(a == null ? "" : a);
        // 조건 → 행동 경계를 실제 텍스트에서만 탐지(없는 조건은 지어내지 않음 · 정직).
        // 한국어 조건절: "… 때"(뜰 때/지쳤을 때/할 때 등), "…면", "…거든", "…경우", "…이라면"
        // "때" 앞에는 공백을 요구해 오탐(예: '어때') 방지, "때" 뒤엔 조사(에/엔/는/도) 허용.
        var m = s.match(/^(.*?\S+\s\S*때(?:에|엔|는|도)?|.*?(?:다면|으면|하면|되면|거든|경우|이라면))\s*[,，.。:：→\-]*\s+(.+)$/);
        if (m && m[1] && m[2] && m[1].trim().length >= 2 && m[2].trim().length >= 2){
          var then = m[2].trim();
          // 행동부가 중점(·)·불릿 나열로 시작하면 조건-행동이 아닌 나열형 → 평문 유지(과잉 프레이밍 방지·정직)
          if (/^[·•▪◦\-*]/.test(then)) return null;
          return { when: m[1].trim(), then: then };
        }
        return null;
      }

      // 구간 1: 지금 · 3주 (매일 굴리는 실행 루틴)
      html += '  <div class="stage-lbl"><span class="stage-badge">' + escapeHtml(_t('program.tl_now', "지금 · 3주")) + '</span>'

      (program.weeks || []).forEach(function(w){
        html += '<div class="wk">';
        html += '  <div class="top"><span class="num">' + escapeHtml(String(w.week)) + escapeHtml(WEEK_LBL) + '</span><span class="ttl">' + escapeHtml(progScrub(w.title || "")) + '</span></div>';

        if (w.subline){
          html += '  <div class="wstep"><span class="n">1</span><div><span class="lbl">' + escapeHtml(STEP_FOCUS) + '</span>'

        }
        // ② 이렇게 해봐요 (if-then) ← w.guide
        if (w.guide){
          var _gS = progScrub(w.guide);
          var _gp = _ifThenParts(_gS);
          var _gInner = _gp
            ? '<span class="wc-when">' + escapeHtml(_gp.when) + '</span> → <span class="wc-then">' + escapeHtml(_gp.then) + '</span>'

          html += '  <div class="wstep"><span class="n">2</span><div><span class="lbl">' + escapeHtml(STEP_IFTHEN) + '</span>'
            + '<div class="tx">' + _gInner + '</div></div></div>';
        }
        // ③ 실행 방법 ← w.actions[]
        if (w.actions && w.actions.length){
          html += '  <div class="wstep"><span class="n">3</span><div><span class="lbl">' + escapeHtml(STEP_HOW) + '</span><ul>';
          w.actions.forEach(function(a){

        if (w.effects && w.effects.length){

            + '<div class="tx">' + w.effects.map(function(t){ return escapeHtml(progScrub(t)); }).join(" · ") + '</div></div></div>';

        var _rWeek = (w.week != null) ? w.week : "";

          + '<div class="wr-statusline" aria-live="polite"></div>'

          + '</div>';
        html += '</div>';
      });

      // 구간 2: 3개월 뒤 (손에 남길 결과 = 도착 증거)
      const m3 = program.month3 || {};
      html += '  <div class="stage-lbl"><span class="stage-badge mid">' + escapeHtml(_t('program.stage_m3', "3개월 뒤")) + '</span>'
        + '<span class="stage-name">' + escapeHtml(_t('program.tl_m3_what', "손에 남길 결과")) + '</span><span class="stage-after"></span></div>';
      if (m3.guide) html += '  <p class="stage-quote">' + escapeHtml(progScrub(m3.guide)) + '</p>';
      if (m3.goals && m3.goals.length){

    function _buildProgramSidebar(p){

    function _setupProgramScrollSpy(){
      try {
        if (_progSpy && typeof _progSpy.disconnect === "function") _progSpy.disconnect();
        if (typeof IntersectionObserver !== "function") return; // 미지원 → 하이라이트만 생략(비파괴)
        var sbNav = document.getElementById("lpSbNav");
        if (!sbNav) return;
        var links = Array.prototype.slice.call(sbNav.querySelectorAll("a[data-anchor]"));
        if (!links.length) return;
        var linkByAnchor = {};
        links.forEach(function(a){ var k=a.getAttribute("data-anchor"); (linkByAnchor[k]=linkByAnchor[k]||[]).push(a); });
        var targets = [];
        links.forEach(function(a){ var t = document.getElementById(a.getAttribute("data-anchor")); if (t) targets.push(t); });
        if (!targets.length) return;

          entries.forEach(function(en){
            if (en.isIntersecting) visible[en.target.id] = en.intersectionRatio;

          for (var i=0;i<targets.length;i++){ if (visible[targets[i].id] != null){ currentId = targets[i].id; break; } }
          if (!currentId) return;
          links.forEach(function(a){ a.classList.remove("is-current"); });
          if (linkByAnchor[currentId]) linkByAnchor[currentId].forEach(function(a){ a.classList.add("is-current"); });
        }, { rootMargin: "-10% 0px -70% 0px", threshold: [0, 0.01] });
        targets.forEach(function(t){ _progSpy.observe(t); });

      _retroBound = true;
      // 이벤트 위임 — programRoot 한 곳에만 바인딩 (재렌더 시 리스너 중복 방지)
      programRoot.addEventListener('click', function(ev){

          _retroSave(week, { state: nextState });

        // PR#71-D: 픽셀 분할 시 자식 안전 경계(safeCuts) 좌표 사전 계산 — 카드/항목 중간 절단 차단

        // PR#71-D: 자식 안전 경계 셀렉터 — 이 요소들의 시작 y좌표(블록 내부 기준)를 안전 절단선으로 활용
        //   - 페이지 한 장에 들어가지 않는 큰 섹션을 픽셀 분할할 때, 카드/항목 경계를 찾아 자연스럽게 절단
        const SAFE_CUT_SELECTORS = [
          ".week-card", ".module-card", ".l3-card",

        const rendered = [];
        for (const bEl of blocks){

          const hMm = canvas.height * contentW / canvas.width;

          // PR#71-D: 안전 경계 좌표 수집 (캔버스 픽셀 기준)
          //   - bEl 의 getBoundingClientRect().top 를 0 으로 잡고, 자식 요소들의 top - parentTop 을 픽셀로 환산
          //   - html2canvas scale=2 이므로 css px → canvas px 변환에 scaleFactor 적용
          const safeCutsPx = [];
          try {
            const parentRect = bEl.getBoundingClientRect();
            const scaleFactor = canvas.height / Math.max(1, bEl.offsetHeight); // 일반적으로 ≒ 2
            bEl.querySelectorAll(SAFE_CUT_SELECTORS).forEach(function(child){
              const r = child.getBoundingClientRect();
              const offsetCssPx = r.top - parentRect.top;
              if (offsetCssPx > 0 && offsetCssPx < bEl.offsetHeight) {
                safeCutsPx.push(Math.round(offsetCssPx * scaleFactor));
              }
            });
            // 정렬 + 중복 제거
            safeCutsPx.sort(function(a,b){ return a-b; });
            for (let i = safeCutsPx.length - 1; i > 0; i--) {
              if (safeCutsPx[i] - safeCutsPx[i-1] < 4) safeCutsPx.splice(i, 1);
            }
          } catch(_safeErr) { /* 안전 경계 계산 실패 시 기존 단순 분할로 폴백 */ }

          rendered.push({ data: canvas.toDataURL("image/jpeg", 0.92), wPx: canvas.width, hPx: canvas.height, hMm: hMm, safeCutsPx: safeCutsPx });

        let curY = marginTopFirst, curMaxH = maxFirstH, pageIndex = 0;
        function newPage(){ pdf.addPage(); pageIndex++; curY = marginTop; curMaxH = maxContentH; }

        // PR#71-D: 안전 경계 기반 절단선 선택 — offsetPx 부터 maxHpx 안에서 마지막 안전선 사용
        //   - 안전선이 없거나 너무 가까우면(전체의 50% 미만) 단순 maxHpx 사용 (무한 루프 방지)
        function pickSafeCutPx(safeCuts, offsetPx, maxHpx, totalHpx){
          if (!safeCuts || safeCuts.length === 0) return Math.min(maxHpx, totalHpx - offsetPx);
          const limit = offsetPx + maxHpx;
          let best = -1;
          for (let i = 0; i < safeCuts.length; i++) {
            if (safeCuts[i] > offsetPx && safeCuts[i] <= limit) best = safeCuts[i];
            else if (safeCuts[i] > limit) break;
          }
          if (best < 0) return Math.min(maxHpx, totalHpx - offsetPx);
          const sliceHpx = best - offsetPx;
          // 슬라이스가 너무 작으면(페이지 50% 미만) 안전 경계 무시 — 페이지 낭비 방지
          if (sliceHpx < maxHpx * 0.5) return Math.min(maxHpx, totalHpx - offsetPx);
          return sliceHpx;
        }

        for (const blk of rendered){
          if (blk.hMm <= curMaxH - (curY - (pageIndex === 0 ? marginTopFirst : marginTop))){
            pdf.addImage(blk.data, "JPEG", marginX, curY, contentW, blk.hMm, undefined, "FAST");
            curY += blk.hMm + 4;
            const remaining = (pageIndex === 0 ? marginTopFirst + maxFirstH : marginTop + maxContentH) - curY;
            if (remaining < 30) newPage();
            continue;
          }
          if (curY > (pageIndex === 0 ? marginTopFirst : marginTop) + 5) newPage();

          if (blk.hMm > maxContentH){
            const pxPerMm = blk.hPx / blk.hMm;
            const pageHpx = Math.floor(maxContentH * pxPerMm);
            const srcCanvas = document.createElement("canvas");
            const img = new Image();
            await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = blk.data; });

              let sliceHpx;

                sliceHpx = blk.hPx - offsetPx; // 잔량

              const sliceHmm = sliceHpx / pxPerMm;

              if (offsetPx < blk.hPx) newPage();

            curY += blk.hMm + 4;
          }

    function loadScriptOnce(src, checkFn, timeoutMs){
      return new Promise((resolve, reject) => {
        if (checkFn && checkFn()) return resolve();
        const s = document.createElement("script");
        s.src = src; s.crossOrigin = "anonymous";
        let done = false;
        const timer = setTimeout(() => { if (done) return; done = true; reject(new Error("script load timeout: " + src)); }, timeoutMs || 8000);
        s.onload = () => {
          if (done) return;
          const t0 = Date.now();
          const iv = setInterval(() => {
            if (checkFn && checkFn()){ clearInterval(iv); clearTimeout(timer); done = true; resolve(); }
            else if (Date.now() - t0 > 1000){ clearInterval(iv); clearTimeout(timer); done = true; resolve(); }
          }, 50);
        };
        s.onerror = () => { if (done) return; done = true; clearTimeout(timer); reject(new Error("script load failed: " + src)); };
        document.head.appendChild(s);
      });
    }
    async function loadFromAnySource(sources, checkFn){
      let lastErr = null;
      for (const src of sources){
        if (checkFn && checkFn()) return;
        try { await loadScriptOnce(src, checkFn, 8000); if (checkFn && checkFn()) return; }
        catch(e){ lastErr = e; }
      }
      throw lastErr || new Error("all CDN sources failed");
    }
