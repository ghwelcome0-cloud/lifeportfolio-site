'(function fillToc(){var spans=document.querySelectorAll(".toc__pg[data-anchor]");spans.forEach(function(sp){var k=sp.getAttribute("data-anchor");var n=_pageMap[k];sp.textContent=(n!=null)?pad2(n):"—";});})();',
// [P27 · Living Book 브리지] 부모(iframe 밖) TOC 클릭 ↔ 앵커/페이지로 이동.
//   페이지 뷰어 모델: 무한 스크롤이 아니라 '한 지면씩' .page.lb-active 로 표시 → 매칭 100% 정확.
//   지면은 뷰포트에 맞춰 비율유지 확대/축소(가로·세로 모두) → 사진처럼 넓게, 여백 최소화.
'(function lbBridge(){',
'  var pages=Array.prototype.slice.call(document.querySelectorAll(".page"));',
'  if(!pages.length)return;',
'  var book=document.getElementById("book");',
'  var cur=1;',
'  var A4W=794,A4H=1123;',
'  var st=document.createElement("style");',
'  st.textContent=".book{padding:0!important;margin:0!important;gap:0!important;display:block!important;min-height:100vh;}"+',
'    ".page{display:none!important;margin:0 auto!important;}"+',
'    ".page.lb-active{display:block!important;}"+',
'    "html,body{height:100%;overflow:hidden;background:transparent;}"+',
'    "@media print{.page{display:block!important;}html,body{overflow:visible;}.book{min-height:0;}}";',
'  document.head.appendChild(st);',
'  var _lbFS=false;',                                // 전체화면 플래그(부모가 postMessage 로 갱신)
'  function fit(){',
'    var vw=document.documentElement.clientWidth;',
'    var vh=document.documentElement.clientHeight;',
     // 전체화면(프레젠테이션): 세로를 여백 0으로 꽉 채운다(높이 기준) → A4 지면이 화면 상하 가득.
     // 일반화면: 지면 전체가 보이도록 가로·세로 모두 고려(min) + 소폭 여백.
'    var sc;',
'    if(_lbFS){',
'      sc = vh / A4H;',                              // 세로 꽉 채움(여백 없음). 좌우 남는 폭은 배경.
'    } else {',
'      var pad=6;',
'      sc = Math.min((vw-pad)/A4W, (vh-pad)/A4H);',  // 지면 전체 노출
'    }',
'    sc=Math.max(0.2,Math.min(sc,4.0));',            // 과도 확대 방지 상한
'    if(book) book.style.zoom=sc;',
'  }',
'  fit();window.addEventListener("resize",fit);',
'  function total(){return pages.length;}',
'  function show(n){',
'    n=Math.max(1,Math.min(total(),n));',
'    pages.forEach(function(p,i){p.classList.toggle("lb-active", i===(n-1));});',
'    cur=n;',
'    try{window.scrollTo(0,0);}catch(e){}',
'    report();',
'  }',
'  function report(){try{parent.postMessage({t:"lb-pos",page:cur,total:total()},"*");}catch(e){}}',
'  function goPage(n){show(n);}',
'  function goAnchor(a){var n=_pageMap[a];if(n){return show(n);}}',
'  window.addEventListener("message",function(ev){var d=ev.data||{};if(d.t==="lb-go"){if(d.anchor)goAnchor(d.anchor);else if(d.page)goPage(d.page);}else if(d.t==="lb-ping"){report();}else if(d.t==="lb-step"){show(cur+(d.dir||0));}else if(d.t==="lb-fs"){_lbFS=!!d.on;fit();}});',
'  window.addEventListener("keydown",function(e){if(e.key==="ArrowRight"||e.key==="PageDown"||e.key===" "){e.preventDefault();show(cur+1);}else if(e.key==="ArrowLeft"||e.key==="PageUp"){e.preventDefault();show(cur-1);}});',
'  show(1);',
'  try{parent.postMessage({t:"lb-ready",total:total(),anchors:_pageMap},"*");}catch(e){}',
'})();'
        ].join("\n");
      }

        var isScreen = (theme === "screen");

        var nm = (data.profile && data.profile.name) ? String(data.profile.name) : "";
        var title = (isScreen ? "인생포트폴리오_실행프로그램(화면판)" : "인생포트폴리오_실행프로그램(소장판)") + (nm ? "_" + nm : "");
        var btnLabel = isScreen ? "📄 PDF로 저장 (화면판)" : "📘 PDF로 저장 (소장판)";
        // [P27] 임베드 모드: 툴바 제거 + 페이지 뷰어(한 지면씩)는 lbBridge 가 스타일 주입.
        var embedCSS = isEmbed
          ? 'body{background:transparent;}.toolbar{display:none!important;}'
            + '.page{box-shadow:0 12px 40px rgba(23,49,58,.20);border-radius:2px;}'
          : '';
        return '<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">'+
          '<meta name="viewport" content="width=device-width, initial-scale=1.0">'+
          '<title>'+title.replace(/</g,"&lt;")+'</title>'+
          // 본문 세리프(명조)는 Google Fonts 존재 → 유지. Pretendard는 Google 미호스팅(ORB) → 로컬 로드.
          '<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Noto+Serif+KR:wght@400;600;700&display=swap" rel="stylesheet">'+
          '<link rel="preload" as="font" href="'+location.origin+'/assets/fonts/pretendard/Pretendard-Regular.woff2" type="font/woff2" crossorigin>'+
          '<link rel="preload" as="font" href="'+location.origin+'/assets/fonts/pretendard/Pretendard-Bold.woff2" type="font/woff2" crossorigin>'+
          '<link rel="stylesheet" href="'+location.origin+'/assets/fonts/pretendard/pretendard.css">'+
          '<style>'+buildBookCSS(theme)+embedCSS+'</style></head><body>'+
          (isEmbed ? '' :
            '<div class="toolbar">'+
              '<button onclick="window.print()">'+btnLabel+'</button>'+
              '<span class="toolbar-hint">인쇄 대화상자에서 <b>대상 &gt; PDF로 저장</b>을 선택하세요</span>'+
            '</div>')+
          '<div class="book" id="book"></div>'+
          '<script>window.DATA='+JSON.stringify(data)+';<\/script>'+
          '<script>'+bookRenderScript()+'<\/script>'+
          '</body></html>';
      }

      function openBookWindow(theme){
        try {
          if (!currentProgram){
            alert(_t('program.reportbook_no_data', "실행 프로그램 데이터가 아직 준비되지 않았습니다. 잠시 후 다시 시도해 주세요."));
            return;
          }
          var data = buildProgramBookData(currentProgram);
          var html = buildBookHTML(data, { theme: theme });
          var w = window.open("", "_blank");
          if (!w){
            alert(_t('program.reportbook_popup', "팝업이 차단되었습니다. 팝업 허용 후 다시 시도해 주세요."));
            return;
          }
          w.document.open();
          w.document.write(html);
          w.document.close();
          var _fired = false;
          function _print(){ if(_fired) return; _fired = true; try { w.focus(); w.print(); } catch(_){} }
          w.addEventListener("load", function(){ setTimeout(_print, 600); });
          setTimeout(_print, 1800);
        } catch(e){
          try { console.error("[programbook] 생성 실패", e); } catch(_){}
          alert(_t('program.reportbook_error', "실행 프로그램북 생성 중 오류가 발생했습니다."));
        }
      }
      // 소장판 버튼 → keepsake 테마
      reportBookBtn.addEventListener("click", function(){ openBookWindow("keepsake"); });
      // [P26] 화면판(pdfBtn / 인쇄 다이얼로그 '화면판')이 호출할 수 있게 전역 노출
      window.__openProgramBook = openBookWindow;
      // [P26·검증 훅] read-only — 엔진·데이터 무손상, 부작용 없음
      window.__buildProgramBookHTML = function(theme, sampleOverride){ try{ return buildBookHTML(buildProgramBookData(sampleOverride||currentProgram), {theme:theme}); }catch(e){ return "ERR:"+(e&&e.stack||e); } };

      /* ══════════════════════════════════════════════════════════════
         [P27 · Living Book] 웹 화면 = 한 권.
         대시보드(#programRoot)를 폐기하고, 좌측 목차 + A4 지면 iframe(진짜 책)으로 대체.
         벡터 엔진(buildBookHTML/bookRenderScript) 무손상 — iframe srcdoc 에 그대로 마운트.
         report.html 과 1:1 동일한 페이지뷰어 모델.
         ══════════════════════════════════════════════════════════════ */
      // 이 책(실행 프로그램)의 장 — bookRenderScript 목차(toc)와 동일 순서·앵커
      var LB_CHAPTERS = [
        { n:"", ico:"📔", tx:"표지", page:1 },
        { n:"", ico:"📑", tx:"목차", page:2 },
        { n:"I", ico:"👤", tx:"한눈에 보는 나", anchor:"ch0" },
        { n:"II", ico:"🧭", tx:"분기 테마", anchor:"ch1" },
        { n:"III", ico:"📅", tx:"주차별 실행 루틴", anchor:"ch2" },
        { n:"IV", ico:"🎯", tx:"3개월 · 1년 목표", anchor:"ch3" },
        { n:"V", ico:"⚙", tx:"실행 모듈", anchor:"ch4" },
        { n:"VI", ico:"📊", tx:"성과 추적 보드", anchor:"ch5" },
        { n:"VII", ico:"📈", tx:"기대 효과", anchor:"ch6" },
        { n:"VIII", ico:"↗", tx:"다음 단계 · 리스크", anchor:"ch7" },
        { n:"IX", ico:"✅", tx:"마무리", anchor:"ch8" }
      ];

      var _lbState = { total:0, anchors:{}, cur:1, ready:false };

      function _lbFrame(){ return document.getElementById("lbFrame"); }
      function _lbPost(msg){ try{ var f=_lbFrame(); if(f&&f.contentWindow) f.contentWindow.postMessage(msg,"*"); }catch(e){} }

      function _lbBuildToc(){
        var chapUl = document.getElementById("lbChapters");
        if (chapUl){
          chapUl.innerHTML = LB_CHAPTERS.map(function(c,i){
            var target = c.anchor ? ('data-anchor="'+c.anchor+'"') : ('data-page="'+c.page+'"');
            return '<li><button type="button" class="lb-toc__item lb-chap" '+target+' data-idx="'+i+'">'
              + '<span class="no">'+(c.n||'·')+'</span><span class="ico">'+c.ico+'</span><span class="tx">'+c.tx+'</span></button></li>';
          }).join("");
          Array.prototype.forEach.call(chapUl.querySelectorAll(".lb-chap"), function(btn){
            btn.addEventListener("click", function(){
              var a = btn.getAttribute("data-anchor");
              var p = btn.getAttribute("data-page");
              if (a) _lbPost({ t:"lb-go", anchor:a });
              else if (p) _lbPost({ t:"lb-go", page:parseInt(p,10) });
              _lbCollapseTocMobile();
            });
          });
        }
      }

      // ── 모바일 목차 접기/펼치기 토글 ──
      function _lbIsMobile(){ try{ return window.matchMedia("(max-width:960px)").matches; }catch(_){ return window.innerWidth<=960; } }
      function _lbCollapseTocMobile(){
        if (!_lbIsMobile()) return;
        var toc = document.getElementById("lbToc");
        var tg  = document.getElementById("lbTocToggle");
        if (toc) toc.classList.remove("is-open");
        if (tg)  tg.setAttribute("aria-expanded","false");
      }
      (function _lbWireTocToggle(){
        var tg = document.getElementById("lbTocToggle");
        var toc = document.getElementById("lbToc");
        if (!tg || !toc) return;
        tg.addEventListener("click", function(){
          var open = toc.classList.toggle("is-open");
          tg.setAttribute("aria-expanded", open ? "true" : "false");
        });
      })();

      // 현재 페이지에 해당하는 장 목차 하이라이트(스크롤스파이)
      function _lbHighlight(page){
        var chapUl = document.getElementById("lbChapters");
        if (!chapUl) return;
        var btns = Array.prototype.slice.call(chapUl.querySelectorAll(".lb-chap"));
        var bestIdx = 0;
        btns.forEach(function(btn, i){
          var a = btn.getAttribute("data-anchor");
          var p = a ? _lbState.anchors[a] : parseInt(btn.getAttribute("data-page"),10);
          if (p != null && p <= page) bestIdx = i;
        });
        btns.forEach(function(btn,i){ btn.classList.toggle("is-current", i===bestIdx); });
      }

      function _lbUpdatePos(page, total){
        _lbState.cur = page; if (total) _lbState.total = total;
        var pos = document.getElementById("lbPos");
        if (pos) pos.textContent = (_t('program.lb_page',"페이지")+" "+page+" / "+(_lbState.total||"—"));
        var prev = document.getElementById("lbPrev"), next = document.getElementById("lbNext");
        if (prev) prev.disabled = (page<=1);
        if (next) next.disabled = (_lbState.total && page>=_lbState.total);
        _lbHighlight(page);
      }

      // iframe → 부모 메시지 수신
      window.addEventListener("message", function(ev){
        var d = ev.data || {};
        if (d.t === "lb-ready"){ _lbState.ready=true; _lbState.total=d.total||0; _lbState.anchors=d.anchors||{}; _lbUpdatePos(1, d.total); }
        else if (d.t === "lb-pos"){ _lbUpdatePos(d.page, d.total); }
      });

      // 이전/다음 · 전체화면 · 하단 버튼
      (function(){
        var prev=document.getElementById("lbPrev"), next=document.getElementById("lbNext");
        if (prev) prev.addEventListener("click", function(){ _lbPost({t:"lb-go", page:Math.max(1,_lbState.cur-1)}); });
        if (next) next.addEventListener("click", function(){ _lbPost({t:"lb-go", page:_lbState.cur+1}); });
        var save=document.getElementById("lbSaveBook");
        if (save) save.addEventListener("click", function(){ openBookWindow("keepsake"); });
        var goReport=document.getElementById("lbGoReport");
        if (goReport) goReport.addEventListener("click", function(){
          // [P28] 실행 프로그램과 리포트는 같은 sid 를 공유(programs/{uid}/{sid} ↔ reports/{uid}/{sid}).
          //   현재 프로그램 페이지의 sid(currentSid)를 그대로 넘겨야 리포트가 열린다.
          //   sid 가 없으면 리포트가 "세션 ID 없음" 에러를 내므로, 대신 마이페이지로 보낸다.
          try{
            var _p = new URLSearchParams(location.search);
            var sid = (typeof currentSid !== "undefined" && currentSid) ? currentSid : (_p.get("sid") || "");
            var langQ = (_p.get("lang") === "en") ? "&lang=en" : "";
            if (sid){
              window.location.href = "/report?sid=" + encodeURIComponent(sid) + langQ;
            } else {
              window.location.href = "/mypage" + (langQ ? "?lang=en" : "");
            }
          }catch(_){ window.location.href = "/mypage"; }
        });

        // [P27] 전체화면(프레젠테이션) — 스테이지를 fullscreen 으로. 종료 시 라벨 복원.
        var full=document.getElementById("lbFull");
        var stage=document.getElementById("lbStage");
        function _fsActive(){ return document.fullscreenElement || document.webkitFullscreenElement; }
        if (full && stage){
          full.addEventListener("click", function(){
            try{
              if (_fsActive()){
                (document.exitFullscreen||document.webkitExitFullscreen).call(document);
              } else {
                (stage.requestFullscreen||stage.webkitRequestFullscreen).call(stage);
              }
            }catch(e){ console.warn("[LivingBook] fullscreen 실패:", e && e.message); }
          });
          var _onFsChange = function(){
            var on=!!_fsActive();
            var lbl=full.querySelector("span");
            if (lbl) lbl.textContent = on ? _t('program.lb_full_exit',"전체화면 종료") : _t('program.lb_full',"전체화면");
            // [전체화면 꽉채움] iframe 에 전체화면 상태 전달 → 내부 fit()이 세로 꽉 채움/전체 노출 전환.
            _lbPost({ t:"lb-fs", on: on });
            setTimeout(function(){ try{ _lbPost({ t:"lb-fs", on: on }); var f=_lbFrame(); if(f&&f.contentWindow) f.contentWindow.dispatchEvent(new Event("resize")); }catch(_){} }, 120);
            if (on){ setTimeout(function(){ try{ _lbFrame().focus(); }catch(_){} }, 150); }
          };
          document.addEventListener("fullscreenchange", _onFsChange);
          document.addEventListener("webkitfullscreenchange", _onFsChange);
        }

        // 부모에서도 방향키로 페이지 넘김(iframe 밖에 포커스가 있을 때)
        document.addEventListener("keydown", function(e){
          if (!document.body.classList.contains("living-book-on")) return;
          var tag=(e.target && e.target.tagName)||"";
          if (tag==="INPUT"||tag==="TEXTAREA") return;
          if (e.key==="ArrowRight"||e.key==="PageDown"){ _lbPost({t:"lb-go", page:_lbState.cur+1}); }
          else if (e.key==="ArrowLeft"||e.key==="PageUp"){ _lbPost({t:"lb-go", page:Math.max(1,_lbState.cur-1)}); }
        });
      })();

      // Living Book 마운트 — renderProgram 뒤에 호출. 대시보드를 대체 표시.
      function renderLivingBook(program){
        try{
          if (!program) return false;
          var wrap = document.getElementById("livingBook");
          var frame = document.getElementById("lbFrame");
          var loading = document.getElementById("lbLoading");
          if (!wrap || !frame) return false;

          // 이름 표시
          var meta = program.meta || {};
          var cover = program.cover || {};
          var nm = meta.name || cover.subtitle || _t('program.default_name',"고객");
          var nmEl = document.getElementById("lbName");
          if (nmEl) nmEl.innerHTML = _escLB(nm) + '<small>EXECUTION PROGRAM</small>';

          _lbBuildToc();

          // 책(A4 지면) 빌드 → iframe srcdoc. 웹 화면은 화면판(모던) 테마로.
          var data = buildProgramBookData(program);
          var html = buildBookHTML(data, { theme:"screen", embed:true });
          frame.addEventListener("load", function _once(){
            frame.removeEventListener("load", _once);
            if (loading) loading.style.display = "none";
            frame.style.display = "block";
            setTimeout(function(){ _lbPost({ t:"lb-ping" }); }, 200);
          });
          frame.srcdoc = html;

          // 셸 전환: 대시보드/스크롤스파이 은닉, Living Book 노출
          document.body.classList.add("living-book-on");
          wrap.hidden = false;
          return true;
        } catch(e){
          try{ console.error("[LivingBook] 마운트 실패, 대시보드 폴백:", e); }catch(_){}
          return false;
        }
      }
      function _escLB(s){ return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

      // 전역 노출 — 프로그램 로드/재렌더에서 renderProgram 직후 호출
      window.__renderLivingBook = renderLivingBook;
    })();

    /* ─────────────────────────── 인쇄 [P26·플랜A] ───────────────────────────
       화면판/소장판 두 판이 있으므로, 인쇄 시 어떤 판으로 인쇄할지 선택 다이얼로그 제공.
       - 화면판 인쇄: 벡터 화면판 새 창(__openProgramBook('screen')) — 이어짐 없는 고품질
       - 소장판 인쇄: reportBookBtn(소장판) 위임 (벡터 새 창 인쇄, 기능 무손상)
       구현 안전: 신규 노드만 생성, 기존 로직 미접촉. */
    function openProgramPrintDialog(){
      var prev = document.getElementById("printDialog");
      if (prev) prev.remove();

      var overlay = document.createElement("div");
      overlay.id = "printDialog";
      overlay.setAttribute("role","dialog");
      overlay.setAttribute("aria-modal","true");
      overlay.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;";

      var box = document.createElement("div");
      box.style.cssText = "background:#fff;border-radius:18px;max-width:460px;width:100%;padding:24px;box-shadow:0 24px 60px rgba(0,0,0,.25);font-family:inherit;color:var(--text);";
      box.innerHTML =
        '<h3 style="margin:0 0 8px;font-size:18px;font-weight:700;color:var(--brand)">' + _t('program.print_dialog_title', "🖨 어떤 판으로 인쇄할까요?") + '</h3>' +
        '<p style="margin:0 0 16px;font-size:14px;color:var(--muted);line-height:1.5">' + _t('program.print_dialog_desc', "같은 실행 프로그램을 두 가지 판으로 인쇄할 수 있어요. 원하는 판을 선택해 주세요.") + '</p>' +
        '<div id="printOpts" style="display:flex;flex-direction:column;gap:8px"></div>' +
        '<div style="margin-top:16px;display:flex;justify-content:flex-end;gap:8px">' +
          '<button type="button" id="printClose" style="padding:9px 14px;border-radius:10px;border:1px solid rgba(23,33,43,.12);background:#fff;cursor:pointer;font-size:13px;font-weight:600">' + _t('program.print_close', "닫기") + '</button>' +
        '</div>';
      overlay.appendChild(box);
      document.body.appendChild(overlay);

      function optBtn(label, sub, onClick){
        var b = document.createElement("button");
        b.type = "button";
        b.style.cssText = "text-align:left;padding:12px 14px;border-radius:12px;border:1px solid rgba(23,33,43,.12);background:#fff;cursor:pointer;font-size:14px;font-weight:600;color:var(--text);display:flex;flex-direction:column;gap:2px;transition:all .15s ease";
        b.onmouseenter = function(){ b.style.borderColor = "var(--brand)"; b.style.background = "#FAFAF7"; };
        b.onmouseleave = function(){ b.style.borderColor = "rgba(23,33,43,.12)"; b.style.background = "#fff"; };
        b.innerHTML = '<span>' + label + '</span>' + (sub ? '<span style="font-size:12px;font-weight:500;color:var(--muted)">' + sub + '</span>' : '');
        b.addEventListener("click", onClick);
        return b;
      }

      var opts = box.querySelector("#printOpts");
      opts.appendChild(optBtn(
        _t('program.print_screen', "📄 화면판으로 저장"),
        _t('program.print_screen_sub', "모던한 디자인의 고품질 PDF (페이지 깔끔하게 나뉨, 텍스트 선택 가능)"),
        function(){ close(); if (typeof window.__openProgramBook === "function") window.__openProgramBook("screen"); else setTimeout(function(){ window.print(); }, 120); }
      ));
      opts.appendChild(optBtn(
        _t('program.print_keepsake', "📖 소장판으로 인쇄"),
        _t('program.print_keepsake_sub', "책·포트폴리오급으로 편집된 고품질(텍스트 선택 가능)"),
        function(){
          close();
          var rb = document.getElementById("reportBookBtn");
          if (rb) rb.click();
          else window.print();
        }
      ));

      function close(){ overlay.remove(); document.removeEventListener("keydown", onKey); }
      box.querySelector("#printClose").addEventListener("click", close);
      overlay.addEventListener("click", function(e){ if (e.target === overlay) close(); });
      function onKey(e){ if (e.key === "Escape") close(); }
      document.addEventListener("keydown", onKey);
    }
    printBtn.addEventListener("click", openProgramPrintDialog);

    /* ─────────────────────────── 재생성 ─────────────────────────── */
    regenBtn.addEventListener("click", async () => {
      if (!confirm(_t('program.confirm_regen', "저장된 인생포트폴리오 리포트로 최신 엔진으로 실행 프로그램을 다시 생성합니다.\n현재 표시된 프로그램이 새 결과로 갱신됩니다. 계속할까요?"))) return;
      const user = auth.currentUser;
      if (!user){ alert(_t('program.alert_login_expired', "로그인이 만료되었습니다.")); return; }
      if (!currentSid){ alert(_t('program.alert_no_sid', "세션 ID가 없습니다.")); return; }

      regenBtn.disabled = true;
      const orig = regenBtn.textContent;
      regenBtn.textContent = _t('program.regen_busy', "⏳ 재생성 중...");
      setStatus("info", _t('program.regen_running', "최신 엔진으로 실행 프로그램을 재생성하고 있습니다..."));

      try {
        // PR#41: REST 폴백 적용
        const reportSnap = await _safeGet(`reports/${user.uid}/${currentSid}`, "regen-report");
        if (!reportSnap.exists()) throw new Error(_t('program.regen_no_report', "이 sid의 인생포트폴리오 리포트를 찾을 수 없습니다."));
        const stored = reportSnap.val() || {};
        const reportObj = stored.report || stored;
        // PR#34: 재생성은 항상 "리포트 생성 시점 언어"로 빌드한다.
        //  - 한국어 리포트의 재생성은 한국어 결과를 만들고,
        //  - 영어 리포트의 재생성은 영어 결과를 만든다.
        //  - 현재 UI 언어(_lang())로 무조건 빌드하던 기존 동작을 폐기 (KO에서 EN 결과가 생성되던 버그 차단).
        const _lockedLang = (stored.lang || (reportObj && reportObj.lang) || 'ko') === 'en' ? 'en' : 'ko';

        const v = Date.now();
        const rules = await fetch("data/program-rules.json?v=" + v, { cache: "no-store" }).then(r => r.json());
        // [PR-진로직합성 2026-06-15] 재생성 경로에서도 career-rules/engine 로드(응답 기반 직업).
        const _careerRules = await fetch("data/career-rules.json?v=" + v, { cache: "no-store" }).then(r => r.json()).catch(() => null);
        const _mapping = await fetch("data/mapping.json?v=" + v, { cache: "no-store" }).then(r => r.json()).catch(() => null);
        if (!window.CareerEngine){
          await new Promise((resolve) => {
            const s = document.createElement("script");
            s.src = "assets/js/career-engine.js?v=" + Date.now();
            s.onload = resolve; s.onerror = () => { console.warn("career-engine.js 로드 실패(비치명적)"); resolve(); };
            document.head.appendChild(s);
          });
        }
        // 재생성 경로에서도 EN 매핑 캐시를 갱신 (잠긴 언어 기준으로 갱신)
        cachedRules = rules;
        if (_lockedLang !== "ko"){
          try { RULES_KO2EN = buildRulesKo2En(rules); } catch(_){ RULES_KO2EN = RULES_KO2EN || {}; }
        }
        if (!window.ProgramEngine){
          await new Promise((resolve, reject) => {
            const s = document.createElement("script");
            s.src = "assets/js/program-engine.js?v=" + Date.now();
            s.onload = resolve; s.onerror = () => reject(new Error(_t('program.regen_engine_load_fail', "program-engine.js 로드 실패")));
            document.head.appendChild(s);
          });
        }
        if (!window.ProgramEngine) throw new Error(_t('program.regen_engine_unavailable', "ProgramEngine 사용 불가"));

        const name = (reportObj.profile && reportObj.profile.name) || stored.name || (user.displayName || _t('program.default_name', "고객"));
        const program = window.ProgramEngine.build({
          report: reportObj, rules: rules,
          careerRules: _careerRules, mapping: _mapping,   // [PR-진로직합성] 응답 기반 직업 매칭
          name: name, sourceSid: currentSid, publishedAt: new Date(),
          lang: _lockedLang
        });

        // RTDB 갱신 — 새 보안 규칙(불변 필드 + editCount 단조증가) 호환
        //   - 기존 노드 존재 시: update()로 가변 필드만 갱신, editCount 증가
        //   - 신규 노드 시: set()로 최초 생성, editCount=0
        // PR#41: REST 폴백 적용
        // PR#48: editCount 한도 3→5 완화 (program도 report와 동일하게 통일)
        // PR#59-C: 한도 5→999 일시 완화 — PR#59-B 배포 후 회원 맞춤형 프로그램 재생성 검증 기간 동안
        //          캐시된 옛 엔진 결과를 새 엔진(진단 응답 직접 결합 v1.1) 결과로 덮어쓰기 허용
        //          (검증 완료 후 5로 환원 예정 — report.html PR#53 패턴과 동일)
        // PR#61: 재생성 한도 체크 자체를 우회 — PR#60/PR#61 배포 후 회원 검증 기간 동안 무제한 허용
        //        (보안 규칙은 999까지 허용; 한도 환원 시 __REGEN_BYPASS__ 를 false 로 되돌리면 됨)
        const __REGEN_LIMIT__ = 999; // PR#59-C: 한도 일시 완화 (검증 완료 후 5로 환원 예정)
        const __REGEN_BYPASS__ = true; // PR#61: 한도 체크 우회 (검증 완료 후 false 로 환원 예정)
        const existingProgSnap = await _safeGet(`programs/${user.uid}/${currentSid}`, "regen-existing-prog");
        if (existingProgSnap.exists()) {
          const prev = existingProgSnap.val() || {};
          const prevEditCount = typeof prev.editCount === "number" ? prev.editCount : 0;
          if (!__REGEN_BYPASS__ && prevEditCount >= __REGEN_LIMIT__) {
            throw new Error(_t('program.regen_limit_reached', "재생성 횟수가 한도에 도달했습니다. 더 이상 재생성할 수 없습니다."));
          }
          // PR#61: 보안 규칙(<=999) 안전 범위 내에서 단조증가 유지하되, 표시상 무제한처럼 동작
          const __nextEditCount = Math.min(prevEditCount + 1, 999);
          // 가변 필드만 update — sid/sourceSid/generatedAt/engineVersion/rulesVersion 은 불변이므로 보내지 않음
          // PR#34: lang은 기존 값 유지 (재생성이라도 생성 시점 언어로 잠금)
          // PR#71-D: _safeWrite 적용 — 모바일 set/update 무한 대기 결함 처치
          await _safeWrite("update", `programs/${user.uid}/${currentSid}`, {
            toneKey: program.meta.toneKey,
            name: program.meta.name,
            lang: _lockedLang,
            program: program,
            manualOverrideHtml: null,
            manualProgramStatus: "auto",
            editCount: __nextEditCount,
            lastEditedAt: { ".sv": "timestamp" }
          }, "regen-update-prog");
        } else {
          // 신규 생성 — 모든 필드 set
          // PR#71-D: _safeWrite 적용
          await _safeWrite("set", `programs/${user.uid}/${currentSid}`, {
            sid: currentSid,
            sourceSid: currentSid,
            generatedAt: { ".sv": "timestamp" },
            engineVersion: window.ProgramEngine.version || "v1.0",
            rulesVersion: rules.version || "v1.0",
            toneKey: program.meta.toneKey,
            name: program.meta.name,
            lang: _lockedLang,
            program: program,
            manualOverrideHtml: null,
            manualProgramStatus: "auto",
            editCount: 0,
            lastEditedAt: { ".sv": "timestamp" }
          }, "regen-set-prog");
        }
        // users/{uid}/programs/{sid} 인덱스 — sid/sourceSid/generatedAt 도 불변이므로 신규일 때만 set
        // PR#34: 인덱스에도 lang 보존
        // PR#41: REST 폴백 적용 / PR#71-D: write 폴백 추가
        const idxProgSnap = await _safeGet(`users/${user.uid}/programs/${currentSid}`, "regen-idx-prog");
        if (idxProgSnap.exists()) {
          await _safeWrite("update", `users/${user.uid}/programs/${currentSid}`, {
            toneKey: program.meta.toneKey,
            name: program.meta.name,
            lang: _lockedLang
          }, "regen-update-idx");
        } else {
          await _safeWrite("set", `users/${user.uid}/programs/${currentSid}`, {
            sid: currentSid,
            sourceSid: currentSid,
            generatedAt: { ".sv": "timestamp" },
            toneKey: program.meta.toneKey,
            name: program.meta.name,
            lang: _lockedLang
          }, "regen-set-idx");
        }

        currentProgram = program;
        // [PR#194] 고유성(Only One) 가드 자가 점검 — 화면 영향 없음, 운영 모니터링용 로그
        try {
          const _ug = program && program.meta && program.meta._uniqGuard;
          if (_ug) {
            if (_ug.variantApplied === false) {
              console.warn("[고유성가드] fingerprint 미가용(구버전 캐시 추정) — 변주 미적용. 진단 재제출 또는 리포트 재생성 권장.", _ug);
            } else {
              console.info("[고유성가드] tone=" + program.meta.toneKey + " uniqSig=" + _ug.uniqSig + " variantApplied=true (고유성 활성)", _ug);
            }
          }
        } catch(_ignore){}
        currentPdfFilename = _t('program.pdf_filename_template', "{name}님_맞춤_실행_프로그램.pdf").replace('{name}', name);
        renderProgram(program);
        // [P27 · Living Book] 재생성 후에도 웹 화면 '한 권' 갱신.
        try { if (typeof window.__renderLivingBook === "function") window.__renderLivingBook(program); } catch(_lbErr){ console.warn("[LivingBook] regen skip:", _lbErr && _lbErr.message); }
        setStatus("success", _t('program.ok_regen', "✅ 최신 엔진으로 실행 프로그램이 재생성되었습니다."));
        setTimeout(() => { statusBox.style.opacity = "0.0"; statusBox.style.transition = "opacity .6s"; }, 6000);
      } catch(e){
        console.error("[Program] 재생성 실패:", e);
        var __failPrefix = _t('program.regen_failed_prefix', "재생성 실패:");
        setStatus("error", __failPrefix + " " + (e && e.message || ""));
        alert(__failPrefix + " " + (e && e.message || ""));
      } finally {
        regenBtn.disabled = false;
        regenBtn.textContent = orig;
      }
    });

    /* ─── [P1.5-6단계] 공유 링크 복사 (재방문 딥링크) ───
       program 도 본인 로그인 가드로 보호됨 → sid 포함 본인 재방문 딥링크. (백엔드·인증 무손상) */
    (function(){
      var shareBtn = document.getElementById("shareLinkBtn");
      if (!shareBtn) return;
      function _buildShareUrl(){
        var _sid = (typeof currentSid !== "undefined" && currentSid) ? currentSid : (params.get("sid") || "");
        var origin = location.origin || "";
        var lang = (params.get("lang") === "en") ? "&lang=en" : "";
        return origin + "/program?sid=" + encodeURIComponent(_sid) + lang;
      }
      async function _copyText(text){
        try { if (navigator.clipboard && navigator.clipboard.writeText) { await navigator.clipboard.writeText(text); return true; } } catch(_){}
        try {
          var ta = document.createElement("textarea");
          ta.value = text; ta.setAttribute("readonly",""); ta.style.position="fixed"; ta.style.left="-9999px";
          document.body.appendChild(ta); ta.select();
          var ok = document.execCommand("copy"); document.body.removeChild(ta); return ok;
        } catch(_){ return false; }
      }
      shareBtn.addEventListener("click", async () => {
        var url = _buildShareUrl();
        var title = _t('program.share_title', "인생포트폴리오 맞춤 실행 프로그램");
        var shareText = _t('program.share_text', "내 맞춤 실행 프로그램 링크입니다. (열람 시 본인 로그인이 필요합니다)");
        if (navigator.share) {
          try { await navigator.share({ title: title, text: shareText, url: url }); return; } catch(_){}
        }
        var origText = shareBtn.textContent;
        var ok = await _copyText(url);
        shareBtn.textContent = ok ? _t('program.share_copied', "✅ 링크 복사됨") : _t('program.share_copy_fail', "❌ 복사 실패");
        if (!ok) { try { prompt(_t('program.share_manual', "아래 링크를 복사하세요:"), url); } catch(_){} }
        setTimeout(function(){ shareBtn.textContent = origText; }, 2000);
      });
    })();

    /* ─────────────────────────── 이메일 (클립보드 + Gmail/Outlook 모달) ─────────────────────────── */
    emailBtn.addEventListener("click", () => {
      const name = (currentProgram && currentProgram.meta && currentProgram.meta.name) || "";
      const publishedAt = (currentProgram && currentProgram.meta && currentProgram.meta.publishedAt) || "";
      const ownerSuffix = _t('program.email_subject_suffix_owner', "님의 ");
      const programLabel = _t('program.email_subject_program', "맞춤 실행 프로그램");
      const subj = (name ? name + ownerSuffix : "") + programLabel + (publishedAt ? " (" + publishedAt + ")" : "");
      const body =
        _t('program.email_body', "안녕하세요. 인생포트폴리오 맞춤 실행 프로그램을 공유드립니다.\n\n▶ 본 메시지에 PDF 파일을 첨부해 보내주세요.\n  (먼저 [PDF 다운로드] 버튼으로 PDF를 받은 뒤, 메일에 첨부)\n\n▶ 프로그램 페이지: ") +
        location.href +
        _t('program.email_body_outro', "\n\n감사합니다.");

      const prev = document.getElementById("emailDialog");
      if (prev) prev.remove();

      const overlay = document.createElement("div");
      overlay.id = "emailDialog";
      overlay.style.cssText = "position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:9999;display:flex;align-items:center;justify-content:center;padding:18px;";

      const card = document.createElement("div");
      card.style.cssText = "background:#fff;border-radius:18px;padding:22px 22px 18px;max-width:480px;width:100%;box-shadow:0 24px 60px rgba(0,0,0,.25);font-family:inherit;";
      card.innerHTML =
        '<h2 style="margin:0 0 8px;font-size:18px;color:#4A6984;font-weight:900;">' + escapeHtml(_t('program.email_dialog_title', "📧 이메일로 보내기")) + '</h2>' +
        '<p style="margin:0 0 12px;font-size:13px;color:#475569;font-weight:700;line-height:1.6;">' +
        _t('program.email_dialog_intro_html', '제목 / 본문을 <strong>클립보드에 복사</strong>한 뒤, 원하는 메일 서비스로 이동해 붙여넣기만 하면 됩니다.<br><small style="color:#7c2d12;">PDF는 [PDF 다운로드] 버튼으로 먼저 받아 첨부해 주세요.</small>') +
        '</p>' +
        '<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:10px 12px;font-size:12.5px;color:#0f172a;font-weight:700;line-height:1.6;margin-bottom:10px;">' +
        '  <div><strong>' + escapeHtml(_t('program.email_label_subject', "제목:")) + '</strong> <span id="emSubj"></span></div>' +
        '  <div style="margin-top:6px;"><strong>' + escapeHtml(_t('program.email_label_to', "받는사람:")) + '</strong> <span id="emTo"></span></div>' +
        '</div>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
        '  <button id="emCopy"    type="button" style="flex:1;min-width:130px;padding:10px;border:none;border-radius:10px;background:#4A6984;color:#fff;font-weight:900;cursor:pointer;">' + escapeHtml(_t('program.email_copy_btn', "📋 제목+본문 복사")) + '</button>' +
        '  <a id="emGmail"   target="_blank" rel="noopener" style="flex:1;min-width:130px;padding:10px;border-radius:10px;background:#dc2626;color:#fff;font-weight:900;text-align:center;text-decoration:none;">' + escapeHtml(_t('program.email_btn_gmail', "Gmail 열기")) + '</a>' +
        '  <a id="emOutlook" target="_blank" rel="noopener" style="flex:1;min-width:130px;padding:10px;border-radius:10px;background:#0078d4;color:#fff;font-weight:900;text-align:center;text-decoration:none;">' + escapeHtml(_t('program.email_btn_outlook', "Outlook 열기")) + '</a>' +
        '</div>' +
        '<div style="margin-top:10px;text-align:right;">' +
        '  <button id="emClose" type="button" style="padding:8px 14px;border:1px solid #cbd5e1;background:#fff;border-radius:10px;font-weight:800;cursor:pointer;">' + escapeHtml(_t('program.email_close', "닫기")) + '</button>' +
        '</div>';

      overlay.appendChild(card);
      document.body.appendChild(overlay);

      const to = currentEmailTo || "";
      card.querySelector("#emSubj").textContent = subj;
      card.querySelector("#emTo").textContent   = to || _t('program.email_to_default', "(직접 입력)");
      card.querySelector("#emGmail").href   = "https://mail.google.com/mail/?view=cm&fs=1&to=" + encodeURIComponent(to) + "&su=" + encodeURIComponent(subj) + "&body=" + encodeURIComponent(body);
      card.querySelector("#emOutlook").href = "https://outlook.live.com/mail/0/deeplink/compose?to=" + encodeURIComponent(to) + "&subject=" + encodeURIComponent(subj) + "&body=" + encodeURIComponent(body);

      card.querySelector("#emCopy").addEventListener("click", async () => {
        const text = _t('program.email_copy_text_prefix', "제목:") + " " + subj + "\n\n" + body;
        try {
          await navigator.clipboard.writeText(text);
          card.querySelector("#emCopy").textContent = _t('program.email_copy_done', "✅ 복사 완료!");
        } catch(e){
          alert(_t('program.email_copy_fail_alert', "자동 복사에 실패했습니다. 직접 선택해 복사해 주세요.\n\n") + text);
        }
      });
      card.querySelector("#emClose").addEventListener("click", () => overlay.remove());
      overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });
    });

    // i18n runtime + 언어 변경 시 동적 콘텐츠 재렌더링
    (function(){
      var s = document.createElement('script');
      s.src = 'assets/i18n/i18n.js';
      s.onload = function(){
        if (window.LP_I18N && typeof window.LP_I18N.onReady === "function"){
          window.LP_I18N.onReady(function(){
            if (currentProgram) {
              try {
                renderProgram(currentProgram);
                // [P27 · Living Book] 언어 전환 재렌더 후에도 웹 화면 '한 권' 갱신.
                try { if (typeof window.__renderLivingBook === "function") window.__renderLivingBook(currentProgram); } catch(_lbErr){ console.warn("[LivingBook] i18n skip:", _lbErr && _lbErr.message); }
                const name = (currentProgram.meta && currentProgram.meta.name) || _t('program.default_name', "고객");
                currentPdfFilename = _t('program.pdf_filename_template', "{name}님_맞춤_실행_프로그램.pdf").replace('{name}', name);
              } catch(e){ console.warn('[program] re-render after i18n ready failed:', e); }
            }
          });
        }
        // PR#37: KO/EN 토글이 제거되었으므로 토글 클릭 핸들러도 함께 제거.
        //         프로그램은 짝 리포트의 언어로 영구 잠김.
      };
      document.head.appendChild(s);
    })();
  </script>

  <!-- P1 자비스급 UX: 방문자 컨텍스트 + 컨텍스트/재방문 인사 + 안내 위젯 (비파괴, 신규 파일) -->
  <script src="/assets/js/visitor-context.js" defer></script>
  <script src="/assets/js/ambient-context.js" defer></script>
  <script src="/assets/js/axis-keywords.js" defer></script>
  <script src="/assets/js/curation.js" defer></script>
