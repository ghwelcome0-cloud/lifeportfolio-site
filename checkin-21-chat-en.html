<!doctype html>
<html lang="en" translate="no" data-i18n-page="checkin21Chat">
<head>
  <meta name="google" content="notranslate">
  <meta name="robots" content="noindex,nofollow">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Life Portfolio Pre-Diagnosis | Before 1:1 Coaching</title>
  <link rel="canonical" href="https://lifeportfolio.co.kr/checkin-21-chat-en.html">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --brand:#0F2A44; --brand-2:#1a3a4a;
      --gold:#C8A24A; --gold-soft:#F5E9C8;
      --ink:#0F172A; --ink-2:#334155;
      --muted:#64748B; --line:#E2E8F0;
      --bg:#F8FAFC; --success:#059669; --danger:#DC2626;
      --bubble-bot:#FFFFFF; --bubble-user:#0F2A44;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{
      font-family:'Inter',-apple-system,system-ui,sans-serif;
      color:var(--ink); background:var(--bg); line-height:1.65;
      -webkit-font-smoothing:antialiased; word-break:keep-all;
      min-height:100vh; display:flex; flex-direction:column;
    }
    .container{max-width:760px;margin:0 auto;padding:0 20px;width:100%}

    .topbar{position:sticky;top:0;background:rgba(255,255,255,.96);backdrop-filter:saturate(180%) blur(8px);border-bottom:1px solid var(--line);z-index:100}
    .topbar-inner{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;max-width:760px;margin:0 auto}
    .brand{display:flex;align-items:center;text-decoration:none;color:inherit}
    .brand strong{font-size:17px;font-weight:800;color:var(--brand)}
    .brand span{display:block;font-size:11px;color:var(--muted);margin-top:2px}
    .lang-toggle{font-size:12px;color:var(--muted);text-decoration:none;padding:6px 10px;border:1px solid var(--line);border-radius:6px}
    .lang-toggle:hover{background:#fff}

    .session-bar{background:#fff;border-bottom:1px solid var(--line);padding:12px 20px;font-size:12.5px;color:var(--muted)}
    .session-bar .row{max-width:760px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
    .session-bar b{color:var(--brand);font-weight:700}
    .session-bar .pill{display:inline-block;background:var(--gold-soft);color:#5B4814;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:.04em}

    /* PR #91 r3 — input area height managed by CSS var, updated via ResizeObserver. */
    :root{--input-area-h:120px}
    .chat-area{flex:1;padding:24px 0 calc(var(--input-area-h) + 40px);overflow-y:auto}
    .messages{display:flex;flex-direction:column;gap:14px}
    /* PR #91 r3 — scroll-margin so new bubbles aren't hidden behind sticky topbar or input area. */
    .bubble{max-width:82%;padding:13px 16px;border-radius:14px;font-size:15px;line-height:1.7;animation:fadeIn .25s ease-out;white-space:pre-wrap;word-break:keep-all;scroll-margin-top:80px;scroll-margin-bottom:calc(var(--input-area-h) + 24px)}
    @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
    .bubble.bot{background:var(--bubble-bot);border:1px solid var(--line);align-self:flex-start;color:var(--ink);box-shadow:0 1px 2px rgba(15,42,68,.04)}
    .bubble.user{background:var(--bubble-user);color:#fff;align-self:flex-end;border-top-right-radius:4px}
    .bubble .name{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.04em;margin-bottom:4px;text-transform:uppercase}
    .bubble.user .name{display:none}
    .bubble.system{align-self:center;background:transparent;color:var(--muted);font-size:12.5px;border:none;padding:6px 12px}
    .typing{display:inline-flex;align-items:center;gap:4px;color:var(--muted);font-size:13px}
    .typing .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--muted);animation:typing 1.2s infinite}
    .typing .dot:nth-child(2){animation-delay:.2s}
    .typing .dot:nth-child(3){animation-delay:.4s}
    @keyframes typing{0%,60%,100%{opacity:.3}30%{opacity:1}}

    .input-area{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);padding:14px 20px;box-shadow:0 -2px 8px rgba(15,42,68,.04)}
    .input-area-inner{max-width:760px;margin:0 auto}
    .options{display:flex;flex-direction:column;gap:8px}
    .option-btn{
      display:block;width:100%;text-align:left;
      padding:13px 16px;background:#fff;color:var(--ink-2);
      border:1.5px solid var(--line);border-radius:10px;
      font-size:14.5px;font-weight:500;cursor:pointer;transition:all .12s;
      font-family:inherit;line-height:1.5
    }
    .option-btn:hover:not(:disabled){background:var(--bg);border-color:var(--brand);color:var(--brand)}
    .option-btn:disabled{opacity:.5;cursor:not-allowed}
    .next-btn{
      display:block;width:100%;padding:14px 20px;background:var(--brand);color:#fff;border:none;border-radius:10px;
      font-size:15.5px;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:all .15s;
      box-shadow:0 4px 12px rgba(15,42,68,.18);font-family:inherit
    }
    .next-btn:hover:not(:disabled){background:var(--brand-2);transform:translateY(-1px)}
    .next-btn:disabled{background:var(--muted);cursor:not-allowed;opacity:.6;transform:none;box-shadow:none}
    .end-actions{display:flex;flex-direction:column;gap:10px}
    .escalate-btn{
      display:block;width:100%;padding:14px 20px;background:var(--gold);color:#3D2E0F;border:none;border-radius:10px;
      font-size:15.5px;font-weight:700;cursor:pointer;letter-spacing:.02em;transition:all .15s;font-family:inherit
    }
    .escalate-btn:hover:not(:disabled){background:#D4B05E}
    .escalate-btn:disabled{opacity:.5;cursor:not-allowed}
    .escalate-form{display:none;flex-direction:column;gap:10px;margin-top:10px}
    .escalate-form.show{display:flex}
    .escalate-textarea{
      width:100%;min-height:80px;padding:12px 14px;border:1px solid var(--line);border-radius:8px;
      font-family:inherit;font-size:14px;color:var(--ink);resize:vertical;line-height:1.6;background:#fff
    }
    .escalate-textarea:focus{outline:2px solid var(--brand);outline-offset:-1px}
    .escalate-submit{
      padding:12px 20px;background:var(--brand);color:#fff;border:none;border-radius:10px;
      font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit
    }
    .escalate-submit:disabled{background:var(--muted);cursor:not-allowed;opacity:.6}
    .close-btn{
      display:block;width:100%;padding:12px;background:transparent;color:var(--muted);border:1px solid var(--line);border-radius:8px;
      font-size:13.5px;font-weight:500;cursor:pointer;font-family:inherit
    }
    .close-btn:hover{background:var(--bg);color:var(--ink-2)}

    /* PR #91 r2 — booking slot cards */
    .slot-section{margin-top:14px;display:none}
    .slot-section.show{display:block}
    .slot-title{font-size:13.5px;font-weight:700;color:var(--brand);margin-bottom:4px;letter-spacing:.01em}
    .slot-subtitle{font-size:12.5px;color:var(--muted);margin-bottom:10px;line-height:1.6}
    .slot-loading{padding:14px;text-align:center;color:var(--muted);font-size:13.5px}
    .slot-empty{padding:14px 16px;background:#fffbf0;border-left:3px solid var(--gold);color:#5B4814;font-size:13.5px;line-height:1.7;border-radius:0 8px 8px 0}
    .slot-list{display:flex;flex-direction:column;gap:8px;max-height:260px;overflow-y:auto;padding:2px}
    .slot-card{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:11px 14px;background:#fff;border:1.5px solid var(--line);border-radius:8px;
      cursor:pointer;transition:all .12s;font-family:inherit;text-align:left;
    }
    .slot-card:hover:not(:disabled){border-color:var(--brand);background:var(--bg)}
    .slot-card.selected{border-color:var(--gold);background:#fffbf0;box-shadow:0 0 0 2px rgba(200,162,74,.18)}
    .slot-card .slot-when{font-size:14.5px;font-weight:600;color:var(--ink)}
    .slot-card .slot-meta{font-size:11.5px;color:var(--muted);margin-top:2px}
    .slot-card .slot-check{font-size:14px;color:var(--gold);font-weight:700;opacity:0}
    .slot-card.selected .slot-check{opacity:1}
    .slot-card:disabled{opacity:.5;cursor:not-allowed}

    .link-error{display:none;background:#FEF2F2;border:1px solid #FECACA;color:var(--danger);padding:24px;border-radius:12px;margin:40px auto;max-width:560px;text-align:center;font-size:14.5px;line-height:1.7}
    .link-error.show{display:block}
    .link-error b{display:block;margin-bottom:6px;font-size:16px}
    .link-error a{color:var(--brand);text-decoration:underline}

    .status-msg{margin-top:10px;font-size:13px;line-height:1.6;padding:10px 14px;border-radius:8px;display:none}
    .status-msg.show{display:block}
    .status-msg.error{background:#FEF2F2;color:var(--danger);border:1px solid #FECACA}
    .status-msg.info{background:#EFF6FF;color:#1E40AF;border:1px solid #BFDBFE}
    .status-msg.success{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0}

    @media (max-width:600px){
      .bubble{max-width:90%;font-size:14.5px}
      .input-area{padding:12px 16px}
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a class="brand" href="/index-en.html">
      <div>
        <strong>Life Portfolio</strong>
        <span>Pre-Diagnosis (before 1:1 coaching)</span>
      </div>
    </a>
    <a class="lang-toggle" href="#" id="langToggle">KO</a>
  </div>
</header>

<div class="session-bar">
  <div class="row">
    <div>
      <span class="pill">BETA</span>
      <span id="sessionLabel" style="margin-left:8px"></span>
    </div>
    <div id="emailLabel"></div>
  </div>
</div>

<main class="container chat-area" id="chatArea">

  <!-- Link error -->
  <div class="link-error" id="linkError">
    <b>Chat link is invalid.</b>
    Please access this page only via the link sent after your response submission.
    <br><br>
    <a href="/checkin-21-form-en.html">Go to self-check form →</a>
  </div>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

</main>

<!-- Input area (sticky bottom) -->
<div class="input-area" id="inputArea" style="display:none">
  <div class="input-area-inner" id="inputInner">
    <!-- filled dynamically -->
  </div>
  <div class="status-msg" id="statusMsg"></div>
</div>

<!-- Firebase + Chat Logic -->
<script type="module">
  import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFunctions, httpsCallable } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAQOOXcjF8hwfJ7K2yyYf3CCKZGHfTo7y4",
    authDomain: "lifeportfolio.co.kr",
    projectId: "lifeporfolio",
    storageBucket: "lifeporfolio.appspot.com",
    messagingSenderId: "1097878862803",
    appId: "1:1097878862803:web:1c5cd2c4f7da6f8a7e1d4f"
  };
  const app = getApps()[0] || initializeApp(firebaseConfig);
  const functions = getFunctions(app, "asia-northeast3");
  const submitChatTurn = httpsCallable(functions, "submitChatTurn");
  const requestEscalation = httpsCallable(functions, "requestEscalation");
  // PR #91 r2 — coach availability slots
  const getCoachAvailability = httpsCallable(functions, "getCoachAvailability");

  const params = new URLSearchParams(location.search);
  const emailParam = (params.get("email") || "").trim().toLowerCase();
  const pdParam = (params.get("pd") || "").trim();
  const sigParam = (params.get("sig") || "").trim();

  const isValidEmail = (s) => /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(s);
  const isValidDate = (s) => /^\d{4}-\d{2}-\d{2}$/.test(s);
  const isValidSig = (s) => /^[a-f0-9]{16}$/.test(s);

  const linkErrorEl = document.getElementById("linkError");
  const messagesEl = document.getElementById("messages");
  const inputAreaEl = document.getElementById("inputArea");
  const inputInnerEl = document.getElementById("inputInner");
  const statusEl = document.getElementById("statusMsg");
  const sessionLabelEl = document.getElementById("sessionLabel");
  const emailLabelEl = document.getElementById("emailLabel");
  const langToggleEl = document.getElementById("langToggle");

  langToggleEl.href = `/checkin-21-chat.html?${params.toString()}`;

  if (!isValidEmail(emailParam) || !isValidDate(pdParam) || !isValidSig(sigParam)) {
    linkErrorEl.classList.add("show");
    throw new Error("Invalid chat link parameters");
  }

  function genSessionId(){
    const bytes = new Uint8Array(16);
    crypto.getRandomValues(bytes);
    return Array.from(bytes, (b) => b.toString(16).padStart(2, "0")).join("");
  }
  const sessionId = genSessionId();
  sessionLabelEl.innerHTML = `Session <b>${sessionId.slice(0, 8)}***</b>`;
  emailLabelEl.textContent = emailParam;

  let userAnswers = {};
  try {
    const stored = sessionStorage.getItem(`checkin21_answers_${pdParam}`);
    if (stored) userAnswers = JSON.parse(stored) || {};
  } catch (_) { /* no-op */ }

  let script = null;
  let nodeMap = null;
  try {
    const resp = await fetch("/assets/checkin/chat-script-en.json", { cache: "no-cache" });
    if (!resp.ok) throw new Error("script fetch failed: " + resp.status);
    script = await resp.json();
    nodeMap = new Map(script.nodes.map((n) => [n.id, n]));
  } catch (err) {
    console.error("[chat] script load failed", err);
    linkErrorEl.classList.add("show");
    linkErrorEl.querySelector("b").textContent = "Could not load chat script.";
    throw err;
  }

  function renderText(template) {
    if (typeof template !== "string") return "";
    return template.replace(/\{\{(q\d+)\}\}/g, (_, qid) => {
      const v = userAnswers[qid];
      if (v == null) return "";
      return String(v);
    });
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, (c) => ({
      "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
    }[c]));
  }

  // PR #91 r3 — fix bug where new bot bubble was hidden behind the fixed input area.
  //   Use scrollIntoView(block:"start") so the bubble *top* becomes visible (question first),
  //   and keep input-area height in sync via ResizeObserver.
  function addBotBubble(text) {
    const div = document.createElement("div");
    div.className = "bubble bot";
    div.innerHTML = `<div class="name">Pre-Diagnosis</div>${escapeHtml(text).replace(/\n/g, "<br>")}`;
    messagesEl.appendChild(div);
    scrollBubbleIntoView(div);
  }
  function addUserBubble(text) {
    const div = document.createElement("div");
    div.className = "bubble user";
    div.textContent = text;
    messagesEl.appendChild(div);
    scrollBubbleIntoView(div);
  }
  function addSystemBubble(text) {
    const div = document.createElement("div");
    div.className = "bubble system";
    div.textContent = text;
    messagesEl.appendChild(div);
    scrollBubbleIntoView(div);
  }
  function showTyping() {
    const div = document.createElement("div");
    div.className = "bubble bot";
    div.id = "typingBubble";
    div.innerHTML = `<div class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    messagesEl.appendChild(div);
    scrollBubbleIntoView(div);
  }
  function hideTyping() {
    const el = document.getElementById("typingBubble");
    if (el) el.remove();
  }
  // PR #91 r3 — core scroll fix: ensure the new bubble's *top* is visible.
  function scrollBubbleIntoView(el) {
    requestAnimationFrame(() => {
      try {
        el.scrollIntoView({ behavior: "smooth", block: "start", inline: "nearest" });
      } catch (_) {
        window.scrollTo({ top: el.offsetTop - 80, behavior: "smooth" });
      }
    });
  }
  function scrollToBottom() {
    requestAnimationFrame(() => window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" }));
  }
  (function setupInputAreaSizing() {
    const update = () => {
      const h = inputAreaEl && inputAreaEl.offsetHeight ? inputAreaEl.offsetHeight : 120;
      document.documentElement.style.setProperty("--input-area-h", h + "px");
    };
    update();
    if (typeof ResizeObserver !== "undefined") {
      try { new ResizeObserver(update).observe(inputAreaEl); } catch (_) {}
    }
    window.addEventListener("resize", update);
    window.__updateInputAreaH = update;
  })();
  function showStatus(type, msg) {
    statusEl.className = "status-msg show " + type;
    statusEl.textContent = msg;
  }
  function clearStatus() {
    statusEl.className = "status-msg";
    statusEl.textContent = "";
  }
  function setInput(html) {
    inputInnerEl.innerHTML = html;
    inputAreaEl.style.display = "block";
    if (window.__updateInputAreaH) window.__updateInputAreaH();
  }
  function hideInput() {
    inputAreaEl.style.display = "none";
    inputInnerEl.innerHTML = "";
    if (window.__updateInputAreaH) window.__updateInputAreaH();
  }

  let currentNodeId = script.entry;
  let turnIndex = 0;
  let isProcessing = false;
  let isEnded = false;

  async function sendTurn(nodeId, userInput) {
    const payload = {
      email: emailParam,
      pd: pdParam,
      sig: sigParam,
      lang: "en",
      sessionId,
      nodeId,
      turnIndex,
      userInput: userInput == null ? null : String(userInput),
      answers: userAnswers,
    };
    const result = await submitChatTurn(payload);
    return result.data;
  }

  async function renderNode(nodeId) {
    const node = nodeMap.get(nodeId);
    if (!node) {
      console.error("[chat] unknown node:", nodeId);
      showStatus("error", "Script error: node not found.");
      return;
    }

    // PR #91 r2 — feedback #2 fix: clear input area at the start of each new node
    //   so previous-node buttons don't remain visible during the typing animation
    //   of the next node. The new buttons/input appear only after typing completes.
    if (node.kind !== "branch") {
      inputInnerEl.innerHTML = "";
      inputAreaEl.style.display = "none";
    }

    if (node.kind === "say") {
      // PR #91: human breathing pace — slower typing animation matches reading speed.
      const text = renderText(node.text);
      showTyping();
      await new Promise((r) => setTimeout(r, 800 + Math.min(text.length * 14, 1800)));
      hideTyping();
      addBotBubble(text);

      setInput(`<button class="next-btn" id="nextBtn">Continue ▸</button>`);
      document.getElementById("nextBtn").addEventListener("click", async () => {
        if (isProcessing) return;
        isProcessing = true;
        clearStatus();
        document.getElementById("nextBtn").disabled = true;
        try {
          const res = await sendTurn(node.id, null);
          turnIndex++;
          if (res.isEnd || !res.nextNodeId) {
            await renderEndState(node.id);
          } else {
            currentNodeId = res.nextNodeId;
            await renderNode(currentNodeId);
          }
        } catch (err) {
          console.error("[chat] sendTurn failed", err);
          showStatus("error", (err && err.message) || "Send failed. Please try again.");
          document.getElementById("nextBtn").disabled = false;
        } finally {
          isProcessing = false;
        }
      });
    } else if (node.kind === "choose") {
      const text = renderText(node.text);
      showTyping();
      await new Promise((r) => setTimeout(r, 800 + Math.min(text.length * 14, 1800)));
      hideTyping();
      addBotBubble(text);

      const opts = (node.options || []).map((o) =>
        `<button class="option-btn" data-id="${escapeHtml(o.id)}" data-text="${escapeHtml(o.text)}">${escapeHtml(o.text)}</button>`
      ).join("");
      setInput(`<div class="options">${opts}</div>`);

      inputInnerEl.querySelectorAll(".option-btn").forEach((btn) => {
        btn.addEventListener("click", async () => {
          if (isProcessing) return;
          isProcessing = true;
          clearStatus();
          inputInnerEl.querySelectorAll(".option-btn").forEach((b) => (b.disabled = true));
          const optId = btn.getAttribute("data-id");
          const optText = btn.getAttribute("data-text");
          addUserBubble(optText);
          try {
            const res = await sendTurn(node.id, optId);
            turnIndex++;
            if (res.isEnd || !res.nextNodeId) {
              await renderEndState(node.id);
            } else {
              currentNodeId = res.nextNodeId;
              await renderNode(currentNodeId);
            }
          } catch (err) {
            console.error("[chat] sendTurn(choose) failed", err);
            showStatus("error", (err && err.message) || "Send failed. Please try again.");
            inputInnerEl.querySelectorAll(".option-btn").forEach((b) => (b.disabled = false));
          } finally {
            isProcessing = false;
          }
        });
      });
    } else if (node.kind === "free") {
      // PR #91 — free text input (4 axes × 1 each), feeds the coach pre-call email.
      const text = renderText(node.text);
      showTyping();
      await new Promise((r) => setTimeout(r, 800 + Math.min(text.length * 14, 1800)));
      hideTyping();
      addBotBubble(text);

      setInput(`
        <textarea class="escalate-textarea" id="freeInput" placeholder="One line is enough — or leave blank (max 500 chars)" maxlength="500" style="min-height:90px"></textarea>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button class="close-btn" id="freeSkipBtn" style="flex:1">Skip ▸</button>
          <button class="next-btn" id="freeSubmitBtn" style="flex:2">Send to coach ▸</button>
        </div>
      `);
      const freeInputEl = document.getElementById("freeInput");
      const freeSubmitBtn = document.getElementById("freeSubmitBtn");
      const freeSkipBtn = document.getElementById("freeSkipBtn");
      freeInputEl.focus();

      const submitFree = async (text) => {
        if (isProcessing) return;
        isProcessing = true;
        clearStatus();
        freeSubmitBtn.disabled = true;
        freeSkipBtn.disabled = true;
        freeInputEl.disabled = true;
        const trimmed = (text || "").trim();
        if (trimmed) addUserBubble(trimmed);
        try {
          const res = await sendTurn(node.id, trimmed);
          turnIndex++;
          if (res.isEnd || !res.nextNodeId) {
            await renderEndState(node.id);
          } else {
            currentNodeId = res.nextNodeId;
            await renderNode(currentNodeId);
          }
        } catch (err) {
          console.error("[chat] sendTurn(free) failed", err);
          showStatus("error", (err && err.message) || "Send failed. Please try again.");
          freeSubmitBtn.disabled = false;
          freeSkipBtn.disabled = false;
          freeInputEl.disabled = false;
        } finally {
          isProcessing = false;
        }
      };

      freeSubmitBtn.addEventListener("click", () => submitFree(freeInputEl.value || ""));
      freeSkipBtn.addEventListener("click", () => submitFree(""));
    } else if (node.kind === "branch") {
      // PR #90 hotfix #2 (PR #91 re-applied): the caller (choose/say) already holds
      //   isProcessing=true. Re-guarding here would early-return and stall the chat.
      hideInput();
      try {
        const res = await sendTurn(node.id, null);
        turnIndex++;
        if (res.isEnd || !res.nextNodeId) {
          await renderEndState(node.id);
        } else {
          currentNodeId = res.nextNodeId;
          await renderNode(currentNodeId);
        }
      } catch (err) {
        console.error("[chat] sendTurn(branch) failed", err);
        showStatus("error", (err && err.message) || "Branch processing failed. Please refresh and try again.");
      } finally {
        isProcessing = false;
      }
    } else if (node.kind === "end") {
      const text = renderText(node.text);
      if (text) {
        showTyping();
        await new Promise((r) => setTimeout(r, 500));
        hideTyping();
        addBotBubble(text);
      }
      try {
        await sendTurn(node.id, null);
        turnIndex++;
      } catch (err) {
        console.warn("[chat] end-turn record failed (ignored)", err);
      }
      await renderEndState(node.id);
    } else {
      console.error("[chat] unknown node kind:", node.kind, node);
      showStatus("error", "Unknown node kind: " + node.kind);
    }
  }

  // PR #91 r2 — KST formatted slot label (English)
  // Coach is based in KST; we always present slots in KST and label clearly.
  function formatSlotKstEn(iso) {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return "";
    const kstMs = d.getTime() + 9 * 3600 * 1000;
    const k = new Date(kstMs);
    const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    const mo = months[k.getUTCMonth()];
    const da = k.getUTCDate();
    const wd = days[k.getUTCDay()];
    const hh = String(k.getUTCHours()).padStart(2, "0");
    const mm = String(k.getUTCMinutes()).padStart(2, "0");
    const y = k.getUTCFullYear();
    return `${mo} ${da} (${wd}) ${hh}:${mm}, ${y}`;
  }

  async function renderEndState(endNodeId) {
    isEnded = true;
    addSystemBubble("— Pre-diagnosis complete —");
    setInput(`
      <div class="end-actions">
        <button class="escalate-btn" id="escalateBtn">📞 Book 1:1 Coaching</button>
        <button class="close-btn" id="closeBtn">Book later (close window)</button>
        <div class="escalate-form" id="escalateForm">
          <div class="slot-section" id="slotSection">
            <div class="slot-title">Select a time for your call</div>
            <div class="slot-subtitle">Available windows offered by your coach. All times are shown in Korea Standard Time (KST, UTC+9).</div>
            <div id="slotContent">
              <div class="slot-loading">Loading available times…</div>
            </div>
          </div>
          <div style="font-size:12.5px;color:var(--muted);margin-top:12px;margin-bottom:4px;line-height:1.6">
            Your responses will be delivered to your coach. Add a note if you would like to share anything more.
          </div>
          <textarea class="escalate-textarea" id="escalateNote" placeholder="(Optional) A note for your coach — up to 500 chars" maxlength="500"></textarea>
          <button class="escalate-submit" id="escalateSubmit">Send booking request</button>
        </div>
      </div>
    `);
    const escalateBtn = document.getElementById("escalateBtn");
    const escalateForm = document.getElementById("escalateForm");
    const escalateNote = document.getElementById("escalateNote");
    const escalateSubmit = document.getElementById("escalateSubmit");
    const closeBtn = document.getElementById("closeBtn");
    const slotSection = document.getElementById("slotSection");
    const slotContent = document.getElementById("slotContent");

    let selectedSlotId = "";
    let availabilityLoaded = false;

    async function loadAvailability() {
      if (availabilityLoaded) return;
      availabilityLoaded = true;
      try {
        const res = await getCoachAvailability({
          email: emailParam,
          pd: pdParam,
          sig: sigParam,
          lang: "en",
        });
        const data = (res && res.data) || {};
        const slots = Array.isArray(data.slots) ? data.slots : [];
        if (!slots.length) {
          slotContent.innerHTML = `<div class="slot-empty">No availability is published right now. Submit your request and your coach will reach out to ${escapeHtml(emailParam)} with proposed times directly.</div>`;
          return;
        }
        slotContent.innerHTML = `<div class="slot-list" id="slotList">${
          slots.map((s) => `
            <button type="button" class="slot-card" data-slot-id="${escapeHtml(s.id)}">
              <div>
                <div class="slot-when">${escapeHtml(formatSlotKstEn(s.slotAtIso))}</div>
                <div class="slot-meta">${escapeHtml(String(s.durationMin || 30))} min call · KST</div>
              </div>
              <div class="slot-check">Selected ✓</div>
            </button>
          `).join("")
        }</div>`;
        slotContent.querySelectorAll(".slot-card").forEach((btn) => {
          btn.addEventListener("click", () => {
            slotContent.querySelectorAll(".slot-card").forEach((b) => b.classList.remove("selected"));
            btn.classList.add("selected");
            selectedSlotId = btn.getAttribute("data-slot-id") || "";
          });
        });
      } catch (err) {
        console.error("[chat] getCoachAvailability failed", err);
        slotContent.innerHTML = `<div class="slot-empty">Could not load available times. Submit your request and your coach will reach out directly.</div>`;
      }
    }

    escalateBtn.addEventListener("click", () => {
      escalateForm.classList.add("show");
      slotSection.classList.add("show");
      loadAvailability();
      escalateNote.focus();
    });

    escalateSubmit.addEventListener("click", async () => {
      escalateSubmit.disabled = true;
      escalateSubmit.textContent = "Sending…";
      clearStatus();
      try {
        const note = (escalateNote.value || "").trim();
        const res = await requestEscalation({
          email: emailParam,
          pd: pdParam,
          sig: sigParam,
          lang: "en",
          sessionId,
          note,
          selectedSlotId, // PR #91 r2
        });
        if (res.data && res.data.ok) {
          const successMsg = res.data.slotBooked && res.data.slotAtIso
            ? `Your call is scheduled. Confirmation will be sent to ${emailParam} (selected: ${formatSlotKstEn(res.data.slotAtIso)} KST).`
            : `Your request has been received. Your coach will email ${emailParam} with available times.`;
          showStatus("success", successMsg);
          escalateBtn.disabled = true;
          escalateNote.disabled = true;
          escalateSubmit.textContent = "Booking sent ✓";
          slotContent.querySelectorAll(".slot-card").forEach((b) => (b.disabled = true));
        } else {
          showStatus("error", "Request received but empty response. Please wait for email.");
        }
      } catch (err) {
        console.error("[chat] escalation failed", err);
        const msg = (err && err.message) || "Escalation failed. Please try again.";
        showStatus("error", msg);
        escalateSubmit.disabled = false;
        escalateSubmit.textContent = "Send booking request";
      }
    });

    closeBtn.addEventListener("click", () => {
      window.close();
      setTimeout(() => {
        location.href = "/index-en.html";
      }, 200);
    });
  }

  addSystemBubble("— Pre-diagnosis (5-7 min) —");
  await renderNode(currentNodeId);

  window.__chatDebug = {
    sessionId,
    get currentNodeId(){ return currentNodeId; },
    get turnIndex(){ return turnIndex; },
    get isEnded(){ return isEnded; },
    userAnswers,
    scriptVersion: script.version,
  };
</script>
