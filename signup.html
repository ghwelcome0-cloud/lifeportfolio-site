<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
  import {
    getAuth,
    setPersistence,
    browserLocalPersistence,
    browserSessionPersistence,
    GoogleAuthProvider,
    signInWithPopup,
    signInWithRedirect,
    getRedirectResult,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-auth.js";
  import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB6xU5IVpbg8661WaPKTAXsg_5vuC3sPY4",
    authDomain: "lifeportfolio.firebaseapp.com",
    databaseURL: "https://lifeportfolio-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "lifeportfolio",
    appId: "1:1090689178284:web:1eea462fa10cddca85d0d9"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  auth.languageCode = "ko";

  const REDIRECT_AFTER_SIGNUP = "success.html?mode=signup";
  const SIGNUP_INTENT_KEY = "lp_signup_in_progress";

  const ua = (navigator.userAgent || "").toLowerCase();
  const isIOS = /iphone|ipad|ipod/.test(ua);
  const isInApp = /instagram|fban|fbav|kakaotalk|line|naver|daum/.test(ua);

  const googleBtn = document.getElementById("googleBtn");
  const btnText = document.getElementById("btnText");
  const spinner = document.getElementById("spinner");
  const inappWarn = document.getElementById("inappWarn");
  const loadingMsg = document.getElementById("loadingMsg");
  const successMsg = document.getElementById("successMsg");
  const errBox = document.getElementById("err");

  let finished = false;
  let isFinalizing = false;
  let authCheckTimer = null;
  let redirectTimer = null;
  let redirectFallbackTimer = null;
  let authObserverOff = null;

  function markSignupIntent() {
    try {
      sessionStorage.setItem(SIGNUP_INTENT_KEY, "1");
    } catch (_) {}
  }

  function clearSignupIntent() {
    try {
      sessionStorage.removeItem(SIGNUP_INTENT_KEY);
    } catch (_) {}
  }

  function hasSignupIntent() {
    try {
      return sessionStorage.getItem(SIGNUP_INTENT_KEY) === "1";
    } catch (_) {
      return false;
    }
  }

  function hideAllStatus() {
    [inappWarn, loadingMsg, successMsg, errBox].forEach((el) => {
      if (el) el.style.display = "none";
    });
  }

  function showStatus(el, message = "", allowHtml = false) {
    hideAllStatus();
    if (!el) return;

    if (message) {
      if (allowHtml) {
        el.innerHTML = message;
      } else {
        el.textContent = message;
      }
    }
    el.style.display = "block";
  }

  function setLoadingState(isLoading, loadingText = "회원가입 진행 중...") {
    if (!googleBtn || !btnText || !spinner) return;

    googleBtn.disabled = isLoading;
    btnText.textContent = isLoading ? loadingText : "Google 계정으로 회원가입";
    spinner.style.display = isLoading ? "inline-block" : "none";
  }

  function clearAuthCheckTimer() {
    if (authCheckTimer) {
      clearTimeout(authCheckTimer);
      authCheckTimer = null;
    }
  }

  function clearRedirectTimers() {
    if (redirectTimer) {
      clearTimeout(redirectTimer);
      redirectTimer = null;
    }
    if (redirectFallbackTimer) {
      clearTimeout(redirectFallbackTimer);
      redirectFallbackTimer = null;
    }
  }

  function stopAuthObserver() {
    if (typeof authObserverOff === "function") {
      authObserverOff();
      authObserverOff = null;
    }
  }

  function startAuthCheckTimeout() {
    clearAuthCheckTimer();

    authCheckTimer = setTimeout(() => {
      if (finished || isFinalizing || !hasSignupIntent()) return;

      clearSignupIntent();
      setLoadingState(false);
      showStatus(errBox, "회원가입 상태를 확인하지 못했습니다. 다시 시도해주세요.");
    }, 8000);
  }

  function normalizeErrorMessage(error) {
    const code = error?.code || "";
    switch (code) {
      case "auth/popup-closed-by-user":
        return "회원가입 창이 닫혀 가입이 완료되지 않았습니다. 다시 시도해주세요.";
      case "auth/cancelled-popup-request":
        return "회원가입 요청이 취소되었습니다. 다시 시도해주세요.";
      case "auth/popup-blocked":
        return "브라우저가 팝업을 차단했습니다. 팝업 허용 후 다시 시도해주세요.";
      case "auth/network-request-failed":
        return "네트워크 연결이 불안정합니다. 연결 상태를 확인한 뒤 다시 시도해주세요.";
      case "auth/unauthorized-domain":
        return "현재 접속한 도메인이 Firebase 인증 허용 도메인에 등록되지 않았습니다.";
      case "auth/too-many-requests":
        return "요청이 너무 많습니다. 잠시 후 다시 시도해주세요.";
      case "auth/web-storage-unsupported":
        return "현재 브라우저는 로그인 저장 기능을 지원하지 않습니다. 다른 브라우저에서 시도해주세요.";
      case "auth/operation-not-allowed":
        return "현재 Firebase에서 Google 로그인이 활성화되어 있지 않습니다. 관리자 설정을 확인해주세요.";
      case "auth/account-exists-with-different-credential":
        return "같은 이메일로 다른 로그인 방식이 이미 연결되어 있습니다. 기존 방식으로 로그인해주세요.";
      default:
        return `${code ? code + " " : ""}${error?.message || "회원가입 중 오류가 발생했습니다."}`;
    }
  }

  async function upsertUser(user) {
    const userRef = ref(db, "users/" + user.uid);
    const snap = await get(userRef);
    const now = new Date().toISOString();

    if (snap.exists()) {
      await set(userRef, {
        ...snap.val(),
        email: user.email || "",
        displayName: user.displayName || "",
        lastLogin: now
      });
    } else {
      await set(userRef, {
        email: user.email || "",
        displayName: user.displayName || "",
        createdAt: now,
        lastLogin: now
      });
    }
  }

  function scheduleRedirect() {
    if (redirectTimer || redirectFallbackTimer) return;

    setLoadingState(false);
    showStatus(successMsg, "회원가입이 완료되었습니다. 잠시 후 다음 단계로 이동합니다.");

    redirectTimer = setTimeout(() => {
      window.location.replace(REDIRECT_AFTER_SIGNUP);
    }, 700);

    redirectFallbackTimer = setTimeout(() => {
      const currentPath = (window.location.pathname || "").toLowerCase();
      if (currentPath.endsWith("signup.html") || currentPath.endsWith("/signup.html")) {
        window.location.href = REDIRECT_AFTER_SIGNUP;
      }
    }, 1800);
  }

  async function finalizeSignup(user, source = "unknown") {
    if (!user || finished || isFinalizing) return;

    isFinalizing = true;
    clearAuthCheckTimer();

    try {
      setLoadingState(true, "회원가입 완료 처리 중...");
      showStatus(loadingMsg, "회원가입 정보를 저장하고 있습니다. 잠시만 기다려주세요.");

      await upsertUser(user);

      clearSignupIntent();
      finished = true;
      isFinalizing = false;
      stopAuthObserver();

      scheduleRedirect();
    } catch (dbError) {
      console.error("사용자 정보 저장 오류:", dbError, "source:", source);

      isFinalizing = false;
      finished = false;
      clearSignupIntent();
      setLoadingState(false);
      showStatus(errBox, "회원가입은 완료되었지만 사용자 정보 저장 중 오류가 발생했습니다. 새로고침 후 다시 시도해주세요.");
    }
  }

  async function setupPersistence() {
    try {
      try {
        await setPersistence(
          auth,
          isIOS ? browserSessionPersistence : browserLocalPersistence
        );
      } catch (e) {
        console.warn("기본 persistence 설정 실패, session persistence로 재시도:", e);
        await setPersistence(auth, browserSessionPersistence);
      }
    } catch (e) {
      console.error("Persistence 설정 오류:", e);
      showStatus(errBox, "회원가입 환경 설정 중 오류가 발생했습니다. 새로고침 후 다시 시도해주세요.");
    }
  }

  async function handleRedirectFlow() {
    try {
      const redirectResult = await getRedirectResult(auth);
      if (redirectResult?.user) {
        await finalizeSignup(redirectResult.user, "redirect-result");
      }
    } catch (e) {
      console.error("Redirect 결과 처리 오류:", e);
      clearAuthCheckTimer();
      clearSignupIntent();
      setLoadingState(false);
      showStatus(errBox, normalizeErrorMessage(e));
    }
  }

  function installAuthObserver() {
    stopAuthObserver();

    authObserverOff = onAuthStateChanged(auth, async (user) => {
      if (!user) return;
      if (finished || isFinalizing) return;

      if (hasSignupIntent()) {
        await finalizeSignup(user, "auth-state");
      }
    });
  }

  async function startSignup() {
    hideAllStatus();

    if (isInApp) {
      showStatus(
        inappWarn,
        "<b>현재 인앱 브라우저에서 열려 Google 회원가입이 제한될 수 있습니다.</b><br>Safari, Chrome 등 외부 브라우저에서 다시 열어주세요.",
        true
      );
      return;
    }

    try {
      markSignupIntent();
      setLoadingState(true);
      showStatus(loadingMsg, "Google 계정 확인 후 회원가입을 진행하는 중입니다. 잠시만 기다려주세요.");
      startAuthCheckTimeout();

      if (isIOS) {
        await signInWithRedirect(auth, provider);
        return;
      }

      const result = await signInWithPopup(auth, provider);

      if (result?.user) {
        await finalizeSignup(result.user, "popup-result");
      } else {
        clearAuthCheckTimer();
        clearSignupIntent();
        setLoadingState(false);
        showStatus(errBox, "회원가입이 완료되지 않았습니다. 다시 시도해주세요.");
      }
    } catch (e) {
      console.error("회원가입 오류:", e);
      clearAuthCheckTimer();
      clearSignupIntent();
      setLoadingState(false);
      showStatus(errBox, normalizeErrorMessage(e));
    }
  }

  hideAllStatus();
  setLoadingState(false);

  if (isInApp) {
    showStatus(
      inappWarn,
      "<b>현재 인앱 브라우저에서 열려 Google 회원가입이 제한될 수 있습니다.</b><br>Safari, Chrome 등 외부 브라우저에서 다시 열어주세요.",
      true
    );
  }

  const provider = new GoogleAuthProvider();
  provider.setCustomParameters({ prompt: "select_account" });

  await setupPersistence();
  installAuthObserver();

  if (hasSignupIntent()) {
    setLoadingState(true, "회원가입 상태 확인 중...");
    showStatus(loadingMsg, "회원가입 상태를 확인하고 있습니다. 잠시만 기다려주세요.");
    startAuthCheckTimeout();
  }

  await handleRedirectFlow();

  if (googleBtn) {
    googleBtn.addEventListener("click", startSignup);
  }

  window.addEventListener("beforeunload", () => {
    clearAuthCheckTimer();
    clearRedirectTimers();
  });
</script>
