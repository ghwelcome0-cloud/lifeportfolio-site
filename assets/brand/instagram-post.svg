<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-label="인생포트폴리오 인스타그램 포스트">
  <defs>
    <linearGradient id="lpBgI" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4A6984"/>
      <stop offset="1" stop-color="#2C3E4F"/>
    </linearGradient>
    <linearGradient id="cream" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7F2E6"/>
      <stop offset="1" stop-color="#F0E7D2"/>
    </linearGradient>
  </defs>

  <!-- Cream background -->
  <rect width="1080" height="1080" fill="url(#cream)"/>

  <!-- subtle gold frame -->
  <rect x="48" y="48" width="984" height="984" rx="36" fill="none" stroke="#C49E45" stroke-width="2" opacity="0.55"/>

  <!-- faint large orbit motif (background, very subtle) -->
  <path d="M150 720 A 520 520 0 0 1 930 360" fill="none" stroke="#C49E45" stroke-width="2" opacity="0.18" stroke-linecap="round"/>

  <!-- Emblem (centered, upper) -->
  <g transform="translate(390,180)">
    <rect width="300" height="300" rx="60" fill="url(#lpBgI)"/>
    <rect x="20" y="20" width="260" height="260" rx="42" fill="none" stroke="#C49E45" stroke-width="3" opacity="0.9"/>
    <path d="M126 90 A 88 88 0 0 1 214 178" fill="none" stroke="#C49E45" stroke-width="3" opacity="0.85" stroke-linecap="round"/>
    <circle cx="126" cy="90" r="8" fill="#C49E45"/>
    <text x="150" y="218" font-family="Georgia,'Times New Roman',serif" font-size="176" font-weight="700"
          fill="#F5EEDC" text-anchor="middle" letter-spacing="-4">L</text>
  </g>

  <!-- Brand name -->
  <text x="540" y="610" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="92" font-weight="800" fill="#1B2A38" text-anchor="middle" letter-spacing="-3">인생포트폴리오</text>

  <!-- English wordmark -->
  <text x="540" y="672" font-family="Georgia,'Times New Roman',serif"
        font-size="40" font-weight="400" fill="#A8852F" text-anchor="middle" letter-spacing="8">LIFE PORTFOLIO</text>

  <!-- divider -->
  <line x1="440" y1="730" x2="640" y2="730" stroke="#C49E45" stroke-width="2" opacity="0.6"/>

  <!-- Tagline -->
  <text x="540" y="812" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="46" font-weight="800" fill="#3A4D5E" text-anchor="middle" letter-spacing="-1">발견하고, 살아내고, 남기는</text>
  <text x="540" y="878" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="46" font-weight="800" fill="#3A4D5E" text-anchor="middle" letter-spacing="-1">한 권의 인생 설계도</text>

  <!-- footer URL -->
  <text x="540" y="980" font-family="'NanumSquareRound','Noto Sans CJK KR',sans-serif"
        font-size="30" font-weight="700" fill="#6B7C8A" text-anchor="middle" letter-spacing="2">lifeportfolio.co.kr</text>
</svg>
