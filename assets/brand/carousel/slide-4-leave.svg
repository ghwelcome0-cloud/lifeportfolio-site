<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-label="남김 슬라이드">
  <defs>
    <linearGradient id="cream4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7F2E6"/>
      <stop offset="1" stop-color="#F0E7D2"/>
    </linearGradient>
  </defs>

  <rect width="1080" height="1350" fill="url(#cream4)"/>

  <!-- faint orbit completing -->
  <path d="M120 360 A 620 620 0 0 0 980 980" fill="none" stroke="#C49E45" stroke-width="2.5" opacity="0.14" stroke-linecap="round"/>
  <circle cx="980" cy="980" r="9" fill="#C49E45" opacity="0.35"/>

  <rect x="56" y="56" width="968" height="1238" rx="40" fill="none" stroke="#C49E45" stroke-width="2" opacity="0.5"/>

  <!-- step badge -->
  <g transform="translate(150,210)">
    <circle cx="0" cy="0" r="46" fill="#4A6984"/>
    <circle cx="0" cy="0" r="46" fill="none" stroke="#C49E45" stroke-width="2.5"/>
    <text x="0" y="18" font-family="Georgia,serif" font-size="52" font-weight="700" fill="#E8C56A" text-anchor="middle">3</text>
  </g>
  <text x="232" y="200" font-family="Georgia,'Times New Roman',serif" font-size="40" font-weight="700"
        fill="#A8852F" letter-spacing="4">LEAVE</text>
  <text x="232" y="252" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="34" font-weight="700" fill="#6B7C8A" letter-spacing="-1">엠블럼의 'L' — 한 권으로 남는 기록</text>

  <!-- big title -->
  <text x="150" y="480" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="110" font-weight="800" fill="#1B2A38" letter-spacing="-4">남김</text>
  <text x="150" y="600" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="62" font-weight="800" fill="#3A5269" letter-spacing="-2">한 권의 설계도로</text>

  <line x1="150" y1="660" x2="430" y2="660" stroke="#C49E45" stroke-width="3" opacity="0.7"/>

  <!-- body -->
  <text x="150" y="760" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="44" font-weight="500" fill="#3A4D5E" letter-spacing="-1">흩어진 기억과 가치를</text>
  <text x="150" y="824" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="44" font-weight="500" fill="#3A4D5E" letter-spacing="-1">하나의 기록으로 엮어,</text>
  <text x="150" y="920" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="44" font-weight="700" fill="#1B2A38" letter-spacing="-1">나만의 인생 설계도를</text>
  <text x="150" y="984" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="44" font-weight="700" fill="#1B2A38" letter-spacing="-1">한 권으로 남깁니다.</text>

  <!-- emblem small bottom -->
  <g transform="translate(150,1110)">
    <rect width="92" height="92" rx="20" fill="#4A6984"/>
    <rect x="7" y="7" width="78" height="78" rx="14" fill="none" stroke="#C49E45" stroke-width="1.6" opacity="0.9"/>
    <path d="M38 28 A 27 27 0 0 1 65 55" fill="none" stroke="#C49E45" stroke-width="1.6" opacity="0.9" stroke-linecap="round"/>
    <circle cx="38" cy="28" r="3.2" fill="#C49E45"/>
    <text x="46" y="68" font-family="Georgia,serif" font-size="54" font-weight="700" fill="#F5EEDC" text-anchor="middle" letter-spacing="-2">L</text>
  </g>
  <text x="262" y="1148" font-family="'NanumSquareRound','Noto Sans CJK KR',sans-serif"
        font-size="30" font-weight="800" fill="#3A5269" letter-spacing="-1">인생포트폴리오</text>
  <text x="262" y="1190" font-family="'NanumSquareRound','Noto Sans CJK KR',sans-serif"
        font-size="24" font-weight="600" fill="#6B7C8A" letter-spacing="0">lifeportfolio.co.kr</text>

  <text x="930" y="1190" font-family="'NanumSquareRound','Noto Sans CJK KR',sans-serif"
        font-size="30" font-weight="800" fill="#A8852F" text-anchor="end" letter-spacing="0">다음 →</text>
  <text x="980" y="1252" font-family="Georgia,serif" font-size="26" fill="#A8852F" text-anchor="end" opacity="0.85">4 / 5</text>
</svg>
