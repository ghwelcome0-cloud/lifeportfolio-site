<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="인생포트폴리오 엠블럼">
  <!-- Life Portfolio Emblem — deep slate blue + gold orbit + cream serif L -->
  <defs>
    <linearGradient id="lpBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4A6984"/>
      <stop offset="1" stop-color="#2C3E4F"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#lpBg)"/>
  <rect x="34" y="34" width="444" height="444" rx="70" fill="none" stroke="#C49E45" stroke-width="5" opacity="0.9"/>
  <!-- orbit arc = the journey of a life (placed upper-right, clear of the L) -->
  <path d="M214 150 A 150 150 0 0 1 364 300" fill="none" stroke="#C49E45" stroke-width="5" opacity="0.85" stroke-linecap="round"/>
  <!-- milestone dot at the arc's start -->
  <circle cx="214" cy="150" r="14" fill="#C49E45"/>
  <!-- serif L, centered and balanced -->
  <text x="256" y="372" font-family="Georgia, 'Times New Roman', serif" font-size="300" font-weight="700"
        fill="#F5EEDC" text-anchor="middle" letter-spacing="-6">L</text>
</svg>
