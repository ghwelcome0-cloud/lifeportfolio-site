<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-label="L의 의미">
  <defs>
    <linearGradient id="lcream4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F7F2E6"/><stop offset="1" stop-color="#F0E7D2"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#lcream4)"/>
  <rect x="56" y="56" width="968" height="1238" rx="40" fill="none" stroke="#C49E45" stroke-width="2" opacity="0.5"/>

  <text x="150" y="200" font-family="Georgia,'Times New Roman',serif" font-size="40" font-weight="700" fill="#A8852F" letter-spacing="4">THE LETTER L</text>
  <text x="150" y="252" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="34" font-weight="700" fill="#6B7C8A" letter-spacing="-1">로고 속 세리프 'L'</text>

  <!-- emblem with L highlighted -->
  <g transform="translate(390,330)">
    <rect width="300" height="300" rx="60" fill="#4A6984"/>
    <rect x="20" y="20" width="260" height="260" rx="42" fill="none" stroke="#C49E45" stroke-width="2.4" opacity="0.4"/>
    <path d="M126 90 A 88 88 0 0 1 214 178" fill="none" stroke="#C49E45" stroke-width="2.6" opacity="0.4" stroke-linecap="round"/>
    <circle cx="126" cy="90" r="8" fill="#C49E45" opacity="0.45"/>
    <!-- highlighted L -->
    <text x="150" y="218" font-family="Georgia,serif" font-size="176" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="-4">L</text>
  </g>

  <text x="540" y="740" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="74" font-weight="800" fill="#1B2A38" text-anchor="middle" letter-spacing="-3">Life, 한 권의 기록</text>

  <text x="540" y="858" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="42" font-weight="500" fill="#3A4D5E" text-anchor="middle" letter-spacing="-1">Life(삶)이자 Life Portfolio의 첫 글자.</text>
  <text x="540" y="922" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="42" font-weight="700" fill="#1B2A38" text-anchor="middle" letter-spacing="-1">'책·기록'의 느낌을 주려 세리프체를 썼고,</text>
  <text x="540" y="986" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="42" font-weight="700" fill="#1B2A38" text-anchor="middle" letter-spacing="-1">가장 밝게 빛나게 해 '사람'을 중심에 뒀습니다.</text>

  <text x="540" y="1150" font-family="'NanumSquareRound','Noto Sans CJK KR',sans-serif"
        font-size="34" font-weight="800" fill="#A8852F" text-anchor="middle" letter-spacing="-1">= 남김</text>
  <text x="930" y="1200" font-family="'NanumSquareRound','Noto Sans CJK KR',sans-serif"
        font-size="30" font-weight="800" fill="#A8852F" text-anchor="end">다음 →</text>
  <text x="980" y="1252" font-family="Georgia,serif" font-size="26" fill="#A8852F" text-anchor="end" opacity="0.85">4 / 5</text>
</svg>
