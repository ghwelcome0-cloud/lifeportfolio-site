  </defs>
  <rect width="1080" height="1350" fill="url(#lc1)"/>
  <path d="M120 980 A 620 620 0 0 1 980 360" fill="none" stroke="#C49E45" stroke-width="2.5" opacity="0.16" stroke-linecap="round"/>
