<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350" role="img" aria-label="곡선의 의미">
  <defs>
    <linearGradient id="lc3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4A6984"/><stop offset="1" stop-color="#2C3E4F"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1350" fill="url(#lc3)"/>
  <path d="M120 1080 A 760 760 0 0 1 980 280" fill="none" stroke="#C49E45" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
  <rect x="56" y="56" width="968" height="1238" rx="40" fill="none" stroke="#C49E45" stroke-width="2" opacity="0.5"/>

  <text x="150" y="200" font-family="Georgia,'Times New Roman',serif" font-size="40" font-weight="700" fill="#E8C56A" letter-spacing="4">THE ARC</text>
  <text x="150" y="252" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="34" font-weight="700" fill="#CBD6DF" letter-spacing="-1">로고 속 '곡선'</text>

  <!-- emblem with ARC highlighted -->
  <g transform="translate(390,330)">
    <rect width="300" height="300" rx="60" fill="#F5EEDC" opacity="0.12"/>
    <rect x="20" y="20" width="260" height="260" rx="42" fill="none" stroke="#C49E45" stroke-width="2.4" opacity="0.35"/>
    <circle cx="126" cy="90" r="8" fill="#C49E45" opacity="0.4"/>
    <text x="150" y="218" font-family="Georgia,serif" font-size="176" font-weight="700" fill="#F5EEDC" text-anchor="middle" opacity="0.2" letter-spacing="-4">L</text>
    <!-- highlighted arc -->
    <path d="M126 90 A 88 88 0 0 1 214 178" fill="none" stroke="#E8C56A" stroke-width="7" opacity="1" stroke-linecap="round"/>
    <path d="M126 90 A 88 88 0 0 1 214 178" fill="none" stroke="#C49E45" stroke-width="16" opacity="0.25" stroke-linecap="round"/>
  </g>

  <text x="540" y="740" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="92" font-weight="800" fill="#F5EEDC" text-anchor="middle" letter-spacing="-3">인생의 여정</text>

  <text x="540" y="868" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="42" font-weight="500" fill="#DCE4EB" text-anchor="middle" letter-spacing="-1">직선이 아니라 곡선으로 그린 이유 —</text>
  <text x="540" y="932" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="42" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">인생은 오르내리며 나아가는 길이니까요.</text>
  <text x="540" y="1010" font-family="'NanumSquareRound','Noto Sans CJK KR','Apple SD Gothic Neo',sans-serif"
        font-size="42" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="-1">위로 향하는 곡선엔 '성장'을 담았습니다.</text>

  <text x="540" y="1150" font-family="'NanumSquareRound','Noto Sans CJK KR',sans-serif"
        font-size="34" font-weight="800" fill="#E8C56A" text-anchor="middle" letter-spacing="-1">= 살아냄</text>
  <text x="930" y="1200" font-family="'NanumSquareRound','Noto Sans CJK KR',sans-serif"
        font-size="30" font-weight="800" fill="#E8C56A" text-anchor="end">다음 →</text>
  <text x="980" y="1252" font-family="Georgia,serif" font-size="26" fill="#C49E45" text-anchor="end" opacity="0.85">3 / 5</text>
</svg>
