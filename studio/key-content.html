<script>
var DATA = {"script": "# 인생포트폴리오 — 유튜브 키 콘텐츠 대본 (v2.0 / 10분 풀버전)\n\n> **포맷**: 시네마틱 키네틱 타이포그래피 + 추상 모션그래픽 (다크 네이비 #0B1A2F / 골드 #C8A24A)\n> **길이**: 약 10분 (낭독 약 9~9.5분 ≈ 한국어 약 2,950~3,050자 + 연출 여백)\n> **보이스**: 총괄님 직접 녹음 (MiniMax Speech-2.8-HD / Youngsik Kim 보이스)\n> **목적**: 구매 전환 (9,900원 Only One 진단) + 채널 첫인상 = \"이미 운영 중인 진짜 서비스\"\n> **숏츠 전략**: 각 SCENE = 독립 숏츠 1편 (총 18편 풀링 가능)\n\n---\n\n## 🎬 전체 구조 (10분 = 8막 18씬)\n\n| 막 | 씬 | 타임 | 역할 | 숏츠 |\n|---|---|---|---|---|\n| HOOK | S1 | 0:00–0:55 | 질문으로 멱살잡기 | #1 |\n| 1. 진단 | S2 | 0:55–2:05 | 시대 전환 (효율→의미) | #2 |\n| 2. 시장 | S3 | 2:05–3:25 | 데이터로 증명 (번아웃·AI·MBTI) | #3·4 |\n| 3. 공감 | S4 | 3:25–4:25 | 생애 4시기 / \"내 얘기다\" | #5·6 |\n| 4. 전환 | S5 | 4:25–6:05 | 강영우 실화 + 달란트 원리 | #7·8·9 |\n| 5. 해법 | S6 | 6:05–7:25 | Only One 진단·리포트 | #10·11 |\n| 6. 여정 | S7 | 7:25–8:35 | 발견·살아냄·남김 | #12·13 |\n| 7. 신뢰 | S8 | 8:35–9:20 | 운영 성숙도·약속 | #14·15 |\n| 8. 초대 | S9 | 9:20–10:00 | CTA / North Star | #16·17·18 |\n\n---\n\n## SCENE 1 — HOOK (0:00–0:55) 〔숏츠 #1〕\n\n🎬 **화면**: 완전한 검은 화면 → 작은 골드 점(North Star) 점멸. 타이핑되듯 한 줄씩 등장.\n🎵 **음악**: 무음에 가까운 저음 앰비언트 → 첫 질문에서 미세한 심장박동 비트.\n\n🎙️ **내레이션**\n> AI에게 물으면, 답은 3초 만에 나옵니다.\n> <#0.5#>\n> 그런데 이상하죠. 답이 빨라질수록, 우리는 더 자주 이런 생각을 합니다.\n> <#0.4#>\n> \"나는… 왜 남들보다 뒤처진 것 같을까.\"\n> <#0.6#>\n> 모든 성취가 숫자로 줄 세워지고, 옆 사람과 비교하기가 그 어느 때보다 쉬운 시대.\n> <#0.4#>\n> 이 영상은, 그 비교의 자리에서 한 발 벗어나려는 분들을 위한 이야기입니다.\n> 비교하지 않아도 되는, 단 하나뿐인 인생 설계도에 대하여.\n\n📱 **숏츠 #1**: \"답이 빨라질수록 왜 더 불안할까?\"\n\n---\n\n## SCENE 2 — 시대 전환 (0:55–2:05) 〔숏츠 #2〕\n\n🎬 **화면**: 가이드북 3p 스타일. 세 단어가 위에서 아래로 쌓임 — SaaS → AI → 의미(MEANING). 마지막 '의미'에 골드 박스.\n\n🎙️ **내레이션**\n> 지난 20년, 세상은 손쉬워졌습니다. 더 빠르게, 더 효율적으로, 더 저렴하게. 우리는 그걸 'SaaS의 시대'라고 불렀습니다.\n> <#0.4#>\n> 그리고 지금, AI가 등장하면서 '무엇을' 하느냐는 누구나 빠르게 답할 수 있게 됐습니다.\n> <#0.5#>\n> 그러자 더 무거워진 질문이 하나 남았습니다. <#0.3#> '왜'.\n> <#0.4#>\n> 왜 이 일을 하는가. 왜 이렇게 살아가는가.\n> 한 사람의 '왜'가 비로소 일이 되는 시대 — 저는 이것을 '의미 경제'라고 부릅니다.\n> <#0.5#>\n> AI가 세상을 자동화한다면, 인생포트폴리오는 사람을 자율화합니다.\n> 기능이 아니라 의미를, 효율이 아니라 고유성을 다루는 일입니다.\n\n📱 **숏츠 #2**: \"SaaS의 시대는 끝났습니다 — 다음은?\"\n\n---\n\n## SCENE 3 — 시장 / 데이터 증명 (2:05–3:25) 〔숏츠 #3·4〕\n\n🎬 **화면**: 데이터 카드가 하나씩 카운트업 애니메이션으로 등장 (75.3% / 2,162만 / 81%). 차분하지만 또렷하게.\n🎵 **음악**: 사실을 짚는 절제된 비트.\n\n🎙️ **내레이션**\n> 이건 감성적인 구호가 아닙니다. 데이터가 말하고 있습니다.\n> <#0.4#>\n> 30대 직장인의 번아웃 경험률은 75.3퍼센트. 20대보다도, 40대보다도 높습니다.\n> <#0.5#>\n> 같은 시기, 한국에서 ChatGPT를 쓰는 사람은 한 달에 2천만 명을 넘어섰습니다. 답을 구하는 일은, 이제 너무 쉬워졌어요.\n> <#0.6#>\n> 그런데 흥미로운 건 이겁니다. 사람들은 자기를 '잘 안다'고 답합니다. MBTI까지 동원해서요.\n> 하지만 정작 \"그래서 무엇을 위해 사는가\"라는 질문 앞에서는, 대부분 말문이 막힙니다.\n> <#0.5#>\n> MBTI는 끝이 아니라 다리입니다. \"내 유형 다음은 무엇인가\" — 그 빈칸을, 인생포트폴리오가 채웁니다.\n\n📱 **숏츠 #3**: \"30대 번아웃 75.3% — 왜 가장 높을까\"\n📱 **숏츠 #4**: \"MBTI는 끝이 아니라 다리다\"\n\n---\n\n## SCENE 4 — 공감 / 생애 4시기 (3:25–4:25) 〔숏츠 #5·6〕\n\n🎬 **화면**: 4개의 시기 카드가 가로로 흐름 — 10대·20대·30대·40대. 각 카드에 그 시기의 질문이 떠오름.\n\n🎙️ **내레이션**\n> 어쩌면 지금 떠올리는 고민이, 당신만의 것이 아닐 수 있습니다.\n> <#0.4#>\n> 10대는 묻습니다. \"내가 뭘 잘하는지 모르겠어요.\"\n> 20대는 말합니다. \"직무가 안 맞아 회사를 그만뒀어요. MBTI 다음이 궁금해요.\"\n> 30대는 고백합니다. \"번아웃이 왔어요. 인생 방향을 통째로 다시 짜야 할 것 같아요.\"\n> 40대는 묻습니다. \"AI가 내 일을 대체할 것 같아요. 인생 후반의 의미를 알고 싶어요.\"\n> <#0.6#>\n> 표면의 고민은 다 다릅니다. 그런데 그 안에 흐르는 질문은 하나입니다.\n> \"나는 누구이고, 무엇을 위해 사는가.\"\n> <#0.4#>\n> 분류가 아니라, 같은 갈망의 다른 얼굴입니다.\n\n📱 **숏츠 #5**: \"10대·20대·30대·40대, 다 다른데 똑같은 질문\"\n📱 **숏츠 #6**: \"이거 혹시 내 얘기 아닌가요?\"\n\n---\n\n## SCENE 5 — 전환 / 강영우 실화 + 달란트 (4:25–6:05) 〔숏츠 #7·8·9〕\n\n🎬 **화면**: 어두운 화면에 한 줄기 빛. 세 개의 빛 덩어리(5·2·1)가 떠오르고, 비교선(점선)이 그어지다 '탁' 끊어진다.\n🎵 **음악**: 가장 감정적인 구간 — 절제된 현악, 전환점에서 음이 올라감.\n\n🎙️ **내레이션**\n> 여기, 한 사람의 이야기가 있습니다.\n> <#0.4#>\n> 그는 열네 살에 사고로 시력을 잃었습니다. 앞이 보이지 않는 채로, 모두가 불가능하다고 말하는 길을 걸었어요.\n> 그러나 그는 끝내 대학을 졸업하고, 1976년 미국에서 한국 최초의 시각장애인 박사가 되었습니다. 故 강영우 박사입니다.\n> <#0.6#>\n> 그가 평생 붙든 한 문장은 이것이었습니다. \"남과 비교하지 말고, 자신에게 맡겨진 것을 기준으로 살아가라.\"\n> <#0.5#>\n> 그는 이 원리를, 성경의 오래된 비유 하나에서 가져왔습니다.\n> 한 주인이 세 사람에게 각각 다섯, 둘, 하나를 맡기고 길을 떠납니다.\n> <#0.4#>\n> 돌아온 주인은, 세 사람을 서로 비교하지 않았습니다. 다섯 받은 사람을 둘 받은 사람과 견주어 등수를 매기지 않았어요.\n> 대신 물었습니다. \"너는 받은 만큼 충실했는가.\"\n> <#0.5#>\n> 그래서 다섯을 받아 다섯을 남긴 사람과, 둘을 받아 둘을 남긴 사람은 — 똑같이 칭찬받았습니다.\n> <#0.6#>\n> 평가의 기준은 '양의 크기'가 아니라, '맡겨진 것에 대한 충실함'이었습니다.\n> 남보다 앞섰는지 뒤처졌는지는 중요하지 않습니다. 중요한 건, 내게 맡겨진 것을 내가 어디까지 키워 가느냐. <#0.3#> 그것뿐입니다.\n\n📱 **숏츠 #7**: \"열네 살에 시력을 잃은 그가 박사가 되기까지\"\n📱 **숏츠 #8**: \"다섯과 둘을 같은 줄에 세우지 않는 평가\"\n📱 **숏츠 #9**: \"기준은 양이 아니라 충실함이다\"\n\n---\n\n## SCENE 6 — 해법 / Only One 진단·리포트 (6:05–7:25) 〔숏츠 #10·11〕\n\n🎬 **화면**: 골드 점 하나가 좌표 위에 찍히고, 사방으로 4개의 축(자기이해·자기표현·자기설계·자기실행)이 뻗는다 → 리포트 형태로 응집.\n\n🎙️ **내레이션**\n> 이 원리가, 인생포트폴리오의 출발이 됐습니다.\n> <#0.4#>\n> 그래서 우리는 사람을 몇 개의 유형으로 묶지 않습니다. 등수로 줄 세우지도 않습니다.\n> 대신 'Only One 진단'으로, 당신만의 고유성을 좌표 위에 그립니다.\n> <#0.5#>\n> 약 76개의 질문에 답하는 15분. 그 안에서 네 가지를 봅니다.\n> 나는 누구인가 — 자기이해.\n> 나는 무엇을 위해 사는가 — 자기표현.\n> 나는 어떻게 살아갈 것인가 — 자기설계.\n> 그리고, 어떻게 실행할 것인가 — 자기실행.\n> <#0.6#>\n> 진단이 끝나면, 오직 당신 한 사람을 위한 'Only One 리포트'가 발급됩니다.\n> 누구에게나 같은 답을 주는 운세가 아닙니다. 당신의 응답에서 합성된, 세상에 단 하나뿐인 설계도입니다.\n> <#0.4#>\n> 80억 명이 진단을 받으면, 80억 장의 다른 리포트가 나옵니다. 똑같은 리포트는, 단 한 장도 없습니다.\n\n📱 **숏츠 #10**: \"15분, 76개의 질문이 그리는 나의 좌표\"\n📱 **숏츠 #11**: \"80억 명이면 80억 장 — 똑같은 리포트는 없다\"\n\n---\n\n## SCENE 7 — 여정 / 발견·살아냄·남김 (7:25–8:35) 〔숏츠 #12·13〕\n\n🎬 **화면**: 세 개의 원이 삼각 순환 — 발견(DISCOVER) → 살아냄(LIVE) → 남김(LEAVE) → 다시 발견. 골드 선이 끊임없이 순환.\n🎵 **음악**: 여정감, 점층.\n\n🎙️ **내레이션**\n> 하지만 발견만으로는 삶이 바뀌지 않습니다. 인생포트폴리오는 세 동사로 이어집니다.\n> <#0.5#>\n> 첫째, 발견. 당신의 고유성을 좌표로 정리합니다.\n> 둘째, 살아냄. \"만약 그 순간이 오면, 그때 나는 이렇게 한다.\" 방향을 일상의 작은 한 걸음으로 새깁니다. 3주, 3개월, 1년. 마음에 둔 길이, 실제 걸음이 되도록.\n> 셋째, 남김. 살아낸 결을 글로, 목소리로, 콘텐츠로 — 당신만의 인생 자산으로 남깁니다.\n> <#0.6#>\n> 발견하고, 살아내고, 남기는 일. 이 셋은 분리된 단계가 아니라, 서로를 강화하는 하나의 순환입니다.\n> <#0.4#>\n> AI가 가장 흉내 내기 어려운 것 — 그것은 한 사람이 자기 자리에서 쌓아 올린, 고유한 삶의 결입니다.\n\n📱 **숏츠 #12**: \"발견·살아냄·남김 — 인생의 세 동사\"\n📱 **숏츠 #13**: \"AI가 끝내 흉내 못 내는 단 하나\"\n\n---\n\n## SCENE 8 — 신뢰 / 운영 성숙도 (8:35–9:20) 〔숏츠 #14·15〕\n\n🎬 **화면**: 절제된 데이터 카드 4개가 차분히 등장 (300회+ 개선 / 2개국어 / 모바일 90+ / 결제 2종).\n🎵 **음악**: 안정적, 신뢰의 톤.\n\n🎙️ **내레이션**\n> 한 가지는 분명히 하고 싶습니다. 이건 기획서가 아닙니다. 이미 운영 중인, 살아 있는 서비스입니다.\n> <#0.5#>\n> 현장에서 누적된 개선만 300회가 넘습니다. v1에서 멈추지 않고, 계속 다듬어 왔습니다.\n> 한국어와 영어, 두 언어로 열려 있고, 어디서나 매끄럽게 작동합니다.\n> <#0.6#>\n> 그리고 약속드립니다. 당신의 데이터는 당신의 것입니다. 원하실 때 언제든 지울 수 있습니다.\n> 우리는, 사람을 먼저 두는 마음으로 이 서비스를 운영합니다.\n\n📱 **숏츠 #14**: \"기획서가 아니라, 이미 운영 중인 서비스\"\n📱 **숏츠 #15**: \"당신의 데이터는 당신의 것입니다\"\n\n---\n\n## SCENE 9 — 초대 / CTA (9:20–10:00) 〔숏츠 #16·17·18〕\n\n🎬 **화면**: 화면 중앙에 다시 North Star 골드 점. 그 아래로 가격(₩9,900)과 버튼(\"나의 인생포트폴리오 시작하기\"). 마지막엔 채널 로고 + 구독 유도.\n🎵 **음악**: 가장 따뜻한 절정 → 여운.\n\n🎙️ **내레이션**\n> 당신에게 맡겨진 것은 무엇입니까.\n> <#0.4#>\n> 그리고 당신은, 그것을 어디까지 키워, 무엇으로 남기고 싶습니까.\n> <#0.6#>\n> 한 번뿐인 삶을 발견하고, 살아내고, 남기는 일. 그 첫걸음은 9,900원, 15분이면 시작됩니다.\n> <#0.5#>\n> 남과 비교하는 자리에서 내려와, 오직 당신만의 기준 위에 서는 일.\n> 당신의 Only One 인생을, 지금 시작하세요.\n> <#0.6#>\n> 더 깊은 이야기는 이 채널에서 계속 이어갑니다. 구독과 함께, 당신의 다음 한 걸음을 함께 걷겠습니다.\n\n📱 **숏츠 #16**: \"당신에게 맡겨진 것은 무엇입니까?\"\n📱 **숏츠 #17**: \"9,900원, 15분이면 시작됩니다\" (CTA)\n📱 **숏츠 #18**: \"당신의 Only One 인생을 지금 시작하세요\" (구독 유도)\n\n---\n\n## 🎯 영상 메타데이터 (업로드용 초안)\n\n**제목 후보 (클릭 유도형)**\n1. AI가 답을 다 주는 시대, 왜 우리는 더 불안해졌을까\n2. 비교를 멈추는 단 하나의 방법 — 당신만의 인생 설계도\n3. \"나는 왜 뒤처진 것 같을까\" — 이 질문에 대한 오래된 답\n\n**설명란 초안**\n> AI가 모든 답을 3초 만에 내놓는 시대. 그런데 우리는 왜 더 자주 뒤처진다고 느낄까요?\n> 30대 번아웃 75.3%, 한 달 2천만 명이 AI에 답을 묻는 시대 —\n> 비교의 자리에서 벗어나, 오직 당신에게 맡겨진 기준 위에 삶을 설계하는 법.\n> 👉 Only One 진단 시작하기: https://lifeportfolio.co.kr\n>\n> 0:00 AI 시대의 역설\n> 0:55 효율에서 의미로\n> 2:05 데이터가 말하는 것\n> 3:25 10·20·30·40대의 같은 질문\n> 4:25 강영우 박사와 달란트의 원리\n> 6:05 Only One 진단\n> 7:25 발견·살아냄·남김\n> 8:35 이미 운영 중인 서비스\n> 9:20 지금 시작하기\n\n**해시태그**: #인생포트폴리오 #자기계발 #인생설계 #의미경제 #OnlyOne #자기발견 #번아웃 #강영우\n\n---\n\n## 📌 사실 확인 메모 (대본 내 수치·인물)\n- 30대 번아웃 75.3% / ChatGPT 한국 MAU 2,162만 / MBTI '잘 안다' 81% → 가이드북 6p 출처 표기와 동일.\n- 강영우 박사: 14세 시력 상실, 1976년 한국 최초 시각장애인 박사 → 검증 완료(블로그 D2와 동일 사실 기준). **영상 대본에서는 \"2001년 백악관\" 등 연도 디테일은 의도적으로 생략**(내레이션 흐름·검증 안전성 위해 핵심 사실만).\n- 달란트 비유 해석: 호크마 주석 검증 완료(평가 기준 = 충실함, 양의 크기 아님).\n", "tts": "# TTS 낭독 전용 원고 (10분 풀버전) — MiniMax Speech-2.8-HD 붙여넣기용\n\n> **사용법**: 아래 BLOCK 단위로 복사 → MiniMax 입력창에 붙여넣기 → Generate.\n> `<#숫자#>` = Pause(초). MiniMax에서 그대로 인식됩니다. (인식 안 되면 그 부분만 줄바꿈/마침표로 대체)\n> 블록당 약 300~500자라 5,000자 제한 안에서 안전하게 끊어집니다.\n> **추천 세팅**: Speed 0.9~1.0 (진중한 톤), Pitch 0, Volume 1. 감정은 차분하고 진실한 톤.\n\n---\n\n## BLOCK 1 (HOOK)\n\nAI에게 물으면, 답은 3초 만에 나옵니다. <#0.5#> 그런데 이상하죠. 답이 빨라질수록, 우리는 더 자주 이런 생각을 합니다. <#0.4#> \"나는… 왜 남들보다 뒤처진 것 같을까.\" <#0.6#> 모든 성취가 숫자로 줄 세워지고, 옆 사람과 비교하기가 그 어느 때보다 쉬운 시대. <#0.4#> 이 영상은, 그 비교의 자리에서 한 발 벗어나려는 분들을 위한 이야기입니다. 비교하지 않아도 되는, 단 하나뿐인 인생 설계도에 대하여.\n\n---\n\n## BLOCK 2 (시대 전환)\n\n지난 20년, 세상은 손쉬워졌습니다. 더 빠르게, 더 효율적으로, 더 저렴하게. 우리는 그걸 'SaaS의 시대'라고 불렀습니다. <#0.4#> 그리고 지금, AI가 등장하면서 '무엇을' 하느냐는 누구나 빠르게 답할 수 있게 됐습니다. <#0.5#> 그러자 더 무거워진 질문이 하나 남았습니다. <#0.3#> '왜'. <#0.4#> 왜 이 일을 하는가. 왜 이렇게 살아가는가. 한 사람의 '왜'가 비로소 일이 되는 시대 — 저는 이것을 '의미 경제'라고 부릅니다. <#0.5#> AI가 세상을 자동화한다면, 인생포트폴리오는 사람을 자율화합니다. 기능이 아니라 의미를, 효율이 아니라 고유성을 다루는 일입니다.\n\n---\n\n## BLOCK 3 (시장 / 데이터)\n\n이건 감성적인 구호가 아닙니다. 데이터가 말하고 있습니다. <#0.4#> 30대 직장인의 번아웃 경험률은 75.3퍼센트. 20대보다도, 40대보다도 높습니다. <#0.5#> 같은 시기, 한국에서 ChatGPT를 쓰는 사람은 한 달에 2천만 명을 넘어섰습니다. 답을 구하는 일은, 이제 너무 쉬워졌어요. <#0.6#> 그런데 흥미로운 건 이겁니다. 사람들은 자기를 '잘 안다'고 답합니다. MBTI까지 동원해서요. 하지만 정작 \"그래서 무엇을 위해 사는가\"라는 질문 앞에서는, 대부분 말문이 막힙니다. <#0.5#> MBTI는 끝이 아니라 다리입니다. \"내 유형 다음은 무엇인가\" — 그 빈칸을, 인생포트폴리오가 채웁니다.\n\n---\n\n## BLOCK 4 (공감 / 생애 4시기)\n\n어쩌면 지금 떠올리는 고민이, 당신만의 것이 아닐 수 있습니다. <#0.4#> 10대는 묻습니다. \"내가 뭘 잘하는지 모르겠어요.\" 20대는 말합니다. \"직무가 안 맞아 회사를 그만뒀어요. MBTI 다음이 궁금해요.\" 30대는 고백합니다. \"번아웃이 왔어요. 인생 방향을 통째로 다시 짜야 할 것 같아요.\" 40대는 묻습니다. \"AI가 내 일을 대체할 것 같아요. 인생 후반의 의미를 알고 싶어요.\" <#0.6#> 표면의 고민은 다 다릅니다. 그런데 그 안에 흐르는 질문은 하나입니다. \"나는 누구이고, 무엇을 위해 사는가.\" <#0.4#> 분류가 아니라, 같은 갈망의 다른 얼굴입니다.\n\n---\n\n## BLOCK 5 (강영우 실화 + 달란트)\n\n여기, 한 사람의 이야기가 있습니다. <#0.4#> 그는 열네 살에 사고로 시력을 잃었습니다. 앞이 보이지 않는 채로, 모두가 불가능하다고 말하는 길을 걸었어요. 그러나 그는 끝내 대학을 졸업하고, 1976년 미국에서 한국 최초의 시각장애인 박사가 되었습니다. 故 강영우 박사입니다. <#0.6#> 그가 평생 붙든 한 문장은 이것이었습니다. \"남과 비교하지 말고, 자신에게 맡겨진 것을 기준으로 살아가라.\" <#0.5#> 그는 이 원리를, 성경의 오래된 비유 하나에서 가져왔습니다. 한 주인이 세 사람에게 각각 다섯, 둘, 하나를 맡기고 길을 떠납니다. <#0.4#> 돌아온 주인은, 세 사람을 서로 비교하지 않았습니다. 다섯 받은 사람을 둘 받은 사람과 견주어 등수를 매기지 않았어요. 대신 물었습니다. \"너는 받은 만큼 충실했는가.\" <#0.5#> 그래서 다섯을 받아 다섯을 남긴 사람과, 둘을 받아 둘을 남긴 사람은 — 똑같이 칭찬받았습니다. <#0.6#> 평가의 기준은 '양의 크기'가 아니라, '맡겨진 것에 대한 충실함'이었습니다. 남보다 앞섰는지 뒤처졌는지는 중요하지 않습니다. 중요한 건, 내게 맡겨진 것을 내가 어디까지 키워 가느냐. <#0.3#> 그것뿐입니다.\n\n---\n\n## BLOCK 6 (Only One 진단·리포트)\n\n이 원리가, 인생포트폴리오의 출발이 됐습니다. <#0.4#> 그래서 우리는 사람을 몇 개의 유형으로 묶지 않습니다. 등수로 줄 세우지도 않습니다. 대신 'Only One 진단'으로, 당신만의 고유성을 좌표 위에 그립니다. <#0.5#> 약 76개의 질문에 답하는 15분. 그 안에서 네 가지를 봅니다. 나는 누구인가 — 자기이해. 나는 무엇을 위해 사는가 — 자기표현. 나는 어떻게 살아갈 것인가 — 자기설계. 그리고, 어떻게 실행할 것인가 — 자기실행. <#0.6#> 진단이 끝나면, 오직 당신 한 사람을 위한 'Only One 리포트'가 발급됩니다. 누구에게나 같은 답을 주는 운세가 아닙니다. 당신의 응답에서 합성된, 세상에 단 하나뿐인 설계도입니다. <#0.4#> 80억 명이 진단을 받으면, 80억 장의 다른 리포트가 나옵니다. 똑같은 리포트는, 단 한 장도 없습니다.\n\n---\n\n## BLOCK 7 (발견·살아냄·남김)\n\n하지만 발견만으로는 삶이 바뀌지 않습니다. 인생포트폴리오는 세 동사로 이어집니다. <#0.5#> 첫째, 발견. 당신의 고유성을 좌표로 정리합니다. 둘째, 살아냄. \"만약 그 순간이 오면, 그때 나는 이렇게 한다.\" 방향을 일상의 작은 한 걸음으로 새깁니다. 3주, 3개월, 1년. 마음에 둔 길이, 실제 걸음이 되도록. 셋째, 남김. 살아낸 결을 글로, 목소리로, 콘텐츠로 — 당신만의 인생 자산으로 남깁니다. <#0.6#> 발견하고, 살아내고, 남기는 일. 이 셋은 분리된 단계가 아니라, 서로를 강화하는 하나의 순환입니다. <#0.4#> AI가 가장 흉내 내기 어려운 것 — 그것은 한 사람이 자기 자리에서 쌓아 올린, 고유한 삶의 결입니다.\n\n---\n\n## BLOCK 8 (신뢰)\n\n한 가지는 분명히 하고 싶습니다. 이건 기획서가 아닙니다. 이미 운영 중인, 살아 있는 서비스입니다. <#0.5#> 현장에서 누적된 개선만 300회가 넘습니다. v1에서 멈추지 않고, 계속 다듬어 왔습니다. 한국어와 영어, 두 언어로 열려 있고, 어디서나 매끄럽게 작동합니다. <#0.6#> 그리고 약속드립니다. 당신의 데이터는 당신의 것입니다. 원하실 때 언제든 지울 수 있습니다. 우리는, 사람을 먼저 두는 마음으로 이 서비스를 운영합니다.\n\n---\n\n## BLOCK 9 (초대 / CTA)\n\n당신에게 맡겨진 것은 무엇입니까. <#0.4#> 그리고 당신은, 그것을 어디까지 키워, 무엇으로 남기고 싶습니까. <#0.6#> 한 번뿐인 삶을 발견하고, 살아내고, 남기는 일. 그 첫걸음은 9,900원, 15분이면 시작됩니다. <#0.5#> 남과 비교하는 자리에서 내려와, 오직 당신만의 기준 위에 서는 일. 당신의 Only One 인생을, 지금 시작하세요. <#0.6#> 더 깊은 이야기는 이 채널에서 계속 이어갑니다. 구독과 함께, 당신의 다음 한 걸음을 함께 걷겠습니다.\n\n---\n\n## 📋 녹음 가이드 (총괄님께)\n\n1. **톤**: 강의가 아니라 '진실한 고백'. 빠르게 읽지 마시고, Pause 지점에서 충분히 숨 쉬어 주세요. 특히 BLOCK 5(강영우 실화)는 가장 감정을 실어주세요.\n2. **순서**: BLOCK 1 → 9 순서대로 각각 Generate → 다운로드. 파일명을 `block1.mp3` ~ `block9.mp3`로 저장.\n3. **강조 단어**(살짝 힘주어): \"왜\", \"비교\", \"충실함\", \"단 하나뿐인\", \"80억 장\", \"당신의 Only One 인생\".\n4. 완성된 9개 mp3를 주시면 — 제가 Pause·간격 정리해서 하나의 10분 내레이션으로 통합하고, 키네틱 타이포 영상에 싱크해 드립니다.\n5. (선택) Pause 태그 `<#0.5#>`가 음성에 그대로 읽히면, 그 부분을 지우고 마침표로만 녹음하셔도 됩니다 — 제가 편집 단계에서 간격을 넣겠습니다.\n", "pipeline": "# 숏츠 풀링 전략 + 제작 파이프라인\n\n## 1. 숏츠 풀링 전략 (에버그린 18편)\n\n키 콘텐츠(10분) 1편 = 숏츠 18편의 저수지. 각 SCENE이 독립 메시지를 갖도록 설계했으므로, 영상 편집본을 그대로 9:16으로 잘라 자막만 키우면 숏츠가 됩니다.\n\n### 발행 캘린더 (예시 — 주 3회 × 6주)\n| 주차 | 월 | 수 | 금 | 테마 |\n|---|---|---|---|---|\n| 1주 | #1 불안의 역설 | #3 번아웃 75.3% | #7 강영우 실화 | 후킹·공감 |\n| 2주 | #2 SaaS→의미 | #4 MBTI는 다리 | #8 다섯과 둘 | 통찰 |\n| 3주 | #5 4시기 질문 | #9 기준=충실함 | #10 15분 좌표 | 해법 진입 |\n| 4주 | #6 내 얘기? | #11 80억 장 | #12 세 동사 | 차별성 |\n| 5주 | #13 AI 못 흉내 | #14 운영 중 서비스 | #16 맡겨진 것 | 신뢰 |\n| 6주 | #15 데이터는 당신 것 | #17 9,900원 CTA | #18 구독 유도 | 전환 |\n\n### 숏츠 제작 원칙\n- **첫 1.5초 = 자막 훅** (질문형). 예: \"답이 빨라질수록 왜 더 불안할까?\"\n- **세로 9:16**, 핵심 문장 큰 자막(골드), 하단 고정 CTA \"프로필 링크 → 15분 진단\"\n- 각 숏츠 끝 1초: North Star 로고 + \"인생포트폴리오\" → 채널 인지 누적\n- 키 콘텐츠 본편으로 유도하는 고정 댓글: \"🔗 전체 이야기는 본 영상에서\"\n\n### 풀링(funnel) 동선\n숏츠(인지) → 본편 10분(설득) → 더보기 링크(전환) → 9,900원 진단(매출) → 21일 동행(₩49,000 업셀)\n\n---\n\n## 2. 제작 파이프라인 (다음 단계)\n\n### STEP 1 ✅ 대본 (완료)\n- `key_content_script.md` — 연출 대본(타임코드·화면·숏츠 분할)\n- `tts_narration.md` — TTS 낭독 전용 원고(BLOCK 1~9)\n\n### STEP 2 🎙️ 음성 녹음 (총괄님)\n- MiniMax Speech-2.8-HD / Youngsik Kim 보이스, Speed 0.9\n- BLOCK 1~9 각각 생성 → `block1.mp3` ~ `block9.mp3`\n- 완성 파일을 업로드해 주시면 STEP 3로 진행\n\n### STEP 3 🔧 음성 통합 (제가 처리)\n- 9개 블록을 하나의 내레이션으로 병합, 블록 사이 간격(0.8~1.2초) 정리\n- 전체 길이 측정 → 영상 타임라인 확정\n\n### STEP 4 🎬 비주얼 제작 (제가 처리)\n- 가이드북 비주얼 시스템(다크네이비+골드, North Star)을 모션 키프레임으로\n- SCENE별 키네틱 타이포 + 추상 모션그래픽 생성 (image_generation → video_generation)\n- 각 SCENE 키프레임 이미지를 먼저 만들고, 5~10초 클립으로 영상화 후 연결\n\n### STEP 5 🎵 음악·SFX (제가 처리)\n- 다크/시네마틱 앰비언트 BGM (audio_generation, 장면별 분위기)\n- North Star 점멸·전환 SFX\n\n### STEP 6 🪡 싱크·자막·마스터링 (제가 처리)\n- 내레이션 + 비주얼 + 음악 싱크\n- 한국어 자막(가독성), CTA 카드, 채널 로고/구독 버튼\n- 16:9 본편 + 9:16 숏츠 18편 컷 추출\n\n---\n\n## 3. 지금 총괄님이 하실 일 (1가지)\n👉 `tts_narration.md`의 BLOCK 1~9를 MiniMax에 넣고 녹음 → 9개 mp3 파일 회신.\n\n그 파일을 주시면 STEP 3~6를 제가 이어받아 완성본(본편 10분 + 숏츠 18편)을 만들어 드립니다.\n\n> 참고: 영상 비주얼은 video_generation/audio_generation 도구로 제작하며 크레딧·시간이 소요됩니다. STEP 4~5 진행 전에 분량/비용을 다시 안내하고 확인받겠습니다.\n"};
function render(key){
  var el = document.getElementById('doc-'+key);
  if(!el.dataset.done){ el.innerHTML = marked.parse(DATA[key]); el.dataset.done='1'; }
}
['script','tts','pipeline'].forEach(render);
document.getElementById('tabs').addEventListener('click', function(e){
  var b = e.target.closest('.tab'); if(!b) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  b.classList.add('active');
  var key = b.dataset.key;
  ['script','tts','pipeline'].forEach(function(k){
    document.getElementById('doc-'+k).classList.toggle('hidden', k!==key);
  });
  window.scrollTo({top:0,behavior:'smooth'});
});
function currentKey(){ return document.querySelector('.tab.active').dataset.key; }
function copyText(t,msg){ navigator.clipboard.writeText(t).then(()=>alert(msg||'복사되었습니다')); }
function copyCurrent(){ copyText(DATA[currentKey()], '현재 탭 내용이 복사되었습니다.'); }
function copyTTS(){ copyText(DATA['tts'], 'TTS 낭독 원고 전체가 복사되었습니다. MiniMax에 붙여넣으세요.'); }
</script>
